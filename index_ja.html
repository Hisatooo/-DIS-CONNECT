<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>(DIS)CONNECT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ===== BASE ===== */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #000;
      color: #E2E2E2;
      overscroll-behavior: none;
    }
    input, textarea, select, button { font-family: 'Sora', sans-serif; }

    /* ===== SCROLLBAR ===== */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ===== PAGE SYSTEM ===== */
    .page {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      overflow: hidden;
    }
    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== CARD ===== */
    .card {
      background: #1C1C1E;
      border-radius: 1.25rem;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ===== INPUTS ===== */
    .input-field {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 0.875rem;
      padding: 0.9rem 1rem;
      width: 100%;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: rgba(255,255,255,0.35); }
    .input-field::placeholder { color: #6B7280; }

    /* ===== BOTTOM NAV ===== */
    .nav-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 2rem);
      max-width: 400px;
      background: rgba(22,22,24,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 9999px;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.25,1,0.5,1), opacity 0.3s ease;
    }
    .nav-bar.nav-hidden {
      transform: translate(-50%, 200%);
      opacity: 0;
    }
    .nav-btn { transition: color 0.18s ease; position: relative; }
    .nav-btn .icon-solid { display: none; }
    .nav-btn.active-nav .icon-outline { display: none; }
    .nav-btn.active-nav .icon-solid { display: block; }

    /* ===== NOTIFICATION DOT ===== */
    .notif-dot {
      position: absolute;
      top: 0.35rem;
      right: 0.35rem;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      border: 1.5px solid #000;
    }

    /* ===== SLIDER ===== */
    .slider-track {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      padding: 6px;
      position: relative;
      user-select: none;
      touch-action: none;
      overflow: hidden;
    }
    .slider-reveal {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 9999px;
      pointer-events: none;
    }
    .slider-thumb {
      background: white;
      border-radius: 9999px;
      position: absolute;
      top: 6px; left: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      cursor: grab;
      transition: box-shadow 0.2s;
    }
    .slider-thumb:active { cursor: grabbing; box-shadow: 0 0 0 6px rgba(255,255,255,0.1); }
    .slider-label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      color: #6B7280;
      pointer-events: none;
      font-weight: 600;
      font-size: 0.875rem;
      white-space: nowrap;
      z-index: 1;
      transition: opacity 0.15s;
    }

    /* ===== COUNTDOWN RING ===== */
    .countdown-ring { transform: rotate(-90deg); }
    .countdown-ring circle { transition: stroke-dashoffset 1s linear; }

    /* ===== ANIMATIONS ===== */
    @keyframes like-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .like-pop { animation: like-pop 0.28s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }

    @keyframes pulse-ring {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.55; }
    }
    .pulse-ring { animation: pulse-ring 2.2s ease infinite; }

    /* ===== COMMENT PANEL ===== */
    #comment-panel {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 300;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.25,1,0.5,1);
      display: flex;
      flex-direction: column;
    }
    #comment-panel.open { transform: translateX(0); }


    /* ===== BOTTOM SHEET MODAL ===== */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet-body {
      width: 100%;
      max-width: 400px;
      background: #111113;
      border-radius: 1.5rem 1.5rem 0 0;
      padding: 0 1.25rem 2rem;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.25,1,0.5,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .sheet-overlay.open .sheet-body { transform: translateY(0); }
    .sheet-handle {
      width: 2.5rem; height: 4px;
      background: #3a3a3c;
      border-radius: 2px;
      margin: 0.75rem auto 1.25rem;
    }

    /* ===== TIME PICKER ===== */
    .picker-col {
      width: 5rem;
      height: 15rem;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .picker-col::-webkit-scrollbar { display: none; }
    .picker-item {
      height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-size: 2rem;
      font-weight: 900;
      color: white;
      opacity: 0.25;
      transition: opacity 0.15s;
    }
    .picker-pad { height: 5.5rem; flex-shrink: 0; }

    /* ===== WEEKLY CHART ===== */
    .week-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
    }
    .week-bar-wrap {
      flex: 1;
      width: 100%;
      max-width: 28px;
      background: #2C2C2E;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .week-bar-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #606060;
      border-radius: 4px;
      transition: height 0.6s cubic-bezier(0.25,1,0.5,1);
    }
    .week-bar-fill.today { background: white; }

    /* ===== TOGGLE SWITCH ===== */
    .toggle {
      position: relative;
      width: 2.75rem;
      height: 1.5rem;
      border-radius: 9999px;
      background: #3a3a3c;
      cursor: pointer;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle.on { background: white; }
    .toggle-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 1.25rem; height: 1.25rem;
      border-radius: 50%;
      background: #888;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle.on .toggle-knob {
      transform: translateX(1.25rem);
      background: #000;
    }

    /* ===== FEED TABS ===== */
    .feed-tab {
      position: relative;
      padding-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.9375rem;
      color: #6B7280;
      transition: color 0.2s;
    }
    .feed-tab.active-tab { color: white; }
    .feed-tab.active-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 1.5rem; height: 2px;
      background: white;
      border-radius: 1px;
    }

    /* ===== PADDING FOR NAV ===== */
    .pb-nav { padding-bottom: 7rem; }
  </style>
</head>
<body class="antialiased overflow-hidden h-screen w-screen">

  <!-- ===================== INTERRUPT ===================== -->

  <div id="comment-panel">

          </svg>
        </div>
        <span id="manual-slider-label" class="slider-label">スワイプして開始</span>

        <path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/>

    <button class="nav-btn p-3 text-gray-500" data-page="profile">
      <svg class="icon-outline w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">

function getStreak(history) {
  const completed = history.filter(h => h.completed);
  if (!completed.length) return 0;
  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const dates = new Set(completed.map(h => dateKey(new Date(h.date))));
  const now = new Date();
  const todayKey = dateKey(now);
  const startOffset = dates.has(todayKey) ? 0 : 1;
  let streak = 0;
  for (let i = startOffset; i < 365; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    if (dates.has(dateKey(d))) streak++;
    else break;
  }
  return streak;
}

function fmtDuration(sec, alwaysHours = false) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  if (S.lang === 'en') {
    if (h > 0 || alwaysHours) return `${h}h${m > 0 ? ' ' + m + 'm' : ''}`;
    return `${m}m`;
  }
  if (h > 0 || alwaysHours) return `${h}時間${m > 0 ? m + '分' : ''}`;
  return `${m}分`;
}
function fmtCountdown(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDate(ts) {
  const locale = S.lang === 'en' ? 'en-US' : 'ja-JP';
  return new Date(ts).toLocaleDateString(locale, { month:'short', day:'numeric' });
}

function startSession(durationSec, isChallenge = false) {
  if (S.activeSession) return;
  const sess = { startTime: Date.now(), totalDuration: durationSec, isChallenge };
  S.activeSession = { ...sess, timerId: null };
  localStorage.setItem('to_active_session', JSON.stringify(sess));
  renderSessionPage();
  goto('session');
  tickSession();
  S.activeSession.timerId = setInterval(tickSession, 1000);
  // update tuneout nav icon
  const tb = document.getElementById('tuneout-nav-btn');
  if (tb) { tb.classList.add('active-nav','text-white'); tb.classList.remove('text-gray-500'); }
}

function tickSession() {
  const sess = S.activeSession;
  if (!sess) return;
  const elapsed   = (Date.now() - sess.startTime) / 1000;
  const remaining = sess.totalDuration - elapsed;
  const timerEl   = document.getElementById('sess-timer');
  const ringEl    = document.getElementById('sess-ring');
  if (timerEl) timerEl.textContent = fmtCountdown(remaining);
  if (ringEl) {
    const pct    = Math.max(0, remaining / sess.totalDuration);
    ringEl.style.strokeDashoffset = RING_CIRC * (1 - pct);
  }
  if (remaining <= 0) endSession(true);
}

function endSession(completed) {
  const sess = S.activeSession;
  if (!sess) return;
  clearInterval(sess.timerId);
  localStorage.removeItem('to_active_session');
  const elapsed  = (Date.now() - sess.startTime) / 1000;
  const duration = completed ? sess.totalDuration : elapsed;
  if (elapsed > 10) {
    const h = getHistory();
    h.push({ duration, date: Date.now(), completed });
    saveHistory(h);
  }
  S.activeSession = null;
  const tb = document.getElementById('tuneout-nav-btn');
  if (tb) { tb.classList.remove('active-nav','text-white'); tb.classList.add('text-gray-500'); }

  // Group detox result
  const gd = S.groupDetox;
  if (gd) {
    const g = MOCK_GROUPS.find(x => x.id === gd.groupId);
    if (completed) {
      // Team success — increment streak
      if (g) g.streak = (g.streak || 0) + 1;
      renderPostSession(duration, true, { groupSuccess: true, group: g });
    } else {
      // Team failed
      if (g) g.streak = 0;
      const u = getUser();
      gd.failed = true;
      gd.failedBy = u ? u.name : t('あなた','You');
      renderPostSession(duration, false, { groupFailed: true, group: g, failedBy: gd.failedBy });
    }
    S.groupDetox = null;
  } else {
    renderPostSession(duration, completed);
  }
}

function initSlider(trackId, thumbId, revealId, onComplete) {
  const track  = document.getElementById(trackId);
  const thumb  = document.getElementById(thumbId);
  const reveal = document.getElementById(revealId);
  if (!track || !thumb || !reveal) return;

  let dragging = false;

  function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

  function onStart(e) { e.preventDefault(); dragging = true; }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const rect   = track.getBoundingClientRect();
    const maxPos = rect.width - thumb.offsetWidth - 12;
    let pos = getX(e) - rect.left - thumb.offsetWidth / 2;
    pos = Math.max(0, Math.min(pos, maxPos));
    thumb.style.left = `${pos + 6}px`;
    reveal.style.width = `${pos + thumb.offsetWidth / 2}px`;
    const label = track.querySelector('.slider-label');
    if (label) label.style.opacity = Math.max(0, 1 - (pos / maxPos) * 2);
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    const rect   = track.getBoundingClientRect();
    const maxPos = rect.width - thumb.offsetWidth - 12;
    const pos    = parseFloat(thumb.style.left || '6') - 6;
    if (pos >= maxPos * 0.85) {
      onComplete();
    } else {
      resetSlider(trackId, thumbId, revealId);
    }
  }

  thumb.addEventListener('mousedown',  onStart);
  thumb.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove, { passive: false });
  document.addEventListener('mouseup',  onEnd);
  document.addEventListener('touchend', onEnd);
}

function resetSlider(trackId, thumbId, revealId) {
  const thumb  = document.getElementById(thumbId);
  const reveal = document.getElementById(revealId);
  const track  = document.getElementById(trackId);
  if (!thumb || !reveal) return;
  thumb.style.transition  = 'left 0.3s ease';
  reveal.style.transition = 'width 0.3s ease';
  thumb.style.left   = '6px';
  reveal.style.width = '0px';
  const label = track?.querySelector('.slider-label');
  if (label) label.style.opacity = '1';
  setTimeout(() => { thumb.style.transition = ''; reveal.style.transition = ''; }, 320);
}

        const meDeclined = lobbyForGroup && (S.groupDetox.declinedMembers || []).includes('me');
        const responded  = meJoined || meDeclined;
        return `
          <div class="flex justify-start mb-3" data-from="${msg.from}">
            <div class="max-w-xs w-full">
              <div class="flex items-center gap-2 mb-1.5">
                <img src="${fromF?.avatar || `https://placehold.co/24x24/555/FFF?text=${msg.from[0].toUpperCase()}`}" class="w-6 h-6 rounded-full" alt="">
                <span class="text-xs text-gray-500">${fromF?.name || msg.from}</span>
                <span class="text-xs text-gray-700">${msg.time}</span>
              </div>
              <div class="rounded-2xl rounded-bl-sm p-3" style="background:${g.color}18;border:1px solid ${g.color}44;">
                <p class="text-xs font-bold mb-0.5" style="color:${g.color}">${t('グループデトックス招待','Group Detox Invite')}</p>
                <p class="text-sm text-white font-semibold">${durStr}${t('のデトックス',' detox')}</p>
                ${responded
                  ? meJoined
                    ? `<p class="text-xs text-green-400 font-semibold mt-1">✓ ${t('参加予定','Joining')}</p>`
                    : `<p class="text-xs text-gray-600 mt-1">${t('不参加にしました','You declined')}</p>`
                  : alreadyUsed
                    ? `<p class="text-xs text-gray-600 mt-1">${t('今日の上限（3回）に達しました','Daily limit (3 sessions) reached')}</p>`
                    : inOtherLobby
                      ? `<p class="text-xs text-gray-600 mt-1">${t('別のグループのデトックスに参加待ち中です','Waiting in another group\'s detox')}</p>`
                      : `<p class="text-xs text-gray-500 mt-0.5 mb-2">${t('一緒に参加しますか？','Join together?')}</p>
                         <div class="flex gap-2">
                           <button class="gd-chat-invite-btn flex-1 py-2 rounded-xl font-bold text-sm text-black" style="background:${g.color}" data-duration="${msg.duration}" data-action="join">${t('参加する','Join')}</button>
                           <button class="gd-chat-invite-btn flex-1 py-2 rounded-xl font-semibold text-sm text-gray-400 bg-[#2C2C2E]" data-duration="${msg.duration}" data-action="decline">${t('参加しない','Decline')}</button>
                         </div>`
                }
              </div>
            </div>
          </div>`;
      } else {
        const isMe  = msg.from === 'me';
        const fromF2 = isMe ? null : friendById(msg.from);
        const name2  = isMe ? (getUser()?.name || t('あなた','You')) : (fromF2?.name || msg.from);
        return `
          <div class="flex ${isMe?'justify-end':'justify-start'} mb-2">
            ${!isMe ? `<img src="${fromF2?.avatar || `https://placehold.co/32x32/555/FFF?text=${msg.from[0].toUpperCase()}`}" class="w-8 h-8 rounded-full mr-2 flex-shrink-0 self-end" alt="">` : ''}
            <div class="max-w-[72%]">
              ${!isMe ? `<p class="text-xs text-gray-600 mb-0.5 ml-1">${name2}</p>` : ''}
              <div class="px-3.5 py-2.5 rounded-2xl text-sm ${isMe?'bg-white text-black rounded-br-sm':'bg-[#2C2C2E] text-white rounded-bl-sm'}">${msg.text}</div>
              <p class="text-xs text-gray-800 mt-0.5 ${isMe?'text-right':'text-left'} mx-1">${msg.time}</p>
            </div>
          </div>`;
      }
    }).join('');

    page.innerHTML = `
      ${headerHtml}
      ${groupEditHtml}
      ${tabBarHtml}
      <div class="flex-shrink-0 flex items-center justify-between px-4 py-2 border-b border-gray-900/60">
        <span class="text-xs text-gray-600">${t('グループチャット','Group Chat')}</span>
        <button id="gd-leave-btn" class="flex items-center gap-1.5 text-xs font-semibold text-red-500 px-3 py-1.5 rounded-full border border-red-500/30">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          ${t('グループから退出','Leave Group')}
        </button>
      </div>
      <div id="gd-chat-scroll" class="flex-grow overflow-y-auto no-scrollbar px-4 py-2">
        ${chatMsgsHtml || `<p class="text-center text-gray-700 text-sm mt-8">${t('まだメッセージはありません','No messages yet')}</p>`}
      </div>
      <div class="flex-shrink-0 flex items-center gap-2 px-4 pt-3 pb-6 border-t border-gray-900">
        <input id="gd-chat-input" class="input-field rounded-full py-2.5 flex-grow text-sm" placeholder="${t('メッセージ...','Message...')}" type="text">
        <button id="gd-chat-send" class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background:${g.color}">
          <svg class="w-4 h-4 text-black" style="transform:rotate(45deg)" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
    `;

    goto('group-detail');

    document.getElementById('gd-back').addEventListener('click', () => {
      S.groupDetailTab = 'detox';
      goto('friends');
      setTimeout(() => document.getElementById('tab-groups-btn')?.click(), 50);
    });
    document.getElementById('gd-invite-btn')?.addEventListener('click', () => renderInviteSheet(g));
    document.getElementById('gd-tab-detox').addEventListener('click', () => { S.groupDetailTab = 'detox'; renderGroupDetail(groupId); });
    document.getElementById('gd-tab-chat').addEventListener('click',  () => { S.groupDetailTab = 'chat';  renderGroupDetail(groupId); });

    const scrollEl = document.getElementById('gd-chat-scroll');
    if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;

    function sendGroupMsg() {
      const input = document.getElementById('gd-chat-input');
      const text  = input.value.trim();
      if (!text) return;
      const msgs2 = getGroupChat(groupId);
      msgs2.push({ from: 'me', text, time: t('今','now') });
      saveGroupChat(groupId, msgs2);
      input.value = '';
      S.groupDetailTab = 'chat';
      renderGroupDetail(groupId);
    }
    document.getElementById('gd-chat-send').addEventListener('click', sendGroupMsg);
    document.getElementById('gd-chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendGroupMsg(); });

    document.querySelectorAll('.gd-chat-invite-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action || 'join';
        const duration = parseInt(btn.dataset.duration, 10) || 3600;
        const fromId = btn.closest('[data-from]')?.dataset.from || g.members[0] || 'alice';

        if (action === 'decline') {
          // 不参加：ロビーに記録せず、ボタンを「不参加」表示に差し替え
          const card = btn.closest('.rounded-2xl.rounded-bl-sm');
          if (card) card.innerHTML += '';
          const btnRow = btn.parentElement;
          if (btnRow) btnRow.innerHTML = `<p class="text-xs text-gray-600">${t('不参加にしました','You declined')}</p>`;
          return;
        }

        if (!isPremium() && getGroupDetoxCount() >= 3) { showDetoxLimitPrompt(); return; }

        // 参加：招待者が作成したロビーに自分も追加
        S.groupDetox = {
          groupId,
          duration,
          readyMembers: [fromId, 'me'],
          allMembers: ['me', ...g.members],
          startTime: null,
          failed: false,
          failedBy: null,
          initiatedBy: fromId,
          apps: [],
          declinedMembers: [],
        };
        S.groupDetailTab = 'detox';
        renderGroupDetail(groupId);
      });
    });

    document.getElementById('gd-leave-btn')?.addEventListener('click', () => {
      showConfirm(
        t('グループから退出','Leave Group'),
        `「${g.name}」${t('から退出しますか？退出後は再度招待が必要です。','— are you sure? You\'ll need to be re-invited to rejoin.')}`,
        t('退出する','Leave'),
        () => {
          const idx = MOCK_GROUPS.findIndex(x => x.id === groupId);
          if (idx !== -1) MOCK_GROUPS.splice(idx, 1);
          S.groupDetailTab = 'detox';
          goto('friends');
          setTimeout(() => document.getElementById('tab-groups-btn')?.click(), 50);
        }
      );
    });

    return;
  }

  // ── DETOX TAB / LOBBY / PENDING ───────────────────────────────
  page.innerHTML = `
    ${headerHtml}
    ${groupEditHtml}
    ${tabBarHtml}
    <div class="flex-grow overflow-y-auto no-scrollbar px-4 pb-10 space-y-3">

      ${isPending ? (() => {
        const fromUser = friendById(g.pendingInvite.from);
        const fromName = fromUser ? fromUser.name : g.pendingInvite.from;
        return `
      <div class="rounded-2xl p-4" style="background:${g.color}12;border:1px solid ${g.color}33">
        <p class="text-xs font-bold uppercase tracking-wider mb-1" style="color:${g.color}">${t('招待が届いています','Invitation received')}</p>
        <p class="text-sm text-gray-400">${fromName}${t('から招待されました',' invited you')}</p>
      </div>
      <div class="card p-4">
        <p class="text-xs text-gray-600 font-bold uppercase tracking-wider mb-2">${t('グループについて','About')}</p>
        <p class="text-sm text-gray-400">${g.description}</p>
        ${g.streak ? `<p class="text-xs text-orange-400 font-bold mt-2">🔥 ${t('グループストリーク','Group Streak')} ${g.streak}${t('日',' days')}</p>` : ''}
      </div>
      <button id="gd-accept-btn" class="w-full py-4 rounded-2xl font-bold text-base text-black" style="background:${g.color}">
        ${t('招待を承認する','Accept Invite')}
      </button>
      <button id="gd-decline-btn" class="w-full py-3 rounded-2xl font-semibold text-sm text-gray-600 border border-gray-800">
        ${t('断る','Decline')}
      </button>`;
      })() : inLobby ? (() => {
        const meReady = gd.readyMembers.includes('me');
        const initiator = gd.initiatedBy;
        const initiatorName = initiator === 'me' ? (getUser()?.name||t('あなた','You')) : (friendById(initiator)?.name || initiator);
        return `
      <div class="rounded-2xl p-4" style="background:${g.color}12;border:1px solid ${g.color}33">
        <div class="flex items-center gap-2 mb-3">
          <span class="text-xs font-bold uppercase tracking-wider" style="color:${g.color}">${t('準備中 — 全員が揃ったら自動でスタート','Lobby — auto-starts when everyone is ready')}</span>
        </div>
        <p class="text-xs text-gray-500 mb-3">${initiatorName}${t('がデトックスを作成しました',' created the detox session')}</p>
        <div class="space-y-0" id="gd-member-rows">
          ${memberReadyRows(gd.readyMembers)}
        </div>
        <div class="mt-3 flex items-center justify-between">
          <span class="text-xs text-gray-600">${t('時間:','Duration:')} <span class="text-white font-bold">${fmtDuration(gd.duration, true)}</span></span>
          <span class="text-xs font-bold" style="color:${g.color}" id="gd-ready-count">${gd.readyMembers.length}/${gd.allMembers.length}${t('人 準備完了',' ready')}</span>
        </div>
        ${gd.apps && gd.apps.length ? `
        <div class="mt-2 pt-2 border-t border-white/5">
          <p class="text-xs text-gray-700 mb-1.5">${t('ブロック対象','Blocked')}</p>
          <div class="flex flex-wrap gap-1.5">
            ${gd.apps.map(label => { const a = ALL_APPS.find(x=>x.label===label); return a ? `<span class="flex items-center gap-1 px-2 py-1 rounded-full border border-white/10 bg-white/5 text-xs text-gray-400"><span class="w-3.5 h-3.5 rounded flex-shrink-0" style="background:#${a.bg}"></span>${a.label}</span>` : ''; }).join('')}
          </div>
        </div>` : ''}

      </div>
      ${gd.initiatedBy === 'me'
        ? `<button id="gd-cancel-lobby" class="w-full py-3 rounded-2xl font-semibold text-sm text-gray-600 border border-gray-800">${t('デトックスをキャンセル','Cancel Detox Session')}</button>`
        : (() => {
            const declined = (gd.declinedMembers || []).includes('me');
            if (meReady) {
              return `
                <div class="w-full py-3 rounded-2xl text-center text-sm font-semibold text-green-400 border border-green-500/30">${t('✓ 参加予定','✓ Joining')}</div>
                <button id="gd-cancel-join" class="w-full py-3 rounded-2xl font-semibold text-sm text-gray-600 border border-gray-800">${t('参加をキャンセル','Cancel Joining')}</button>
              `;
            } else if (declined) {
              return `<div class="w-full py-3 rounded-2xl text-center text-sm font-semibold text-gray-600 border border-gray-800">${t('不参加','Not joining')}</div>`;
            } else {
              return `
                <button id="gd-join-lobby" class="w-full py-4 rounded-2xl font-bold text-base text-black" style="background:${g.color}">${t('参加する','Join')}</button>
                <button id="gd-decline-lobby" class="w-full py-3 rounded-2xl font-semibold text-sm text-gray-600 border border-gray-800">${t('参加しない','Decline')}</button>`;
            }
          })()
      }
      `})() : `
      <!-- DEFAULT: setup -->
      <div class="card p-4">
        <p class="text-xs text-gray-600 font-bold uppercase tracking-wider mb-3">${t('デトックス時間','Detox Duration')}</p>
        <div class="flex justify-center items-center relative" style="height:15rem;">
          <div class="absolute left-1/2 -translate-x-1/2 w-44 h-16 bg-[#2C2C2E] rounded-2xl pointer-events-none z-0"></div>
          <div class="absolute inset-0 bg-gradient-to-b from-[#1C1C1E] via-transparent to-[#1C1C1E] pointer-events-none z-10"></div>
          <div class="z-20 flex items-center space-x-1">
            <div id="gd-picker-hours" class="picker-col"></div>
            <span class="text-3xl font-black text-gray-600">:</span>
            <div id="gd-picker-minutes" class="picker-col"></div>
          </div>
        </div>
      </div>

      <div class="card p-4">
        <p class="text-xs text-gray-600 font-bold uppercase tracking-wider mb-3">${t('ブロックするアプリ','Apps to Block')}</p>
        <div id="gd-app-chip-list" class="flex flex-wrap gap-2"></div>
      </div>

      <div class="card p-4">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs text-gray-600 font-bold uppercase tracking-wider">${t('メンバー','Members')}</p>
        </div>
        <div class="space-y-0">
          ${['me', ...g.members].map(id => {
            const isMe = id === 'me';
            const f = isMe ? null : friendById(id);
            const u2 = getUser();
            const name = isMe ? (u2?u2.name:t('あなた','You')) : (f?f.name:id);
            const avatar = isMe
              ? `https://placehold.co/40x40/334155/FFF?text=${(u2?u2.name:t('あなた','You'))[0].toUpperCase()}`
              : (f?f.avatar:`https://placehold.co/40x40/555/FFF?text=${id[0].toUpperCase()}`);
            const isGroupOwner = g.owner === id || (isMe && g.owner === 'me');
            const badge = isGroupOwner
              ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:${g.color}22;color:${g.color}">${t('オーナー','Owner')}</span>`
              : `<span class="text-xs text-gray-700">${t('メンバー','Member')}</span>`;
            const kickBtn = (isOwner && !isMe && !isGroupOwner)
              ? `<button class="gd-kick-btn ml-2 text-gray-700 hover:text-red-500 transition" data-uid="${id}" title="${t('退会させる','Remove')}">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </button>`
              : '';
            return `
              <div class="flex items-center justify-between py-2">
                <div class="flex items-center gap-3">
                  <img src="${avatar}" class="w-9 h-9 rounded-full" alt="${name}">
                  <p class="text-sm font-semibold text-white">${name}${isMe?` (${t('あなた','You')})`:''}</p>
                </div>
                <div class="flex items-center">${badge}${kickBtn}</div>
              </div>`;
          }).join('')}
        </div>
      </div>

      <div class="card p-4">
        <p class="text-xs text-gray-600 font-bold uppercase tracking-wider mb-2">${t('グループについて','About')}</p>
        <p class="text-sm text-gray-400">${g.description}</p>
        ${g.streak ? `<p class="text-xs text-orange-400 font-bold mt-2">🔥 ${t('グループストリーク','Group Streak')} ${g.streak}${t('日',' days')}</p>` : ''}
      </div>

      ${inOtherLobby
        ? `<div class="w-full py-4 rounded-2xl text-center text-sm font-semibold text-gray-600 border border-gray-800">${t('別のグループのデトックス待機中のため作成できません','Cannot create: waiting in another group\'s detox')}</div>`
        : `<button id="gd-ready-btn" class="w-full py-4 rounded-2xl font-bold text-base text-black" style="background:${g.color}">
            ${t('デトックスを作成する','Start Detox Session')}
          </button>
          <p class="text-center text-xs text-gray-700">${t('あなたが作成したら、メンバーに通知されます','Members will be notified when you start')}</p>`
      }
      `}
    </div>
  `;

  document.getElementById('gd-back').addEventListener('click', () => {
    S.groupDetailTab = 'detox';
    goto('friends');
    setTimeout(() => document.getElementById('tab-groups-btn')?.click(), 50);
  });
  document.getElementById('gd-invite-btn')?.addEventListener('click', () => renderInviteSheet(g));
  document.getElementById('gd-tab-detox')?.addEventListener('click', () => { S.groupDetailTab = 'detox'; renderGroupDetail(groupId); });
  document.getElementById('gd-tab-chat')?.addEventListener('click',  () => { S.groupDetailTab = 'chat';  renderGroupDetail(groupId); });

  // オーナー: グループ設定
  document.getElementById('gd-settings-btn')?.addEventListener('click', () => {
    S.groupEditing = (S.groupEditing === groupId) ? null : groupId;
    renderGroupDetail(groupId);
  });
  document.getElementById('gd-edit-save')?.addEventListener('click', () => {
    const newName = document.getElementById('gd-edit-name')?.value.trim();
    const newDesc = document.getElementById('gd-edit-desc')?.value.trim();
    if (newName) g.name = newName;
    if (newDesc !== undefined) g.description = newDesc;
    S.groupEditing = null;
    renderGroupDetail(groupId);
  });
  document.getElementById('gd-edit-cancel')?.addEventListener('click', () => {
    S.groupEditing = null;
    renderGroupDetail(groupId);
  });

  // オーナー: メンバーキック
  document.querySelectorAll('.gd-kick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const uid = btn.dataset.uid;
      const f = friendById(uid);
      const name = f ? f.name : uid;
      showConfirm(
        t('メンバーを退会させる','Remove Member'),
        `${name}${t('をグループから退会させますか？','— remove from this group?')}`,
        t('退会させる','Remove'),
        () => {
          g.members = g.members.filter(id => id !== uid);
          renderGroupDetail(groupId);
        }
      );
    });
  });

  if (isPending) {
    document.getElementById('gd-accept-btn')?.addEventListener('click', () => {
      g.pendingInvite = null;
      S.groupDetailTab = 'detox';
      renderGroupDetail(groupId);
    });
    document.getElementById('gd-decline-btn')?.addEventListener('click', () => {
      const idx = MOCK_GROUPS.findIndex(x => x.id === groupId);
      if (idx !== -1) MOCK_GROUPS.splice(idx, 1);
      goto('friends');
      setTimeout(() => document.getElementById('tab-groups-btn')?.click(), 50);
    });
  } else if (inLobby) {
    if (gd.initiatedBy === 'me') {
      // 作成者のみセッション全体をキャンセル可能
      document.getElementById('gd-cancel-lobby')?.addEventListener('click', () => {
        S.groupDetox = null;
        renderGroupDetail(groupId);
      });
    } else {
      // 非作成者：参加をキャンセル可能
      document.getElementById('gd-cancel-join')?.addEventListener('click', () => {
        S.groupDetox.readyMembers = S.groupDetox.readyMembers.filter(id => id !== 'me');
        renderGroupDetail(groupId);
      });
      // 非作成者：参加するか参加しないかを選択
      document.getElementById('gd-join-lobby')?.addEventListener('click', () => {
        if (!S.groupDetox.readyMembers.includes('me')) {
          S.groupDetox.readyMembers.push('me');
          renderGroupDetail(groupId);
          if (S.groupDetox.readyMembers.length >= S.groupDetox.allMembers.length) {
            S.groupDetox.startTime = Date.now();
            setTimeout(() => startSession(S.groupDetox.duration, false), 600);
          }
        }
      });
      document.getElementById('gd-decline-lobby')?.addEventListener('click', () => {
        if (!S.groupDetox.declinedMembers) S.groupDetox.declinedMembers = [];
        if (!S.groupDetox.declinedMembers.includes('me')) {
          S.groupDetox.declinedMembers.push('me');
          renderGroupDetail(groupId);
        }
      });
    }
  } else {
    initGroupDetoxPicker();
    renderGroupAppChips();

    document.getElementById('gd-ready-btn')?.addEventListener('click', () => {
      const gdH = getPickerValue('gd-picker-hours');
      const gdM = getPickerValue('gd-picker-minutes');
      const gdSelectedDur = Math.max(300, gdH * 3600 + gdM * 60);
      S.groupDetox = {
        groupId,
        duration: gdSelectedDur,
        readyMembers: ['me'],
        allMembers: ['me', ...g.members],
        startTime: null,
        failed: false,
        failedBy: null,
        initiatedBy: 'me',
        apps: [...S.groupSelectedApps],
      };
      renderGroupDetail(groupId);
      const others = [...g.members];
      others.forEach((id, i) => {
        setTimeout(() => {
          if (!S.groupDetox || S.groupDetox.groupId !== groupId) return;
          S.groupDetox.readyMembers.push(id);
          const rows = document.getElementById('gd-member-rows');
          const cnt  = document.getElementById('gd-ready-count');
          if (rows) rows.innerHTML = memberReadyRows(S.groupDetox.readyMembers);
          if (cnt)  cnt.textContent = `${S.groupDetox.readyMembers.length}/${S.groupDetox.allMembers.length}${t('人 準備完了',' ready')}`;
          if (S.groupDetox.readyMembers.length >= S.groupDetox.allMembers.length) {
            S.groupDetox.startTime = Date.now();
            setTimeout(() => {
              startSession(S.groupDetox.duration, false);
            }, 600);
          }
        }, (i + 1) * 1500);
      });
    });
  }

  goto('group-detail');
}

function renderFriendsList(filter = '') {
  const list = document.getElementById('friends-list');
  if (!list) return;
  list.innerHTML = '';

  const friends = MOCK_FRIENDS.filter(f =>
    f.isFriend &&
    (!filter || f.name.toLowerCase().includes(filter.toLowerCase()) || f.handle.toLowerCase().includes(filter.toLowerCase()))
  );

  const active  = friends.filter(f => f.sessionStart);
  const offline = friends.filter(f => !f.sessionStart);

  // Active friends
  if (active.length) {
    active.forEach(f => list.appendChild(buildFriendCard(f, true)));
  }

  // Separator
  if (active.length && offline.length) {
    const sep = document.createElement('div');
    sep.className = 'text-center text-gray-800 text-xs font-bold uppercase tracking-widest py-2';
    sep.textContent = t('オフライン','Offline');
    list.appendChild(sep);
  }

  // Offline friends
  offline.forEach(f => list.appendChild(buildFriendCard(f, false)));

  if (friends.length === 0) {
    list.innerHTML = `<p class="text-gray-700 text-sm text-center mt-8">${t('フレンドが見つかりません','No friends found')}</p>`;
  }
}

function buildFriendCard(f, isActive) {
  const el = document.createElement('div');
  el.className = 'card p-4 flex items-center justify-between cursor-pointer hover:bg-[#2C2C2E] transition';
  el.dataset.uid = f.id;

  const elapsed = isActive ? Math.floor((Date.now() - f.sessionStart) / 1000) : 0;
  const blockText = (isActive && f.isPublic && f.blockPublic)
    ? `<p class="text-xs text-gray-500 mt-0.5">${t('YouTube, Instagram をブロック中','Blocking YouTube, Instagram')}</p>`
    : '';

  el.innerHTML = `
    <div class="flex items-center space-x-3">
      <div class="relative">
        <img src="${f.avatar}" class="w-12 h-12 rounded-full ${isActive?'':'opacity-50'}" alt="">
        ${isActive ? '<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[#1C1C1E]"></div>' : ''}
      </div>
      <div>
        <p class="font-bold text-white">${f.name}</p>
        <p class="text-xs text-gray-600">${f.handle}</p>
        ${blockText}
      </div>
    </div>
    <div class="text-right flex-shrink-0 ml-2">
      ${isActive
        ? `<p class="font-bold text-white text-sm friend-elapsed" data-start="${f.sessionStart}">${fmtCountdown(elapsed)}</p>
           <p class="text-xs text-gray-700">${t('経過','Elapsed')}</p>`
        : `<svg class="w-5 h-5 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
             <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
           </svg>`
      }
    </div>
  `;
  el.addEventListener('click', () => openUserProfile(f.id));
  return el;
}

function updateFriendTimers() {
  document.querySelectorAll('.friend-elapsed').forEach(el => {
    const start   = parseInt(el.dataset.start);
    const elapsed = Math.floor((Date.now() - start) / 1000);
    el.textContent = fmtCountdown(elapsed);
  });
}

function getWeekData(history) {
  const days = [0,0,0,0,0,0,0]; // minutes per day (Sun=0)
  const now  = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0,0,0,0);
  history.forEach(h => {
    const d = new Date(h.date);
    if (d >= startOfWeek) days[d.getDay()] += Math.floor(h.duration / 60);
  });
  return days;
}

function buildWeeklyChart(chartId, labelsId, totalId, data) {
  const chartEl  = document.getElementById(chartId);
  const labelsEl = document.getElementById(labelsId);
  const totalEl  = document.getElementById(totalId);
  if (!chartEl || !labelsEl) return;

  const DAY_LABELS = S.lang === 'en' ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'] : ['日','月','火','水','木','金','土'];
  const today  = new Date().getDay();
  const maxVal = Math.max(...data, 1);
  const total  = data.reduce((a,b) => a+b, 0);

  chartEl.innerHTML  = '';
  labelsEl.innerHTML = '';
  if (totalEl) totalEl.textContent = `${t('今週','This week')} ${Math.floor(total/60)}h ${total%60}m`;

  DAY_LABELS.forEach((day, i) => {
    const pct     = data[i] / maxVal * 100;
    const isToday = i === today;

    // Bar column
    const col = document.createElement('div');
    col.className = 'week-col';
    col.innerHTML = `
      <div class="week-bar-wrap" style="flex:1;">
        <div class="week-bar-fill ${isToday?'today':''}" style="height:${pct}%;"></div>
      </div>
    `;
    chartEl.appendChild(col);

    // Label
    const lbl = document.createElement('div');
    lbl.className = `flex-1 text-center text-xs ${isToday ? 'text-white font-bold' : 'text-gray-700'}`;
    lbl.textContent = day;
    labelsEl.appendChild(lbl);
  });
}

function buildHistoryList(history) {
  const el = document.getElementById('history-list');
  if (!el) return;
  const sorted = [...history].reverse().slice(0, 10);
  if (sorted.length === 0) {
    el.innerHTML = `<p class="text-gray-700 text-sm text-center mt-4">${t('まだセッションがありません','No sessions yet')}</p>`;
    return;

  sorted.forEach(h => {
    el.insertAdjacentHTML('beforeend', `

        <div class="w-10 h-10 rounded-xl bg-[#2C2C2E] flex items-center justify-center flex-shrink-0">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 2v6l4 4-4 4v6h12v-6l-4-4 4-4V2H6z"/>

}

    ['groupInvite',      'groupInvite'],

      <button id="notif-back" class="p-2 -ml-2 text-gray-500">

    </div>

      ${(() => {
        const all = [
          { icon:'⏱', type:'friendDetoxStart', friendId:'chloe', text: t('<b>Chloe</b> がデトックスを開始しました','<b>Chloe</b> started a detox session'), sub: t('1時間前','1h ago') },
          { icon:'❤️', type:'likes',            friendId:null,    text: t('<b>Alice</b> があなたの投稿にいいねしました','<b>Alice</b> liked your post'), sub: t('2時間前','2h ago') },
          { icon:'✅', type:'friendDetoxEnd',   friendId:'ben',   text: t('<b>Ben</b> がデトックスを終了しました（60分）','<b>Ben</b> completed a detox session (60 min)'), sub: t('3時間前','3h ago') },
          { icon:'💬', type:'comments',         friendId:null,    text: t('<b>Ben</b> がコメントしました: "いいね！"','<b>Ben</b> commented: "Nice!"'), sub: t('5時間前','5h ago') },
          { icon:'⏱', type:'friendDetoxStart', friendId:'david', text: t('<b>David</b> がデトックスを開始しました','<b>David</b> started a detox session'), sub: t('昨日','Yesterday') },
          { icon:'✅', type:'friendDetoxEnd',   friendId:'chloe', text: t('<b>Chloe</b> がデトックスを終了しました（30分）','<b>Chloe</b> completed a detox session (30 min)'), sub: t('昨日','Yesterday') },
        ];
        const p = S.notifPrefs;
        const filtered = p.enabled ? all.filter(n => {
          if (!p[n.type]) return false;
          if (n.friendId && (n.type === 'friendDetoxStart' || n.type === 'friendDetoxEnd')) {
            const ff = p.friendFilter[n.friendId];
            const sub = n.type === 'friendDetoxStart' ? 'start' : 'end';
            return !ff || ff[sub] !== false;
          }
          return true;
        }) : [];
        if (filtered.length === 0) {
          return `<p class="text-center text-gray-700 text-sm mt-12">${t('通知はありません','No notifications')}</p>`;
        }
        return filtered.map(n=>`
          <div class="flex items-start space-x-3 px-4 py-4">
            <div class="w-8 h-8 rounded-full bg-gray-900 flex items-center justify-center flex-shrink-0 mt-0.5 text-base">${n.icon}</div>
            <div>
              <p class="text-sm text-white">${n.text}</p>
              <p class="text-xs text-gray-700 mt-0.5">${n.sub}</p>
            </div>
          </div>
        `).join('');
      })()}
    </div>
  `;
  S.unreadNotif = false;
  updateUnreadDots();
  goto('notifications');
  document.getElementById('notif-back').addEventListener('click', () => goto(S._prevPage || 'home'));
}

function renderAppChips() {
  const container = document.getElementById('app-chip-list');
  if (!container) return;
  container.innerHTML = ALL_APPS.map(a => {
    const sel = S.selectedApps.has(a.label);
    return `<button class="app-chip flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs font-semibold transition-all ${sel ? 'border-white/30 bg-white/10 text-white' : 'border-gray-800 text-gray-600'}" data-app="${a.label}">
      <span class="w-4 h-4 rounded flex items-center justify-center text-white font-bold" style="background:#${a.bg};font-size:9px">${a.label[0]}</span>
      ${a.label}
    </button>`;
  }).join('');
  container.querySelectorAll('.app-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const app = btn.dataset.app;
      if (S.selectedApps.has(app)) {
        S.selectedApps.delete(app);
        btn.className = btn.className.replace('border-white/30 bg-white/10 text-white', 'border-gray-800 text-gray-600');
      } else {
        S.selectedApps.add(app);
        btn.className = btn.className.replace('border-gray-800 text-gray-600', 'border-white/30 bg-white/10 text-white');
      }
    });
  });
}

let pickerInited = false;
function initGroupDetoxPicker() {
  const hPicker = document.getElementById('gd-picker-hours');
  const mPicker = document.getElementById('gd-picker-minutes');
  if (!hPicker || !mPicker || hPicker.children.length > 0) return;

  function buildCol(el, count, step) {
    const pad = document.createElement('div'); pad.className = 'picker-pad';
    el.appendChild(pad.cloneNode());
    for (let i = 0; i < count; i += step) {
      const item = document.createElement('div');
      item.className = 'picker-item';
      item.textContent = String(i).padStart(2,'0');
      el.appendChild(item);
    }
    el.appendChild(pad.cloneNode());
  }
  buildCol(hPicker, 6, 1);   // 0-5 hours
  buildCol(mPicker, 60, 5);  // 0,5,10...55 min

  // Scroll to default: 1 hour 0 min
  [hPicker, mPicker].forEach(p => {
    p.addEventListener('scroll', () => highlightCenter(p));
    setTimeout(() => {
      const items = p.querySelectorAll('.picker-item');
      if (p === hPicker && items[1]) p.scrollTop = items[1].offsetTop - p.clientHeight / 2 + items[1].offsetHeight / 2;
      highlightCenter(p);
    }, 50);
  });
}

function initTimePicker() {
  if (pickerInited) return;
  pickerInited = true;
  const hPicker = document.getElementById('picker-hours');
  const mPicker = document.getElementById('picker-minutes');

  function buildPicker(el, count, step) {
    const pad = document.createElement('div'); pad.className = 'picker-pad';
    el.appendChild(pad.cloneNode());
    for (let i = 0; i < count; i += step) {
      const item = document.createElement('div');
      item.className = 'picker-item';
      item.textContent = String(i).padStart(2,'0');
      el.appendChild(item);
    }
    el.appendChild(pad.cloneNode());
  }
  buildPicker(hPicker, 6,  1);  // 0-5 hours
  buildPicker(mPicker, 60, 5);  // 0,5,10...55 min

  [hPicker, mPicker].forEach(p => {
    p.addEventListener('scroll', () => highlightCenter(p));
    // scroll to 0 by default
    setTimeout(() => highlightCenter(p), 50);
  });
}

function highlightCenter(picker) {
  const center = picker.scrollTop + picker.clientHeight / 2;
  picker.querySelectorAll('.picker-item').forEach(item => {
    const itemCenter = item.offsetTop + item.offsetHeight / 2;
    item.style.opacity = Math.abs(center - itemCenter) < item.offsetHeight * 0.6 ? '1' : '0.2';
  });
}

function getPickerValue(pickerId) {
  const picker = document.getElementById(pickerId);
  const center = picker.scrollTop + picker.clientHeight / 2;
  let best = null, bestDist = Infinity;
  picker.querySelectorAll('.picker-item').forEach(item => {
    const dist = Math.abs(center - (item.offsetTop + item.offsetHeight / 2));
    if (dist < bestDist) { bestDist = dist; best = item; }
  });
  return best ? parseInt(best.textContent) : 0;
}

// SESSION RESTORE: reconnect if page reloaded during a session
// ================================================================
function maybeRestoreSession() {
  const stored = JSON.parse(localStorage.getItem('to_active_session') || 'null');
  if (!stored) return false;
  const elapsed   = (Date.now() - stored.startTime) / 1000;
  const remaining = stored.totalDuration - elapsed;
  if (remaining > 5) {
    S.activeSession = { ...stored, timerId: null };
    renderSessionPage();
    goto('session');
    S.activeSession.timerId = setInterval(tickSession, 1000);
    tickSession();
    return true;
  }
  localStorage.removeItem('to_active_session');
  return false;
}

function renderInviteSheet(group) {
  const sheet = document.getElementById('invite-sheet');

  const friendsList = document.getElementById('invite-friends-list');
  const invitableFriends = MOCK_FRIENDS.filter(f => f.isFriend && !group.members.includes(f.id));

  if (invitableFriends.length === 0) {
    friendsList.innerHTML = `<p class="text-gray-600 text-sm text-center py-4">${t('招待できるフレンドがいません','No friends available to invite')}</p>`;
  } else {
    friendsList.innerHTML = invitableFriends.map(f => `

          </div>

        <button class="text-xs font-bold px-3 py-1.5 rounded-full invite-send-btn" data-uid="${f.id}"
          style="background:${group.color}22;color:${group.color};border:1px solid ${group.color}44;">${t('招待する','Invite')}</button>
      </div>
    `).join('');
    friendsList.querySelectorAll('.invite-send-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.textContent = t('招待済み','Invited');
        btn.disabled = true;
        btn.style.opacity = '0.5';
      });
    });
  }

  sheet.style.pointerEvents = 'auto';
  sheet.style.opacity = '1';
  requestAnimationFrame(() => {
    drawer.style.transform = 'translateX(-50%) translateY(0)';
  });

  function closeSheet() {
    sheet.style.opacity = '0';
    drawer.style.transform = 'translateX(-50%) translateY(100%)';
    setTimeout(() => { sheet.style.pointerEvents = 'none'; }, 350);
  }
  document.getElementById('invite-close-btn').onclick = closeSheet;
  overlay.onclick = closeSheet;
}

        <div class="card p-4 flex items-center gap-4 opacity-70">
          <div class="w-12 h-12 rounded-2xl bg-[#2C2C2E] flex items-center justify-center text-2xl flex-shrink-0">${f.icon}</div>
          <div class="flex-grow">
            <p class="font-bold text-white text-sm">${f.title}</p>
            <p class="text-xs text-gray-600 mt-0.5">${f.desc}</p>
          </div>
          <svg class="w-5 h-5 text-gray-700 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
      `).join('')}

      <div class="card p-4 mt-4" style="border-color:#f59e0b22;">
        <p class="text-xs text-gray-600 text-center">${t('プレミアムの詳細が決まり次第、<br>こちらでお知らせします。','Details will be announced here<br>once Premium is ready.')}</p>
      </div>
    </div>
  `;
  goto('premium');
  document.getElementById('prem-back').addEventListener('click', () => goto('profile'));
}

// ================================================================
// BOOT
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  // Generate today's all-user detox time: random 15-min slot between 12:30–22:00 (max 3h duration)
  (() => {
    const slots = [];
    const startTotal = 12 * 60 + 30; // 12:30
    const endTotal   = 22 * 60;      // 22:00 (start must be ≤ 19:00 to allow up to 3h)
    const maxStart   = endTotal - 3 * 60; // latest start = 19:00
    for (let total = startTotal; total <= maxStart; total += 15) {
      slots.push({ h: Math.floor(total / 60), m: total % 60 });
    }
    S.globalDetoxTime = slots[Math.floor(Math.random() * slots.length)];
  })();

  renderLogin();
  renderRegister();
  renderInterruptPage();
  renderStaticLabels();
  updateUnreadDots();

  const u = getUser();
  if (u) {
    if (!maybeRestoreSession()) {
      goto('home');
    }
  } else {
    goto('login');
  }
});
</script>
