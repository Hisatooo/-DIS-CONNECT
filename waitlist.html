<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>(DIS)CONNECT</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sora', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Grain ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028; pointer-events: none; z-index: 9999;
    }

    /* ── Background orbs ── */
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none;
      filter: blur(140px);
      transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .orb-1 {
      width: 800px; height: 800px;
      top: -320px; left: 50%; transform: translateX(-52%);
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 65%);
      animation: driftA 22s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 600px; height: 600px;
      bottom: -200px; right: -140px;
      background: radial-gradient(circle, rgba(124,58,237,0.14) 0%, transparent 65%);
      animation: driftB 28s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 400px; height: 400px;
      top: 40%; left: -100px;
      background: radial-gradient(circle, rgba(16,185,129,0.07) 0%, transparent 70%);
      animation: driftC 35s ease-in-out infinite alternate;
    }
    @keyframes driftA {
      from { transform: translateX(-58%) translateY(0px) scale(1); }
      to   { transform: translateX(-44%) translateY(70px) scale(1.06); }
    }
    @keyframes driftB {
      from { transform: translateX(0) translateY(0) scale(1); }
      to   { transform: translateX(-60px) translateY(-80px) scale(0.94); }
    }
    @keyframes driftC {
      from { transform: translateX(0) translateY(0); }
      to   { transform: translateX(40px) translateY(-50px); }
    }

    /* ── HERO ── */
    .hero {
      min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      padding: 100px 28px 120px;
      text-align: center;
    }

    .hero-inner { will-change: transform, opacity; }

    /* Title */
    .wordmark {
      font-size: clamp(58px, 15vw, 180px);
      font-weight: 900;
      letter-spacing: -0.045em;
      line-height: 0.9;
      margin-bottom: 28px;
      white-space: nowrap;
    }

    .c-wrap {
      display: inline-block;
      overflow: hidden;
      vertical-align: top;
      line-height: 1.08;
    }

    .c {
      display: inline-block;
      transform: translateY(110%);
      filter: blur(8px);
      animation: charReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes charReveal {
      to { transform: translateY(0); filter: blur(0); }
    }

    .paren { color: rgba(255,255,255,0.38); }
    .dis   { color: rgba(255,255,255,0.58); }

    /* Subtitle */
    .reconnect {
      display: block;
      font-size: clamp(24px, 5.5vw, 64px);
      font-weight: 300;
      letter-spacing: -0.015em;
      color: rgba(255,255,255,0.72);
      font-style: italic;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Waseda tagline */
    .waseda-line {
      font-size: clamp(13px, 2.2vw, 16px);
      font-weight: 500;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.45);
      line-height: 1.8;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.9s 2.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scroll cue */
    .scroll-cue {
      position: absolute; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0;
      animation: appear 0.6s 2.8s forwards;
    }
    @keyframes appear { to { opacity: 1; } }

    .scroll-cue-line {
      width: 1px; height: 56px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2));
      animation: linePulse 2.8s 2.8s ease-in-out infinite;
    }
    @keyframes linePulse {
      0%, 100% { opacity: 0.25; transform: scaleY(0.8); }
      50%       { opacity: 1;   transform: scaleY(1); }
    }

    /* ── MARQUEE ── */
    .marquee-wrap {
      padding: 40px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .marquee-wrap.vis { opacity: 1; }

    .marquee-track {
      display: flex;
      white-space: nowrap;
      animation: marqueeRoll 38s linear infinite;
    }
    @keyframes marqueeRoll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .m-item {
      display: inline-flex; align-items: center; gap: 24px;
      padding: 0 24px;
      font-size: clamp(13px, 2.2vw, 18px);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
    .m-dot {
      width: 3px; height: 3px;
      border-radius: 50%; background: rgba(255,255,255,0.1); flex-shrink: 0;
    }

    /* ── FORM SECTION ── */
    .form-section {
      max-width: 440px;
      margin: 0 auto;
      padding: 96px 24px 220px;
    }

    .eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 40px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 1s, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .eyebrow.vis { opacity: 1; transform: translateY(0); }

    .fields {
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; transform: translateY(24px);
      transition: opacity 1s 0.1s, transform 1s 0.1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .fields.vis { opacity: 1; transform: translateY(0); }

    .field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      padding: 16px 20px;
      width: 100%;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    }
    .field:focus {
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }
    .field.err { border-color: rgba(239,68,68,0.5); box-shadow: 0 0 0 3px rgba(239,68,68,0.08); }
    .field::placeholder { color: rgba(255,255,255,0.2); }

    .btn-join {
      background: #fff;
      color: #000;
      font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: none; border-radius: 14px;
      padding: 19px; cursor: pointer; width: 100%;
      margin-top: 6px;
      position: relative; overflow: hidden;
      transition: opacity 0.25s, transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 0 0 0 rgba(255,255,255,0);
    }
    .btn-join:hover {
      opacity: 0.9;
      box-shadow: 0 8px 32px rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }
    .btn-join:active { transform: scale(0.98) translateY(0); box-shadow: none; }
    .btn-join:disabled { opacity: 0.18; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Loading dots */
    .dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    .hint {
      font-size: 11px; color: rgba(255,255,255,0.28);
      text-align: center; margin-top: 16px;
      letter-spacing: 0.05em;
      opacity: 0; transform: translateY(8px);
      transition: opacity 1s 0.22s, transform 1s 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hint.vis { opacity: 1; transform: translateY(0); }

    /* Counter */
    .counter {
      font-size: 11px; color: rgba(255,255,255,0.32);
      text-align: center; letter-spacing: 0.12em;
      margin-top: 36px;
      opacity: 0; transition: opacity 0.8s 0.4s;
    }
    .counter.vis { opacity: 1; }

    /* ── SUCCESS ── */
    .success { display: none; text-align: center; padding: 20px 0; }
    .success.show {
      display: block;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .success-mark {
      display: block; font-size: 44px;
      margin-bottom: 20px;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .success-title {
      font-size: 24px; font-weight: 900;
      letter-spacing: -0.025em; margin-bottom: 10px;
    }
    .success-body { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.8; }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
      opacity: 0; transition: opacity 1.4s;
    }
    .footer.vis { opacity: 1; }
    .footer p { font-size: 10px; color: rgba(255,255,255,0.16); letter-spacing: 0.2em; text-transform: uppercase; }

    /* ── CANVAS (rain) ── */
    #bgCanvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }

    /* ── SAKURA PETALS ── */
    #petals { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .petal {
      position: absolute; top: -30px;
      border-radius: 150% 0% 150% 0% / 150% 0% 150% 0%;
      background: linear-gradient(135deg,
        rgba(255,192,203,0.55) 0%,
        rgba(255,218,225,0.35) 50%,
        rgba(255,240,245,0.15) 100%
      );
      animation: petalFall linear infinite;
      pointer-events: none;
    }
    @keyframes petalFall {
      0%   { transform: translateY(0)    translateX(0)    rotate(0deg)   scale(1);    opacity: 0; }
      6%   { opacity: 1; }
      22%  { transform: translateY(22vh) translateX(35px) rotate(80deg)  scale(0.96); }
      45%  { transform: translateY(45vh) translateX(-18px)rotate(165deg) scale(1.02); }
      68%  { transform: translateY(68vh) translateX(28px) rotate(250deg) scale(0.94); }
      90%  { opacity: 0.85; }
      100% { transform: translateY(112vh)translateX(-10px)rotate(340deg) scale(0.8);  opacity: 0; }
    }

    /* ── KANJI LAYER ── */
    #kanji { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .kanji-char {
      position: absolute;
      font-family: 'Sora', 'Hiragino Sans', sans-serif;
      font-weight: 900;
      color: rgba(255,255,255,0.055);
      pointer-events: none;
      user-select: none;
      animation: kanjiFly linear infinite;
    }
    @keyframes kanjiFly {
      0%   { transform: translateY(0)     scale(1);    opacity: 0; }
      12%  { opacity: 1; }
      88%  { opacity: 1; }
      100% { transform: translateY(-35vh) scale(1.12); opacity: 0; }
    }

    /* ── LANG BAR ── */
    .lang-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-top: 1px solid #0d0d0d;
      display: flex;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      gap: 8px;
    }
    .lang-btn {
      flex: 1; background: transparent;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      color: rgba(255,255,255,0.35); font-size: 12px; font-weight: 700;
      letter-spacing: 0.04em; padding: 11px 8px;
      cursor: pointer; font-family: 'Sora', sans-serif;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .lang-btn.active { background: #fff; color: #000; border-color: #fff; }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="petals"></div>
<div id="kanji"></div>
<div class="orb orb-1" id="orb1"></div>
<div class="orb orb-2" id="orb2"></div>
<div class="orb orb-3"></div>

<!-- Lang bar -->
<div class="lang-bar">
  <button class="lang-btn active" id="lang-ja-btn" onclick="setLang('ja')">🇯🇵 日本語</button>
  <button class="lang-btn"        id="lang-en-btn" onclick="setLang('en')">🇺🇸 English</button>
</div>

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-inner" id="heroInner">
    <div class="wordmark" id="wordmark" aria-label="(DIS)CONNECT"></div>
    <span class="reconnect">to Reconnect.</span>
    <p class="waseda-line" id="wasedaLine"></p>
  </div>
  <div class="scroll-cue">
    <div class="scroll-cue-line"></div>
  </div>
</section>

<!-- ── MARQUEE ── -->
<div class="marquee-wrap" id="marqueeWrap">
  <div class="marquee-track" id="marqueeTrack"></div>
</div>

<!-- ── FORM ── -->
<section class="form-section">
  <p class="eyebrow" id="eyebrow" data-rev></p>

  <div id="formState">
    <div class="fields" id="fields" data-rev>
      <input id="wl-name"  class="field" type="text"  autocomplete="name">
      <input id="wl-email" class="field" type="email" inputmode="email" autocomplete="email">
      <button id="wl-btn" class="btn-join"></button>
    </div>
    <p class="hint" id="hint" data-rev></p>
  </div>

  <div class="success" id="successMsg">
    <span class="success-mark">✦</span>
    <p class="success-title" id="successTitle"></p>
    <p class="success-body"  id="successBody"></p>
  </div>

  <p class="counter" id="counter"></p>
</section>

<!-- ── FOOTER ── -->
<footer class="footer" id="footer" data-rev>
  <p>© 2026 (DIS)CONNECT</p>
</footer>

<script>
// ── COPY ──────────────────────────────────────────────
const COPY = {
  ja: {
    waseda:       '早稲田生が本気で取り組む、社会課題を解決するアプリ。',
    eyebrow:      'ウェイトリストに登録',
    namePh:       '名前（任意）',
    emailPh:      'メールアドレス',
    btn:          '参加する',
    btnLoading:   '送信中',
    hint:         'スパムは送りません',
    successTitle: '登録完了',
    successBody:  'リリース時にご連絡します。',
    counter:      n => `${n} 人が登録済み`,
    err:          'エラーが発生しました。再度お試しください。',
  },
  en: {
    waseda:       'Built by Waseda students, solving real social problems.',
    eyebrow:      'Join the waitlist',
    namePh:       'Name (optional)',
    emailPh:      'Email address',
    btn:          'Join',
    btnLoading:   'Joining',
    hint:         'No spam, ever.',
    successTitle: 'You\'re on the list.',
    successBody:  'We\'ll reach out when we launch.',
    counter:      n => `${n} people signed up`,
    err:          'Something went wrong. Try again.',
  }
};

let lang = (navigator.language || 'ja').startsWith('ja') ? 'ja' : 'en';
let countCache = 0;

function setLang(l) {
  lang = l;
  document.getElementById('lang-ja-btn').classList.toggle('active', l === 'ja');
  document.getElementById('lang-en-btn').classList.toggle('active', l === 'en');
  render();
}

function render() {
  const c = COPY[lang];
  document.getElementById('wasedaLine').textContent = c.waseda;
  document.getElementById('eyebrow').textContent    = c.eyebrow;
  document.getElementById('wl-name').placeholder    = c.namePh;
  document.getElementById('wl-email').placeholder   = c.emailPh;
  const btn = document.getElementById('wl-btn');
  if (!btn.disabled) btn.textContent = c.btn;
  document.getElementById('hint').textContent       = c.hint;
  document.getElementById('successTitle').textContent = c.successTitle;
  document.getElementById('successBody').textContent  = c.successBody;
  if (countCache > 0) {
    document.getElementById('counter').textContent = c.counter(countCache);
    document.getElementById('counter').classList.add('vis');
  }
  buildMarquee();
}

// ── HERO TITLE ────────────────────────────────────────
function buildTitle() {
  const wm = document.getElementById('wordmark');
  const chars = [
    { ch: '(',  cls: 'paren' },
    { ch: 'D',  cls: 'dis' },
    { ch: 'I',  cls: 'dis' },
    { ch: 'S',  cls: 'dis' },
    { ch: ')',  cls: 'paren' },
    { ch: 'C',  cls: '' },
    { ch: 'O',  cls: '' },
    { ch: 'N',  cls: '' },
    { ch: 'N',  cls: '' },
    { ch: 'E',  cls: '' },
    { ch: 'C',  cls: '' },
    { ch: 'T',  cls: '' },
  ];
  wm.innerHTML = '';
  chars.forEach(({ ch, cls }, i) => {
    const wrap = document.createElement('span');
    wrap.className = 'c-wrap';
    const inner = document.createElement('span');
    inner.className = 'c' + (cls ? ' ' + cls : '');
    inner.textContent = ch;
    inner.style.animationDelay = `${0.06 + i * 0.052}s`;
    wrap.appendChild(inner);
    wm.appendChild(wrap);
  });
}

// ── MARQUEE ───────────────────────────────────────────
function buildMarquee() {
  const track = document.getElementById('marqueeTrack');
  const chunk = Array(10).fill(null).map(() =>
    `<span class="m-item">(DIS)CONNECT to Reconnect<span class="m-dot"></span></span>`
  ).join('');
  track.innerHTML = chunk + chunk;
}

// ── PARALLAX ──────────────────────────────────────────
const heroInner = document.getElementById('heroInner');
const orb1 = document.getElementById('orb1');
const orb2 = document.getElementById('orb2');
let raf = false;

window.addEventListener('scroll', () => {
  if (!raf) {
    requestAnimationFrame(() => {
      const y = window.scrollY;
      const vh = window.innerHeight;
      heroInner.style.transform = `translateY(${y * 0.32}px)`;
      heroInner.style.opacity   = Math.max(0, 1 - (y / (vh * 0.6)));
      raf = false;
    });
    raf = true;
  }
}, { passive: true });

// Mouse parallax on orbs
window.addEventListener('mousemove', (e) => {
  const mx = (e.clientX / window.innerWidth  - 0.5) * 50;
  const my = (e.clientY / window.innerHeight - 0.5) * 34;
  orb1.style.transform = `translateX(calc(-52% + ${mx * 0.6}px)) translateY(${my * 0.5}px)`;
  orb2.style.transform = `translateX(${-mx * 0.3}px) translateY(${-my * 0.3}px)`;
}, { passive: true });

// ── SCROLL REVEAL ─────────────────────────────────────
const revObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('vis');
      revObs.unobserve(e.target);
    }
  });
}, { threshold: 0.06 });

document.querySelectorAll('[data-rev]').forEach(el => revObs.observe(el));
revObs.observe(document.getElementById('marqueeWrap'));
revObs.observe(document.getElementById('footer'));

// ── FIREBASE ──────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyBhhdcJ7Yigw5VGxuJxXSicqqHPe2xNcCY",
  authDomain: "tuneout-a7c7b.firebaseapp.com",
  projectId: "tuneout-a7c7b",
  storageBucket: "tuneout-a7c7b.firebasestorage.app",
  messagingSenderId: "798608722916",
  appId: "1:798608722916:web:95d9766c02bdcfd52455f1"
});
const db = firebase.firestore();

db.collection('waitlist').get().then(snap => {
  countCache = snap.size;
  if (countCache > 0) {
    const el = document.getElementById('counter');
    el.textContent = COPY[lang].counter(countCache);
    el.classList.add('vis');
  }
}).catch(() => {});

document.getElementById('wl-btn').addEventListener('click', async () => {
  const emailEl = document.getElementById('wl-email');
  const email   = emailEl.value.trim();
  const name    = document.getElementById('wl-name').value.trim();
  const c       = COPY[lang];

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailEl.classList.add('err');
    emailEl.focus();
    setTimeout(() => emailEl.classList.remove('err'), 2400);
    return;
  }

  const btn = document.getElementById('wl-btn');
  btn.disabled = true;
  btn.classList.add('dots');
  btn.textContent = c.btnLoading;

  try {
    const dup = await db.collection('waitlist').where('email', '==', email).get();
    if (!dup.empty) { showSuccess(); return; }
    await db.collection('waitlist').add({
      email, name: name || null,
      registeredAt: firebase.firestore.FieldValue.serverTimestamp(), lang
    });
    showSuccess();
  } catch {
    btn.disabled = false;
    btn.classList.remove('dots');
    btn.textContent = c.btn;
    alert(c.err);
  }
});

function showSuccess() {
  document.getElementById('formState').style.display = 'none';
  document.getElementById('successMsg').classList.add('show');
}

// ── RAIN CANVAS ───────────────────────────────────────
(function initRain() {
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');
  const isMobile = window.innerWidth < 768;
  const COUNT  = isMobile ? 60 : 130;

  let W, H, drops;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    drops = Array.from({ length: COUNT }, () => mkDrop());
  }

  function mkDrop() {
    return {
      x:     Math.random() * (W + 200) - 100,
      y:     Math.random() * H,
      speed: 2.5 + Math.random() * 4.5,
      len:   10 + Math.random() * 22,
      wind:  0.25 + Math.random() * 0.35,
      alpha: 0.025 + Math.random() * 0.055,
    };
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    ctx.lineWidth = 0.6;
    drops.forEach(d => {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(180,215,255,${d.alpha})`;
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.len * d.wind, d.y - d.len);
      ctx.stroke();
      d.y += d.speed;
      d.x += d.wind;
      if (d.y > H + 20) { d.y = -20; d.x = Math.random() * (W + 200) - 100; }
    });
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize, { passive: true });
  resize();
  frame();
})();

// ── SAKURA PETALS ─────────────────────────────────────
(function initPetals() {
  const container = document.getElementById('petals');
  const COUNT = window.innerWidth < 768 ? 10 : 18;
  for (let i = 0; i < COUNT; i++) {
    const el   = document.createElement('div');
    el.className = 'petal';
    const size = 7 + Math.random() * 9;
    const dur  = 10 + Math.random() * 14;
    const delay = -(Math.random() * dur);
    el.style.cssText = [
      `width:${size}px`,
      `height:${size * 1.5}px`,
      `left:${Math.random() * 100}%`,
      `animation-duration:${dur}s`,
      `animation-delay:${delay}s`,
      `opacity:${0.55 + Math.random() * 0.35}`,
    ].join(';');
    container.appendChild(el);
  }
})();

// ── KANJI FLOATERS ────────────────────────────────────
(function initKanji() {
  const container = document.getElementById('kanji');
  const chars = ['繋','断','絆','会','孤','変','希','望','社','都','雨','夜'];
  chars.forEach((ch, i) => {
    const el  = document.createElement('div');
    el.className = 'kanji-char';
    el.textContent = ch;
    const size = 28 + Math.random() * 52;
    const dur  = 18 + Math.random() * 22;
    el.style.cssText = [
      `font-size:${size}px`,
      `left:${4 + Math.random() * 88}%`,
      `bottom:${Math.random() * 25}%`,
      `animation-duration:${dur}s`,
      `animation-delay:${-(i * 3.2 + Math.random() * 4)}s`,
    ].join(';');
    container.appendChild(el);
  });
})();
