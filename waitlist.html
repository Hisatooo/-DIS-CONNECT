<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>(DIS)CONNECT</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;600;700;800;900&family=Noto+Serif+JP:wght@200;300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sora', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Grain ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028; pointer-events: none; z-index: 9999;
    }

    /* ── Background orbs ── */
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none;
      filter: blur(140px);
      transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .orb-1 {
      width: 900px; height: 900px;
      top: -360px; left: 50%; transform: translateX(-52%);
      background: radial-gradient(circle, rgba(37,99,235,0.24) 0%, rgba(96,165,250,0.08) 45%, transparent 65%);
      animation: driftA 22s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 650px; height: 650px;
      bottom: -220px; right: -160px;
      background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, rgba(167,139,250,0.06) 50%, transparent 65%);
      animation: driftB 28s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 500px; height: 500px;
      top: 40%; left: -120px;
      background: radial-gradient(circle, rgba(16,185,129,0.09) 0%, transparent 70%);
      animation: driftC 35s ease-in-out infinite alternate;
    }
    .orb-4 {
      width: 700px; height: 700px;
      bottom: -300px; left: -200px;
      background: radial-gradient(circle, rgba(251,146,60,0.08) 0%, rgba(249,115,22,0.04) 40%, transparent 65%);
      animation: driftB 40s ease-in-out infinite alternate-reverse;
    }
    @keyframes driftA {
      from { transform: translateX(-58%) translateY(0px) scale(1); }
      to   { transform: translateX(-44%) translateY(70px) scale(1.06); }
    }
    @keyframes driftB {
      from { transform: translateX(0) translateY(0) scale(1); }
      to   { transform: translateX(-60px) translateY(-80px) scale(0.94); }
    }
    @keyframes driftC {
      from { transform: translateX(0) translateY(0); }
      to   { transform: translateX(40px) translateY(-50px); }
    }

    /* ── HERO ── */
    .hero {
      min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      padding: 100px 28px 120px;
      text-align: center;
    }

    /* Ensō — thin white circle behind title */
    .enso {
      position: absolute;
      width: min(74vw, 540px); height: min(74vw, 540px);
      border-radius: 50%;
      border: 0.5px solid rgba(255,255,255,0.045);
      pointer-events: none; z-index: 1;
      opacity: 0;
      animation: ensoIn 3.5s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .enso::after {
      content: '';
      position: absolute; inset: 18px;
      border-radius: 50%;
      border: 0.5px solid rgba(255,255,255,0.022);
    }
    @keyframes ensoIn {
      from { opacity: 0; transform: scale(0.88) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .hero-inner { will-change: transform, opacity; position: relative; z-index: 2; }

    /* Title */
    .wordmark {
      font-size: clamp(68px, 17vw, 210px);
      font-weight: 900;
      letter-spacing: -0.045em;
      line-height: 0.9;
      margin-bottom: 32px;
      white-space: nowrap;
    }

    .c-wrap {
      display: inline-block;
      overflow: hidden;
      vertical-align: top;
      line-height: 1.08;
    }

    .c {
      display: inline-block;
      transform: translateY(110%);
      filter: blur(10px);
      animation: charReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes charReveal {
      to { transform: translateY(0); filter: blur(0); }
    }

    .paren { color: rgba(255,255,255,0.5); }
    .dis   { color: rgba(255,255,255,0.7); }

    /* Subtitle */
    .reconnect {
      display: block;
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(22px, 5.5vw, 66px);
      font-weight: 200;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.88);
      font-style: italic;
      margin-bottom: 44px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Waseda tagline */
    .waseda-line {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(13px, 2.2vw, 17px);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.65);
      line-height: 1.8;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.9s 2.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scroll cue */
    .scroll-cue {
      position: absolute; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0;
      animation: appear 0.6s 2.8s forwards;
    }
    @keyframes appear { to { opacity: 1; } }

    .scroll-cue-line {
      width: 1px; height: 56px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.35));
      animation: linePulse 2.8s 2.8s ease-in-out infinite;
    }
    @keyframes linePulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
      50%       { opacity: 1;  transform: scaleY(1); }
    }

    /* ── KINTSUGI DIVIDER ── */
    .kintsugi-wrap {
      width: 100%; height: 28px; overflow: visible;
      opacity: 0; transition: opacity 2s cubic-bezier(0.16,1,0.3,1);
    }
    .kintsugi-wrap.vis { opacity: 1; }
    .kintsugi-svg { width: 100%; height: 100%; display: block; }

    /* ── 波紋 RIPPLE ── */
    .hamonRing {
      position: fixed; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.5);
      width: 44px; height: 44px;
      transform: translate(-50%,-50%) scale(0);
      animation: hamonOut 1.9s cubic-bezier(0.15,0.8,0.35,1) forwards;
      pointer-events: none; z-index: 9000;
    }
    @keyframes hamonOut {
      0%   { transform: translate(-50%,-50%) scale(0);  opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(14); opacity: 0; }
    }

    /* ── MARQUEE ── */
    .marquee-wrap {
      padding: 40px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .marquee-wrap.vis { opacity: 1; }

    .marquee-track {
      display: flex;
      white-space: nowrap;
      animation: marqueeRoll 38s linear infinite;
    }
    @keyframes marqueeRoll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .m-item {
      display: inline-flex; align-items: center; gap: 24px;
      padding: 0 24px;
      font-size: clamp(13px, 2.2vw, 18px);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
    .m-dot {
      width: 3px; height: 3px;
      border-radius: 50%; background: rgba(255,255,255,0.1); flex-shrink: 0;
    }

    /* ── FORM SECTION ── */
    .form-section {
      max-width: 440px;
      margin: 0 auto;
      padding: 96px 24px 220px;
    }

    .eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(255,255,255,0.62);
      margin-bottom: 40px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 1s, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .eyebrow.vis { opacity: 1; transform: translateY(0); }

    .fields {
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; transform: translateY(24px);
      transition: opacity 1s 0.1s, transform 1s 0.1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .fields.vis { opacity: 1; transform: translateY(0); }

    .field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      padding: 16px 20px;
      width: 100%;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    }
    .field:focus {
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }
    .field.err { border-color: rgba(239,68,68,0.5); box-shadow: 0 0 0 3px rgba(239,68,68,0.08); }
    .field::placeholder { color: rgba(255,255,255,0.2); }

    .btn-join {
      background: #fff;
      color: #000;
      font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: none; border-radius: 14px;
      padding: 19px; cursor: pointer; width: 100%;
      margin-top: 6px;
      position: relative; overflow: hidden;
      transition: opacity 0.25s, transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 0 0 0 rgba(255,255,255,0);
    }
    .btn-join:hover {
      opacity: 0.9;
      box-shadow: 0 8px 32px rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }
    .btn-join:active { transform: scale(0.98) translateY(0); box-shadow: none; }
    .btn-join:disabled { opacity: 0.18; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Loading dots */
    .dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    .hint {
      font-size: 11px; color: rgba(255,255,255,0.42);
      text-align: center; margin-top: 16px;
      letter-spacing: 0.05em;
      opacity: 0; transform: translateY(8px);
      transition: opacity 1s 0.22s, transform 1s 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hint.vis { opacity: 1; transform: translateY(0); }

    /* Counter */
    .counter {
      font-size: 11px; color: rgba(255,255,255,0.48);
      text-align: center; letter-spacing: 0.12em;
      margin-top: 36px;
      opacity: 0; transition: opacity 0.8s 0.4s;
    }
    .counter.vis { opacity: 1; }

    /* ── SUCCESS ── */
    .success { display: none; text-align: center; padding: 20px 0; }
    .success.show {
      display: block;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .success-mark {
      display: block; font-size: 44px;
      margin-bottom: 20px;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .success-title {
      font-size: 24px; font-weight: 900;
      letter-spacing: -0.025em; margin-bottom: 10px;
    }
    .success-body { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.8; }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
      opacity: 0; transition: opacity 1.4s;
    }
    .footer.vis { opacity: 1; }
    .footer p { font-size: 10px; color: rgba(255,255,255,0.28); letter-spacing: 0.2em; text-transform: uppercase; }

    /* ── CANVAS (rain) ── */
    #bgCanvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }

    /* ── SAKURA PETALS ── */
    #petals { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .petal {
      position: absolute; top: -30px;
      border-radius: 150% 0% 150% 0% / 150% 0% 150% 0%;
      background: linear-gradient(135deg,
        rgba(255,192,203,0.7) 0%,
        rgba(255,218,225,0.5) 50%,
        rgba(255,240,245,0.25) 100%
      );
      box-shadow: 0 0 10px rgba(255,182,193,0.4), 0 2px 6px rgba(255,182,193,0.2);
      animation: petalFall linear infinite;
      pointer-events: none;
    }
    @keyframes petalFall {
      0%   { transform: translateY(0)    translateX(0)    rotate(0deg)   scale(1);    opacity: 0; }
      6%   { opacity: 1; }
      22%  { transform: translateY(22vh) translateX(35px) rotate(80deg)  scale(0.96); }
      45%  { transform: translateY(45vh) translateX(-18px)rotate(165deg) scale(1.02); }
      68%  { transform: translateY(68vh) translateX(28px) rotate(250deg) scale(0.94); }
      90%  { opacity: 0.85; }
      100% { transform: translateY(112vh)translateX(-10px)rotate(340deg) scale(0.8);  opacity: 0; }
    }

    /* ── KANJI LAYER ── */
    #kanji { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .kanji-char {
      position: absolute;
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Sora', sans-serif;
      font-weight: 900;
      color: rgba(255,255,255,0.1);
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 40px rgba(200,220,255,0.25), 0 0 80px rgba(200,220,255,0.1);
      animation: kanjiFly linear infinite;
    }
    @keyframes kanjiFly {
      0%   { transform: translateY(0)     scale(1);    opacity: 0; }
      10%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(-40vh) scale(1.15); opacity: 0; }
    }

    /* ── SAKURA TREE SECTION ── */
    .sakura-section {
      height: 220vh;
      position: relative;
    }
    .sakura-sticky {
      position: sticky;
      top: 0;
      height: 100svh;
      overflow: hidden;
    }
    #treeCanvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .tree-hint {
      position: absolute;
      bottom: 52px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Noto Serif JP', serif;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.32em;
      color: rgba(255,255,255,0.22);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.8s;
    }
    .tree-hint.vis { opacity: 1; }

    /* ── LANG BAR ── */
    .lang-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-top: 1px solid #0d0d0d;
      display: flex;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      gap: 8px;
    }
    .lang-btn {
      flex: 1; background: transparent;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      color: rgba(255,255,255,0.35); font-size: 12px; font-weight: 700;
      letter-spacing: 0.04em; padding: 11px 8px;
      cursor: pointer; font-family: 'Sora', sans-serif;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .lang-btn.active { background: #fff; color: #000; border-color: #fff; }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="petals"></div>
<div id="kanji"></div>
<div class="orb orb-1" id="orb1"></div>
<div class="orb orb-2" id="orb2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<!-- Lang bar -->
<div class="lang-bar">
  <button class="lang-btn active" id="lang-ja-btn" onclick="setLang('ja')">🇯🇵 日本語</button>
  <button class="lang-btn"        id="lang-en-btn" onclick="setLang('en')">🇺🇸 English</button>
</div>

<!-- ── HERO ── -->
<section class="hero">
  <div class="enso"></div>
  <div class="hero-inner" id="heroInner">
    <div class="wordmark" id="wordmark" aria-label="(DIS)CONNECT"></div>
    <span class="reconnect">to Reconnect.</span>
    <p class="waseda-line" id="wasedaLine"></p>
  </div>
  <div class="scroll-cue">
    <div class="scroll-cue-line"></div>
  </div>
</section>

<!-- ── KINTSUGI DIVIDER ── -->
<div class="kintsugi-wrap" id="kintsugiWrap" data-rev>
  <svg class="kintsugi-svg" viewBox="0 0 1200 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,14 L138,13 L182,6 L226,20 L302,9 L372,18 L435,5 L509,14 L576,8 L646,20 L716,11 L796,6 L866,18 L938,9 L1018,16 L1096,7 L1200,13"
          stroke="rgba(212,175,55,0.32)" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M302,9 L316,2 L333,0"   stroke="rgba(212,175,55,0.17)" stroke-width="0.5" fill="none"/>
    <path d="M646,20 L657,25 L676,27" stroke="rgba(212,175,55,0.17)" stroke-width="0.5" fill="none"/>
    <path d="M866,18 L878,23 L902,25 L920,22" stroke="rgba(212,175,55,0.13)" stroke-width="0.4" fill="none"/>
    <path d="M435,5 L445,0 L458,-1"  stroke="rgba(212,175,55,0.12)" stroke-width="0.4" fill="none"/>
  </svg>
</div>

<!-- ── MARQUEE ── -->
<div class="marquee-wrap" id="marqueeWrap">
  <div class="marquee-track" id="marqueeTrack"></div>
</div>

<!-- ── SAKURA TREE ── -->
<div class="sakura-section" id="sakuraSection">
  <div class="sakura-sticky">
    <canvas id="treeCanvas"></canvas>
    <p class="tree-hint" id="treeHint">満開へ — スクロール</p>
  </div>
</div>

<!-- ── FORM ── -->
<section class="form-section">
  <p class="eyebrow" id="eyebrow" data-rev></p>

  <div id="formState">
    <div class="fields" id="fields" data-rev>
      <input id="wl-name"  class="field" type="text"  autocomplete="name">
      <input id="wl-email" class="field" type="email" inputmode="email" autocomplete="email">
      <button id="wl-btn" class="btn-join"></button>
    </div>
    <p class="hint" id="hint" data-rev></p>
  </div>

  <div class="success" id="successMsg">
    <span class="success-mark">✦</span>
    <p class="success-title" id="successTitle"></p>
    <p class="success-body"  id="successBody"></p>
  </div>

  <p class="counter" id="counter"></p>
</section>

<!-- ── FOOTER ── -->
<footer class="footer" id="footer" data-rev>
  <p>© 2026 (DIS)CONNECT</p>
</footer>

<script>
// ── COPY ──────────────────────────────────────────────
const COPY = {
  ja: {
    waseda:       '早稲田生が本気で取り組む、社会課題を解決するアプリ。',
    eyebrow:      'ウェイトリストに登録',
    namePh:       '名前（任意）',
    emailPh:      'メールアドレス',
    btn:          '参加する',
    btnLoading:   '送信中',
    hint:         'スパムは送りません',
    successTitle: '登録完了',
    successBody:  'リリース時にご連絡します。',
    counter:      n => `${n} 人が登録済み`,
    err:          'エラーが発生しました。再度お試しください。',
  },
  en: {
    waseda:       'Built by Waseda students, solving real social problems.',
    eyebrow:      'Join the waitlist',
    namePh:       'Name (optional)',
    emailPh:      'Email address',
    btn:          'Join',
    btnLoading:   'Joining',
    hint:         'No spam, ever.',
    successTitle: 'You\'re on the list.',
    successBody:  'We\'ll reach out when we launch.',
    counter:      n => `${n} people signed up`,
    err:          'Something went wrong. Try again.',
  }
};

let lang = (navigator.language || 'ja').startsWith('ja') ? 'ja' : 'en';
let countCache = 0;

function setLang(l) {
  lang = l;
  document.getElementById('lang-ja-btn').classList.toggle('active', l === 'ja');
  document.getElementById('lang-en-btn').classList.toggle('active', l === 'en');
  render();
}

function render() {
  const c = COPY[lang];
  document.getElementById('wasedaLine').textContent = c.waseda;
  document.getElementById('eyebrow').textContent    = c.eyebrow;
  document.getElementById('wl-name').placeholder    = c.namePh;

// ── INK BRUSH RAIN + BOKEH ────────────────────────────
(function initRain() {
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');
  const isMob  = window.innerWidth < 768;
  const DROP_N  = isMob ? 65 : 140;
  const BOKEH_N = isMob ? 20 : 42;

  let W, H, drops, bokeh;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    drops = Array.from({ length: DROP_N  }, mkDrop);
    bokeh = Array.from({ length: BOKEH_N }, mkBokeh);
  }

  function mkDrop() {
    return {
      x:     Math.random() * (W + 200) - 100,
      y:     Math.random() * H,
      speed: 3 + Math.random() * 5,
      len:   14 + Math.random() * 32,
      wind:  0.22 + Math.random() * 0.38,
      lw:    0.3 + Math.random() * 1.6,
      alpha: 0.02 + Math.random() * 0.065,
      curve: (Math.random() - 0.5) * 9,
      bright: Math.random() < 0.06,
    };
  }

  const BH = [200,218,255,48,275,168];
  function mkBokeh() {
    return {
      x: Math.random()*W, y: Math.random()*H,
      r: 2+Math.random()*5,
      speed: 0.05+Math.random()*0.16,
      drift: (Math.random()-0.5)*0.11,
      hue:   BH[Math.floor(Math.random()*BH.length)],
      alpha: 0.07+Math.random()*0.17,
      pulse: Math.random()*Math.PI*2,
    };
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    // Bokeh
    bokeh.forEach(b => {
      b.pulse += 0.007;
      const a = b.alpha*(0.7+0.3*Math.sin(b.pulse));
      const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*7);
      g.addColorStop(0,   `hsla(${b.hue},88%,80%,${a})`);
      g.addColorStop(0.4, `hsla(${b.hue},88%,75%,${a*0.3})`);
      g.addColorStop(1,   `hsla(${b.hue},88%,70%,0)`);
      ctx.beginPath(); ctx.fillStyle=g;
      ctx.arc(b.x,b.y,b.r*7,0,Math.PI*2); ctx.fill();
      b.y-=b.speed; b.x+=b.drift;
      if(b.y<-50){b.y=H+50; b.x=Math.random()*W;}
    });

    // Ink brush strokes
    ctx.lineCap = 'round';
    drops.forEach(d => {
      ctx.lineWidth = d.bright ? d.lw*2.2 : d.lw;
      if(d.bright){
        ctx.shadowBlur=12; ctx.shadowColor='rgba(210,235,255,0.85)';
        ctx.strokeStyle=`rgba(235,248,255,${d.alpha*3})`;
      } else {
        ctx.shadowBlur=3; ctx.shadowColor='rgba(175,210,255,0.4)';
        ctx.strokeStyle=`rgba(185,215,255,${d.alpha})`;
      }
      const x2=d.x-d.len*d.wind, y2=d.y-d.len;
      ctx.beginPath(); ctx.moveTo(d.x,d.y);
      if(Math.abs(d.curve)>2){
        ctx.quadraticCurveTo(d.x-d.len*d.wind*0.5+d.curve, d.y-d.len*0.5, x2, y2);
      } else { ctx.lineTo(x2,y2); }
      ctx.stroke();
      d.y+=d.speed; d.x+=d.wind;
      if(d.y>H+20){d.y=-20; d.x=Math.random()*(W+200)-100;}
    });
    ctx.shadowBlur=0;
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize, { passive: true });
  resize(); frame();
})();

// ── SAKURA TREE ───────────────────────────────────────
(function initSakuraTree() {
  const section = document.getElementById('sakuraSection');
  const canvas  = document.getElementById('treeCanvas');
  const ctx     = canvas.getContext('2d');
  const hint    = document.getElementById('treeHint');
  const MAX_D   = 9;

  let W, H, branches, blossoms, petals;

  // Xorshift seeded RNG for deterministic tree shape
  function mkRng(seed) {
    let s = seed >>> 0;
    return () => {
      s ^= s << 13; s ^= s >> 17; s ^= s << 5;
      return (s >>> 0) / 0xffffffff;
    };
  }

  function buildTree() {
    const rng = mkRng(31337);
    branches = []; blossoms = [];
    const sx = W * 0.5;
    const sy = H * 0.94;
    const trunk = Math.min(H * 0.24, 180);

    function gen(x1, y1, angle, len, d) {
      if (d > MAX_D || len < 3) return;
      const x2 = x1 + Math.cos(angle) * len;
      const y2 = y1 + Math.sin(angle) * len;
      const growAt = (d - 1) / MAX_D + rng() * (0.4 / MAX_D);
      branches.push({ x1, y1, x2, y2, d, growAt,
        lw: Math.max(0.4, (MAX_D - d + 2) * 0.72) });
      if (d >= MAX_D) {
        blossoms.push({ x: x2, y: y2, r: 2 + rng() * 3.5, growAt: growAt + 0.04 });
        return;
      }
      const sp  = 0.30 + rng() * 0.20;
      const nl  = len * (0.62 + rng() * 0.08);
      gen(x2, y2, angle - sp, nl, d + 1);
      gen(x2, y2, angle + sp, nl, d + 1);
      if (d < MAX_D - 2 && rng() > 0.42)
        gen(x2, y2, angle + (rng() - 0.5) * 0.22, nl * 0.88, d + 1);
    }
    gen(sx, sy, -Math.PI / 2, trunk, 1);
  }

  function initPetals() {
    petals = Array.from({ length: 30 }, () => mkPetal(true));
  }

  function mkPetal(scatter) {
    const src = blossoms.length
      ? blossoms[Math.floor(Math.random() * blossoms.length)]
      : { x: W / 2, y: H * 0.3 };
    return {
      x:  src.x + (Math.random() - 0.5) * 90,
      y:  scatter ? Math.random() * H : src.y + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * 0.7,
      vy: 0.25 + Math.random() * 0.5,
      r:  1.5 + Math.random() * 2.5,
      rot: Math.random() * Math.PI * 2,
      rs:  (Math.random() - 0.5) * 0.04,
      a:   0.35 + Math.random() * 0.55,
    };
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildTree();
    initPetals();
  }

  function getProgress() {
    const top    = section.getBoundingClientRect().top;
    const travel = section.offsetHeight - window.innerHeight;
    return Math.max(0, Math.min(1, -top / travel));
  }

  function draw(p) {
    ctx.clearRect(0, 0, W, H);

    // Branches
    branches.forEach(b => {
      if (p <= b.growAt) return;
      const sp = Math.min(1, (p - b.growAt) / (0.65 / MAX_D));
      const ex = b.x1 + (b.x2 - b.x1) * sp;
      const ey = b.y1 + (b.y2 - b.y1) * sp;
      const dr = b.d / MAX_D;
      ctx.lineWidth   = b.lw;
      ctx.lineCap     = 'round';
      ctx.strokeStyle = `rgba(255,255,255,${0.5 + (1 - dr) * 0.45})`;
      ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(ex, ey); ctx.stroke();
    });

    // Blossoms
    if (p > 0.70) {
      const bp = Math.min(1, (p - 0.70) / 0.30);
      blossoms.forEach(bl => {
        if (p < bl.growAt) return;
        const lp = Math.min(1, (p - bl.growAt) / 0.09);
        const a  = bp * lp * 0.9;
        ctx.beginPath();
        ctx.arc(bl.x, bl.y, bl.r * lp, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
        const g = ctx.createRadialGradient(bl.x, bl.y, 0, bl.x, bl.y, bl.r * 5);
        g.addColorStop(0, `rgba(255,255,255,${a * 0.38})`);
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.arc(bl.x, bl.y, bl.r * 5, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
      });
    }

    // Falling petals
    if (p > 0.86) {
      const fp = Math.min(1, (p - 0.86) / 0.14);
      petals.forEach(pt => {
        pt.x += pt.vx; pt.y += pt.vy; pt.rot += pt.rs;
        if (pt.y > H + 10) Object.assign(pt, mkPetal(false));
        ctx.save();
        ctx.translate(pt.x, pt.y); ctx.rotate(pt.rot);
        ctx.beginPath();
        ctx.ellipse(0, 0, pt.r, pt.r * 0.55, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${pt.a * fp})`;
        ctx.fill();
        ctx.restore();
      });
    }
  }

  let hintShown = false;
  function loop() {
    const p = getProgress();
    draw(p);
    if (!hintShown && p > 0.005) { hint.classList.add('vis'); hintShown = true; }
    if (p > 0.07) hint.classList.remove('vis');
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize, { passive: true });
  resize();
  loop();
})();
