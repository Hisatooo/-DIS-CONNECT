<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>(DIS)CONNECT</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;600;700;800;900&family=Noto+Serif+JP:wght@200;300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sora', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100svh;
      overflow-x: hidden;
    }

    /* 単一の淡いグラデーション */
    .bg-glow {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% -5%,
        rgba(90,90,200,0.13) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px 120px;
      text-align: center;
      position: relative; z-index: 1;
    }

    .hero-inner { will-change: transform, opacity; }

    .wordmark {
      font-size: clamp(64px, 17vw, 200px);
      font-weight: 900;
      letter-spacing: -0.045em;
      line-height: 0.9;
      margin-bottom: 28px;
      white-space: nowrap;
    }

    .c-wrap { display: inline-block; overflow: hidden; vertical-align: top; line-height: 1.08; }
    .c {
      display: inline-block;
      transform: translateY(110%);
      animation: charReveal 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes charReveal { to { transform: translateY(0); } }

    .paren { color: rgba(255,255,255,0.55); }
    .dis   { color: rgba(255,255,255,0.80); }

    .reconnect {
      display: block;
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(18px, 4.5vw, 54px);
      font-weight: 200;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.92);
      font-style: italic;
      margin-bottom: 32px;
      position: relative;
      opacity: 0; transform: translateY(16px);
      animation: fadeUp 0.9s 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .reconnect::after {
      content: '';
      position: absolute; bottom: -5px; left: 0;
      height: 1px; width: 0;
      background: linear-gradient(to right, rgba(255,255,255,0.45), transparent);
      animation: brushLine 1s 2.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes brushLine { to { width: 100%; } }

    .waseda-line {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(12px, 2vw, 15px);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.65);
      line-height: 1.9;
      opacity: 0; transform: translateY(10px);
      animation: fadeUp 0.8s 1.8s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .scroll-cue {
      position: absolute; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      opacity: 0; animation: appear 0.5s 2.6s forwards;
    }
    @keyframes appear { to { opacity: 1; } }
    .scroll-cue-line {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.28));
      animation: linePulse 2.4s 2.6s ease-in-out infinite;
    }
    @keyframes linePulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
      50%       { opacity: 1;  transform: scaleY(1); }
    }

    /* ── FORM ── */
    .form-section {
      max-width: 420px;
      margin: 0 auto;
      padding: 24px 20px 180px;
      position: relative; z-index: 1;
    }

    .glass-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border-radius: 24px;
      padding: 40px 28px 36px;
      position: relative; overflow: hidden;
      opacity: 0;
      transform: translateY(36px) scale(0.97);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
                  transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .glass-card.vis { opacity: 1; transform: translateY(0) scale(1); }
    .glass-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.055) 0%, transparent 55%);
      border-radius: inherit; pointer-events: none;
    }
    .glass-card::after {
      content: ''; position: absolute; inset: 0;
      border-radius: inherit; padding: 1px;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.12) 100%);
      -webkit-mask: linear-gradient(#fff,#fff) content-box, linear-gradient(#fff,#fff);
      -webkit-mask-composite: xor; mask-composite: exclude;
      pointer-events: none;
    }

    .eyebrow {
      font-family: 'Noto Serif JP', serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.75);
      margin-bottom: 30px;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.6s 0.15s cubic-bezier(0.16,1,0.3,1),
                  transform 0.6s 0.15s cubic-bezier(0.16,1,0.3,1);
    }
    .eyebrow.vis { opacity: 1; transform: translateY(0); }
    .eyebrow::after {
      content: ''; display: block;
      width: 0; height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.28), transparent);
      margin-top: 12px;
      transition: width 1.2s 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .eyebrow.vis::after { width: 100%; }

    .fields {
      display: flex; flex-direction: column; gap: 0;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.6s 0.28s cubic-bezier(0.16,1,0.3,1),
                  transform 0.6s 0.28s cubic-bezier(0.16,1,0.3,1);
    }
    .fields.vis { opacity: 1; transform: translateY(0); }

    .field-wrap { position: relative; margin-bottom: 6px; }
    .field-label {
      position: absolute; top: 14px; left: 2px;
      font-size: 14px; font-family: 'Sora', sans-serif;
      color: rgba(255,255,255,0.45);
      transition: top .25s cubic-bezier(0.16,1,0.3,1),
                  font-size .25s, color .25s, letter-spacing .25s;
      pointer-events: none;
    }
    .field:focus ~ .field-label,
    .field:not(:placeholder-shown) ~ .field-label {
      top: -11px; font-size: 10px;
      letter-spacing: 0.14em; color: rgba(255,255,255,0.5);
    }

    .field {
      background: transparent; border: none;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      border-radius: 0; color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 16px; padding: 14px 2px 12px;
      width: 100%; outline: none; -webkit-appearance: none;
      transition: border-color 0.35s;
    }
    .field:focus { border-bottom-color: rgba(255,255,255,0.65); }
    .field.err   { border-bottom-color: rgba(239,68,68,0.7); }
    .field::placeholder { color: transparent; }

    .btn-join {
      background: #fff; color: #000;
      font-family: 'Noto Serif JP', serif;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.22em;
      border: none; border-radius: 14px;
      padding: 18px; cursor: pointer; width: 100%;
      margin-top: 28px; position: relative; overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s;
    }
    .btn-join::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), transparent);
      transition: left 0.55s cubic-bezier(0.16,1,0.3,1);
    }
    .btn-join:hover::before { left: 100%; }
    .btn-join:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.14), 0 12px 36px rgba(255,255,255,0.1);
    }
    .btn-join:active { transform: scale(0.97); box-shadow: 0 0 0 2px rgba(255,255,255,0.06); }
    .btn-join:disabled { opacity: 0.18; cursor: not-allowed; transform: none; box-shadow: none; }

    .dots::after { content: ''; animation: dots 1.2s steps(4,end) infinite; }
    @keyframes dots {
      0% { content: ''; } 25% { content: '.'; }
      50% { content: '..'; } 75% { content: '...'; }
    }

    .hint {
      font-size: 11px; color: rgba(255,255,255,0.52);
      text-align: center; margin-top: 16px; letter-spacing: 0.05em;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.6s 0.42s cubic-bezier(0.16,1,0.3,1),
                  transform 0.6s 0.42s;
    }
    .hint.vis { opacity: 1; transform: translateY(0); }

    .counter {
      font-size: 11px; color: rgba(255,255,255,0.55);
      text-align: center; letter-spacing: 0.12em; margin-top: 26px;
      opacity: 0; transition: opacity 0.8s;
    }
    .counter.vis { opacity: 1; }

    /* SUCCESS */
    .success { display: none; text-align: center; padding: 16px 0; }
    .success.show { display: block; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    .success-mark {
      display: block; font-size: 40px; margin-bottom: 16px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    .success-title { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 10px; }
    .success-body  { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.8; }

    /* FOOTER */
    .footer {
      text-align: center;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
      position: relative; z-index: 1;
      opacity: 0; transition: opacity 1.2s;
    }
    .footer.vis { opacity: 1; }
    .footer p { font-size: 10px; color: rgba(255,255,255,0.38); letter-spacing: 0.2em; text-transform: uppercase; }

    /* LANG BAR */
    .lang-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      gap: 8px;
    }
    .lang-btn {
      flex: 1; background: transparent;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      color: rgba(255,255,255,0.35); font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em; padding: 11px 8px;
      cursor: pointer; font-family: 'Sora', sans-serif;
      transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    .lang-btn.active { background: #fff; color: #000; border-color: #fff; }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="lang-bar">
  <button class="lang-btn active" id="lang-ja-btn" onclick="setLang('ja')">🇯🇵 日本語</button>
  <button class="lang-btn"        id="lang-en-btn" onclick="setLang('en')">🇺🇸 English</button>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner" id="heroInner">
    <div class="wordmark" id="wordmark" aria-label="(DIS)CONNECT"></div>
    <span class="reconnect">to Reconnect.</span>
    <p class="waseda-line" id="wasedaLine"></p>
  </div>
  <div class="scroll-cue"><div class="scroll-cue-line"></div></div>
</section>

<!-- FORM -->
<section class="form-section">
  <div class="glass-card" id="glassCard">
    <p class="eyebrow" id="eyebrow"></p>
    <div id="formState">
      <div class="fields" id="fields">
        <div class="field-wrap">
          <input id="wl-name" class="field" type="text" placeholder=" " autocomplete="name">
          <label class="field-label" id="label-name" for="wl-name"></label>
        </div>
        <div class="field-wrap">
          <input id="wl-email" class="field" type="email" inputmode="email" placeholder=" " autocomplete="email">
          <label class="field-label" id="label-email" for="wl-email"></label>
        </div>
        <button id="wl-btn" class="btn-join"></button>
      </div>
      <p class="hint" id="hint"></p>
    </div>
    <div class="success" id="successMsg">
      <span class="success-mark">✦</span>
      <p class="success-title" id="successTitle"></p>
      <p class="success-body"  id="successBody"></p>
    </div>
    <p class="counter" id="counter"></p>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer" id="footer">
  <p>© 2026 (DIS)CONNECT</p>
</footer>

<script>
const COPY = {
  ja: {
    waseda:       '早稲田生が本気で取り組む、社会課題を解決するアプリ。',
    eyebrow:      'ウェイトリストに登録',
    namePh:       '名前（任意）',
    emailPh:      'メールアドレス',
    btn:          '参加する',
    btnLoading:   '送信中',
    hint:         'スパムは送りません',
    successTitle: '登録完了',
    successBody:  'リリース時にご連絡します。',
    counter:      n => `${n} 人が登録済み`,
    err:          'エラーが発生しました。再度お試しください。',
  },
  en: {
    waseda:       'Built by Waseda students, solving real social problems.',
    eyebrow:      'Join the waitlist',
    namePh:       'Name (optional)',
    emailPh:      'Email address',
    btn:          'Join',
    btnLoading:   'Joining',
    hint:         'No spam, ever.',
    successTitle: "You're on the list.",
    successBody:  "We'll reach out when we launch.",
    counter:      n => `${n} people signed up`,
    err:          'Something went wrong. Try again.',
  }
};

let lang = (navigator.language || 'ja').startsWith('ja') ? 'ja' : 'en';
let countCache = 0;

function setLang(l) {
  lang = l;
  document.getElementById('lang-ja-btn').classList.toggle('active', l === 'ja');
  document.getElementById('lang-en-btn').classList.toggle('active', l === 'en');
  render();
}

function render() {
  const c = COPY[lang];
  document.getElementById('wasedaLine').textContent  = c.waseda;
  document.getElementById('eyebrow').textContent     = c.eyebrow;
  document.getElementById('label-name').textContent  = c.namePh;
  document.getElementById('label-email').textContent = c.emailPh;
  const btn = document.getElementById('wl-btn');
  if (!btn.disabled) btn.textContent = c.btn;
  document.getElementById('hint').textContent        = c.hint;
  document.getElementById('successTitle').textContent = c.successTitle;
  document.getElementById('successBody').textContent  = c.successBody;
  if (countCache > 0) {
    document.getElementById('counter').textContent = c.counter(countCache);
    document.getElementById('counter').classList.add('vis');
  }
}

function buildTitle() {
  const wm = document.getElementById('wordmark');
  const chars = [
    { ch: '(', cls: 'paren' }, { ch: 'D', cls: 'dis' }, { ch: 'I', cls: 'dis' },
    { ch: 'S', cls: 'dis' },   { ch: ')', cls: 'paren' },
    { ch: 'C', cls: '' }, { ch: 'O', cls: '' }, { ch: 'N', cls: '' },
    { ch: 'N', cls: '' }, { ch: 'E', cls: '' }, { ch: 'C', cls: '' }, { ch: 'T', cls: '' },
  ];
  wm.innerHTML = '';
  chars.forEach(({ ch, cls }, i) => {
    const wrap = document.createElement('span'); wrap.className = 'c-wrap';
    const inner = document.createElement('span');
    inner.className = 'c' + (cls ? ' ' + cls : '');
    inner.textContent = ch;
    inner.style.animationDelay = `${0.05 + i * 0.048}s`;
    wrap.appendChild(inner); wm.appendChild(wrap);
  });
}

// Scroll reveal
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('vis'); obs.unobserve(e.target); }
  });
}, { threshold: 0.08 });
obs.observe(document.getElementById('glassCard'));
obs.observe(document.getElementById('footer'));

// Stagger form elements
new IntersectionObserver(([e]) => {
  if (!e.isIntersecting) return;
  setTimeout(() => document.getElementById('eyebrow').classList.add('vis'), 80);
  setTimeout(() => document.getElementById('fields').classList.add('vis'), 220);
  setTimeout(() => document.getElementById('hint').classList.add('vis'), 360);
}, { threshold: 0.08 }).observe(document.getElementById('glassCard'));

// Hero parallax
const heroInner = document.getElementById('heroInner');
let raf = false;
window.addEventListener('scroll', () => {
  if (!raf) {
    requestAnimationFrame(() => {
      const y = window.scrollY, vh = window.innerHeight;
      heroInner.style.transform = `translateY(${y * 0.28}px)`;
      heroInner.style.opacity   = Math.max(0, 1 - y / (vh * 0.65));
      raf = false;
    });
    raf = true;
  }
}, { passive: true });

// Firebase
firebase.initializeApp({
  apiKey: "AIzaSyBhhdcJ7Yigw5VGxuJxXSicqqHPe2xNcCY",
  authDomain: "tuneout-a7c7b.firebaseapp.com",
  projectId: "tuneout-a7c7b",
  storageBucket: "tuneout-a7c7b.firebasestorage.app",
  messagingSenderId: "798608722916",
  appId: "1:798608722916:web:95d9766c02bdcfd52455f1"
});
const db = firebase.firestore();

db.collection('waitlist').get().then(snap => {
  countCache = snap.size;
  if (countCache > 0) {
    document.getElementById('counter').textContent = COPY[lang].counter(countCache);
    document.getElementById('counter').classList.add('vis');
  }
}).catch(() => {});

document.getElementById('wl-btn').addEventListener('click', async () => {
  const emailEl = document.getElementById('wl-email');
  const email   = emailEl.value.trim();
  const name    = document.getElementById('wl-name').value.trim();
  const c       = COPY[lang];

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailEl.classList.add('err'); emailEl.focus();
    setTimeout(() => emailEl.classList.remove('err'), 2400);
    return;
  }

  const btn = document.getElementById('wl-btn');
  btn.disabled = true; btn.classList.add('dots'); btn.textContent = c.btnLoading;

  try {
    const dup = await db.collection('waitlist').where('email', '==', email).get();
    if (!dup.empty) { showSuccess(); return; }
    await db.collection('waitlist').add({
      email, name: name || null,
      registeredAt: firebase.firestore.FieldValue.serverTimestamp(), lang
    });
    showSuccess();
  } catch {
    btn.disabled = false; btn.classList.remove('dots'); btn.textContent = c.btn;
    alert(c.err);
  }
});

function showSuccess() {
  document.getElementById('formState').style.display = 'none';
  document.getElementById('successMsg').classList.add('show');
}

buildTitle();
render();
</script>
</body>
</html>
