<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>(DIS)CONNECT</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100svh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── LAYOUT ── */
    .screen {
      max-width: 390px;
      margin: 0 auto;
      padding: 0 0 calc(100px + env(safe-area-inset-bottom));
    }

    /* ── HEADER ── */
    .header {
      padding: 60px 20px 8px;
      opacity: 0;
      animation: fadeIn 0.35s 0.1s ease both;
    }

    .large-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.37px;
      line-height: 1.18;
      margin-bottom: 6px;
    }

    .paren { color: rgba(255,255,255,0.45); }

    .subtitle {
      font-size: 15px;
      color: rgba(235,235,245,0.6);
      line-height: 1.5;
      margin-bottom: 2px;
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      color: rgba(235,235,245,0.4);
      letter-spacing: 0.01em;
      margin-top: 4px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 13px;
      font-weight: 400;
      color: rgba(235,235,245,0.55);
      letter-spacing: 0.01em;
      padding: 16px 20px 6px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.35s 0.2s ease both;
    }

    /* ── INSET GROUPED LIST ── */
    .list-card {
      margin: 0 16px;
      background: #1C1C1E;
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.35s 0.25s ease both;
    }

    .list-row {
      display: flex;
      align-items: center;
      min-height: 44px;
      padding: 11px 16px;
      border-bottom: 0.5px solid rgba(60,60,67,0.36);
    }
    .list-row:last-child { border-bottom: none; }

    .row-label {
      font-size: 17px;
      font-weight: 400;
      color: #fff;
      min-width: 72px;
      flex-shrink: 0;
    }

    .row-input {
      flex: 1;
      font-size: 17px;
      font-family: inherit;
      background: transparent;
      border: none;
      outline: none;
      color: rgba(235,235,245,0.9);
      text-align: right;
      -webkit-appearance: none;
      min-width: 0;
    }
    .row-input::placeholder { color: rgba(235,235,245,0.3); }
    .row-input.err { color: #FF453A; }

    /* ── BUTTON ── */
    .btn-wrap {
      padding: 0 16px;
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 0.35s 0.32s ease both;
    }

    .btn-join {
      display: block;
      width: 100%;
      background: #007AFF;
      color: #fff;
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      border: none;
      border-radius: 14px;
      padding: 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-join:active:not(:disabled) { opacity: 0.75; }
    .btn-join:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── HINT ── */
    .hint-text {
      font-size: 13px;
      color: rgba(235,235,245,0.4);
      text-align: center;
      padding: 8px 20px 0;
      line-height: 1.5;
      opacity: 0;
      animation: fadeIn 0.35s 0.38s ease both;
    }

    /* ── COUNTER ── */
    .counter-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px 20px 0;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .counter-row.vis { opacity: 1; }
    .counter-dot { width: 6px; height: 6px; background: #30D158; border-radius: 50%; flex-shrink: 0; }
    .counter-text { font-size: 13px; color: rgba(235,235,245,0.55); }

    /* ── DOTS ANIMATION ── */
    .dots::after { content: ''; animation: dots 1.2s steps(4,end) infinite; }
    @keyframes dots {
      0%  { content: ''; }  25% { content: '.'; }
      50% { content: '..'; } 75% { content: '...'; }
    }

    /* ── SUCCESS ── */
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 32px;
      min-height: 60svh;
      opacity: 0;
      animation: fadeIn 0.4s ease both;
    }
    .success-screen.show { display: flex; }

    .success-icon {
      width: 72px; height: 72px;
      background: #30D158;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .success-icon svg { width: 36px; height: 36px; }
    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .success-title {
      font-size: 22px; font-weight: 700;
      letter-spacing: 0.35px;
      margin-bottom: 8px;
    }
    .success-body {
      font-size: 15px; color: rgba(235,235,245,0.6);
      line-height: 1.6;
    }

    /* ── LANG BAR (Segmented Control style) ── */
    .lang-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: rgba(28,28,30,0.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(60,60,67,0.36);
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
    .seg-control {
      display: flex;
      background: rgba(118,118,128,0.24);
      border-radius: 9px;
      padding: 2px;
      gap: 2px;
    }
    .seg-btn {
      flex: 1;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: rgba(235,235,245,0.6);
      font-family: inherit;
      font-size: 13px;
      font-weight: 400;
      padding: 6px 0;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .seg-btn.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<div class="screen">
  <!-- MAIN FORM -->
  <div id="mainView">
    <div class="header">
      <h1 class="large-title"><span class="paren">(</span>DIS<span class="paren">)</span>CONNECT</h1>
      <p class="subtitle" id="subtitle"></p>
      <span class="badge" id="badge"></span>
    </div>

    <p class="section-label" id="sectionLabel"></p>

    <div class="list-card">
      <div class="list-row">
        <span class="row-label" id="label-name"></span>
        <input id="wl-name" class="row-input" type="text" placeholder=" " autocomplete="name">
      </div>
      <div class="list-row">
        <span class="row-label" id="label-email"></span>
        <input id="wl-email" class="row-input" type="email" inputmode="email" placeholder=" " autocomplete="email">
      </div>
    </div>

    <div class="btn-wrap">
      <button id="wl-btn" class="btn-join"></button>
    </div>

    <p class="hint-text" id="hint"></p>

    <div class="counter-row" id="counterRow">
      <span class="counter-dot"></span>
      <span class="counter-text" id="counter"></span>
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="success-screen" id="successMsg">
    <div class="success-icon">
      <svg viewBox="0 0 36 36" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="7,18 14,25 29,11"/>
      </svg>
    </div>
    <p class="success-title" id="successTitle"></p>
    <p class="success-body"  id="successBody"></p>
  </div>
</div>

<!-- LANG BAR -->
<div class="lang-bar">
  <div class="seg-control">
    <button class="seg-btn active" id="lang-ja-btn" onclick="setLang('ja')">🇯🇵 日本語</button>
    <button class="seg-btn"        id="lang-en-btn" onclick="setLang('en')">🇺🇸 English</button>
  </div>
</div>

<script>
const COPY = {
  ja: {
    subtitle:     '早稲田生が本気で取り組む、社会課題を解決するアプリ。',
    badge:        '早稲田大学発',
    sectionLabel: 'ウェイトリスト',
    nameLabel:    '名前',
    emailLabel:   'メール',
    namePh:       '任意',
    emailPh:      '例) abc@mail.com',
    btn:          '参加する',
    btnLoading:   '送信中',
    hint:         'スパムは送りません。いつでも退会できます。',
    successTitle: '登録完了',
    successBody:  'リリース時にご連絡します。\nお楽しみに。',
    counter:      n => `${n} 人が登録済み`,
    err:          'エラーが発生しました。もう一度お試しください。',
  },
  en: {
    subtitle:     'Built by Waseda students, solving real social problems.',
    badge:        'Waseda University',
    sectionLabel: 'Waitlist',
    nameLabel:    'Name',
    emailLabel:   'Email',
    namePh:       'Optional',
    emailPh:      'you@example.com',
    btn:          'Join Waitlist',
    btnLoading:   'Joining',
    hint:         'No spam, ever. Unsubscribe anytime.',
    successTitle: "You're on the list.",
    successBody:  "We'll reach out when we launch.\nStay tuned.",
    counter:      n => `${n} people signed up`,
    err:          'Something went wrong. Please try again.',
  }
};

let lang = (navigator.language || 'ja').startsWith('ja') ? 'ja' : 'en';
let countCache = 0;

function setLang(l) {
  lang = l;
  document.getElementById('lang-ja-btn').classList.toggle('active', l === 'ja');
  document.getElementById('lang-en-btn').classList.toggle('active', l === 'en');
  render();
}

function render() {
  const c = COPY[lang];
  document.getElementById('subtitle').textContent    = c.subtitle;
  document.getElementById('badge').textContent       = c.badge;
  document.getElementById('sectionLabel').textContent = c.sectionLabel;
  document.getElementById('label-name').textContent  = c.nameLabel;
  document.getElementById('label-email').textContent = c.emailLabel;
  document.getElementById('wl-name').placeholder     = c.namePh;
  document.getElementById('wl-email').placeholder    = c.emailPh;
  const btn = document.getElementById('wl-btn');
  if (!btn.disabled) btn.textContent = c.btn;
  document.getElementById('hint').textContent        = c.hint;
  document.getElementById('successTitle').textContent = c.successTitle;
  document.getElementById('successBody').textContent  = c.successBody;
  if (countCache > 0) {
    document.getElementById('counter').textContent = c.counter(countCache);
    document.getElementById('counterRow').classList.add('vis');
  }
}

firebase.initializeApp({
  apiKey: "AIzaSyBhhdcJ7Yigw5VGxuJxXSicqqHPe2xNcCY",
  authDomain: "tuneout-a7c7b.firebaseapp.com",
  projectId: "tuneout-a7c7b",
  storageBucket: "tuneout-a7c7b.firebasestorage.app",
  messagingSenderId: "798608722916",
  appId: "1:798608722916:web:95d9766c02bdcfd52455f1"
});
const db = firebase.firestore();

db.collection('waitlist').get().then(snap => {
  countCache = snap.size;
  if (countCache > 0) {
    document.getElementById('counter').textContent = COPY[lang].counter(countCache);
    document.getElementById('counterRow').classList.add('vis');
  }
}).catch(() => {});

document.getElementById('wl-btn').addEventListener('click', async () => {
  const emailEl = document.getElementById('wl-email');
  const email   = emailEl.value.trim();
  const name    = document.getElementById('wl-name').value.trim();
  const c       = COPY[lang];

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailEl.classList.add('err'); emailEl.focus();
    setTimeout(() => emailEl.classList.remove('err'), 2400);
    return;
  }

  const btn = document.getElementById('wl-btn');
  btn.disabled = true; btn.classList.add('dots'); btn.textContent = c.btnLoading;

  try {
    const dup = await db.collection('waitlist').where('email', '==', email).get();
    if (!dup.empty) { showSuccess(); return; }
    await db.collection('waitlist').add({
      email, name: name || null,
      registeredAt: firebase.firestore.FieldValue.serverTimestamp(), lang
    });
    showSuccess();
  } catch {
    btn.disabled = false; btn.classList.remove('dots'); btn.textContent = c.btn;
    alert(c.err);
  }
});

function showSuccess() {
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('successMsg').classList.add('show');
}

render();
</script>
</body>
</html>
