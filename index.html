<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TuneOut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ===== BASE ===== */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #000;
      color: #E2E2E2;
      overscroll-behavior: none;
    }
    input, textarea, select, button { font-family: 'Sora', sans-serif; }

    /* ===== SCROLLBAR ===== */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ===== PAGE SYSTEM ===== */
    .page {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      overflow: hidden;
    }
    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== CARD ===== */
    .card {
      background: #1C1C1E;
      border-radius: 1.25rem;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ===== INPUTS ===== */
    .input-field {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 0.875rem;
      padding: 0.9rem 1rem;
      width: 100%;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: rgba(255,255,255,0.35); }
    .input-field::placeholder { color: #6B7280; }

    /* ===== BOTTOM NAV ===== */
    .nav-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 2rem);
      max-width: 400px;
      background: rgba(22,22,24,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 9999px;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.25,1,0.5,1), opacity 0.3s ease;
    }
    .nav-bar.nav-hidden {
      transform: translate(-50%, 200%);
      opacity: 0;
    }
    .nav-btn { transition: color 0.18s ease; position: relative; }
    .nav-btn .icon-solid { display: none; }
    .nav-btn.active-nav .icon-outline { display: none; }
    .nav-btn.active-nav .icon-solid { display: block; }

    /* ===== NOTIFICATION DOT ===== */
    .notif-dot {
      position: absolute;
      top: 0.35rem;
      right: 0.35rem;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      border: 1.5px solid #000;
    }

    /* ===== SLIDER ===== */
    .slider-track {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      padding: 6px;
      position: relative;
      user-select: none;
      touch-action: none;
      overflow: hidden;
    }
    .slider-reveal {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 9999px;
      pointer-events: none;
    }
    .slider-thumb {
      background: white;
      border-radius: 9999px;
      position: absolute;
      top: 6px; left: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      cursor: grab;
      transition: box-shadow 0.2s;
    }
    .slider-thumb:active { cursor: grabbing; box-shadow: 0 0 0 6px rgba(255,255,255,0.1); }
    .slider-label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      color: #6B7280;
      pointer-events: none;
      font-weight: 600;
      font-size: 0.875rem;
      white-space: nowrap;
      z-index: 1;
      transition: opacity 0.15s;
    }

    /* ===== COUNTDOWN RING ===== */
    .countdown-ring { transform: rotate(-90deg); }
    .countdown-ring circle { transition: stroke-dashoffset 1s linear; }

    /* ===== ANIMATIONS ===== */
    @keyframes like-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .like-pop { animation: like-pop 0.28s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }

    @keyframes pulse-ring {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.55; }
    }
    .pulse-ring { animation: pulse-ring 2.2s ease infinite; }

    /* ===== COMMENT PANEL ===== */
    #comment-panel {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 300;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.25,1,0.5,1);
      display: flex;
      flex-direction: column;
    }
    #comment-panel.open { transform: translateX(0); }

    /* ===== CHALLENGE BANNER ===== */
    #challenge-banner {
      position: fixed;
      top: 1rem; left: 1rem; right: 1rem;
      max-width: 400px;
      margin: 0 auto;
      background: rgba(25,25,27,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1.1rem;
      padding: 0.9rem 1rem;
      z-index: 9999;
      transform: translateY(-160%);
      transition: transform 0.5s cubic-bezier(0.19,1,0.22,1);
      box-shadow: 0 12px 32px rgba(0,0,0,0.7);
    }
    #challenge-banner.visible { transform: translateY(0); }

    /* ===== BOTTOM SHEET MODAL ===== */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet-body {
      width: 100%;
      max-width: 400px;
      background: #111113;
      border-radius: 1.5rem 1.5rem 0 0;
      padding: 0 1.25rem 2rem;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.25,1,0.5,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .sheet-overlay.open .sheet-body { transform: translateY(0); }
    .sheet-handle {
      width: 2.5rem; height: 4px;
      background: #3a3a3c;
      border-radius: 2px;
      margin: 0.75rem auto 1.25rem;
    }

    /* ===== TIME PICKER ===== */
    .picker-col {
      width: 5rem;
      height: 15rem;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .picker-col::-webkit-scrollbar { display: none; }
    .picker-item {
      height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-size: 2rem;
      font-weight: 900;
      color: white;
      opacity: 0.25;
      transition: opacity 0.15s;
    }
    .picker-pad { height: 5.5rem; flex-shrink: 0; }

    /* ===== WEEKLY CHART ===== */
    .week-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
    }
    .week-bar-wrap {
      flex: 1;
      width: 100%;
      max-width: 28px;
      background: #2C2C2E;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .week-bar-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #606060;
      border-radius: 4px;
      transition: height 0.6s cubic-bezier(0.25,1,0.5,1);
    }
    .week-bar-fill.today { background: white; }

    /* ===== TOGGLE SWITCH ===== */
    .toggle {
      position: relative;
      width: 2.75rem;
      height: 1.5rem;
      border-radius: 9999px;
      background: #3a3a3c;
      cursor: pointer;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle.on { background: white; }
    .toggle-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 1.25rem; height: 1.25rem;
      border-radius: 50%;
      background: #888;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle.on .toggle-knob {
      transform: translateX(1.25rem);
      background: #000;
    }

    /* ===== FEED TABS ===== */
    .feed-tab {
      position: relative;
      padding-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.9375rem;
      color: #6B7280;
      transition: color 0.2s;
    }
    .feed-tab.active-tab { color: white; }
    .feed-tab.active-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 1.5rem; height: 2px;
      background: white;
      border-radius: 1px;
    }

    /* ===== PADDING FOR NAV ===== */
    .pb-nav { padding-bottom: 7rem; }
  </style>
</head>
<body class="antialiased overflow-hidden h-screen w-screen">

<!-- APP ROOT                                                    -->
<!-- ========================================================== -->
<div id="app" class="h-full w-full max-w-md mx-auto relative overflow-hidden bg-black">

  <!-- ===================== CHALLENGE ===================== -->

    <div id="invite-overlay" class="absolute inset-0 bg-black/60"></div>

  <!-- ===== COMMENT PANEL (slide from right) ===== -->
  <div id="comment-panel">

      </button>

  </div>

  <!-- ===== CHALLENGE NOTIFICATION BANNER ===== -->
  <div id="challenge-banner">

        <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center flex-shrink-0">

          </svg>
        </div>
        <div>

          <p id="banner-sub" class="text-xs text-gray-400">読み込み中...</p>
        </div>

      <button id="banner-join-btn" class="ml-3 bg-white text-black px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">
        参加する
      </button>
    </div>
  </div>

    <div class="sheet-body">
      <div class="sheet-handle"></div>
      <h3 class="text-xl font-black text-white text-center mb-1">デトックス開始</h3>
      <p class="text-gray-600 text-sm text-center mb-5">制限するアプリと時間をセット</p>

      <div class="mb-5">
        <p class="text-xs text-gray-600 font-semibold mb-3">制限するアプリ</p>
        <div id="app-chip-list" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 h-px bg-gray-800"></div>
        <p class="text-xs text-gray-600 font-semibold">時間</p>
        <div class="flex-1 h-px bg-gray-800"></div>
      </div>

          <span class="text-3xl font-black text-gray-600">:</span>
          <div id="picker-minutes" class="picker-col"></div>
        </div>
      </div>

      <!-- Slider -->

        <div class="slider-reveal" id="manual-reveal"></div>
        <div class="slider-thumb w-20 h-14" id="manual-thumb">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
        <span class="slider-label">スワイプして開始</span>
      </div>

      <button id="manual-cancel-btn" class="w-full text-gray-600 font-semibold py-3 mt-1 text-sm">キャンセル</button>
    </div>
  </div>

    <div style="width:100%;max-width:360px;margin:1rem;background:#1C1C1E;border-radius:1.25rem;padding:1.5rem;">

      <p id="confirm-msg" class="text-gray-500 text-sm text-center mb-6"></p>
      <div class="flex space-x-3">
        <button id="confirm-cancel-btn" class="flex-1 border border-gray-700 text-gray-300 font-semibold py-3 rounded-full text-sm">キャンセル</button>

  </div>

      </svg>
    </button>
    <button class="nav-btn p-3 text-gray-500" data-page="friends">

      <svg class="icon-solid w-7 h-7" fill="currentColor" viewBox="0 0 24 24">

      </svg>
    </button>
    <!-- CENTER: TuneOut -->
    <button class="nav-btn p-3 text-gray-500" id="tuneout-nav-btn" data-page="tuneout">
      <svg class="icon-outline w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M6 2v6l4 4-4 4v6h12v-6l-4-4 4-4V2H6z"/>
      </svg>
      <svg class="icon-solid w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
        <path d="M6 2v6l4.002 4.002L6 16v6h12v-6l-4.002-4.002L18 8V2H6z"/>
      </svg>
    </button>
    <button class="nav-btn p-3 text-gray-500" data-page="messages">
      <svg class="icon-outline w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>

function getStreak(history) {
  const completed = history.filter(h => h.completed);
  if (!completed.length) return 0;
  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const dates = new Set(completed.map(h => dateKey(new Date(h.date))));
  const now = new Date();
  const todayKey = dateKey(now);
  const startOffset = dates.has(todayKey) ? 0 : 1;
  let streak = 0;
  for (let i = startOffset; i < 365; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    if (dates.has(dateKey(d))) streak++;
    else break;
  }
  return streak;
}

function fmtDuration(sec, alwaysHours = false) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  if (h > 0 || alwaysHours) return `${h}時間${m > 0 ? m + '分' : ''}`;
  return `${m}分`;
}
function fmtCountdown(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('ja-JP', { month:'short', day:'numeric' });

      heart.setAttribute('fill', p.liked ? 'currentColor' : 'none');
      heart.className = `w-5 h-5 heart-ico ${p.liked?'text-red-500':'text-gray-600'}`;
      cnt.textContent = p.likes;
      cnt.className   = `text-xs like-cnt ${p.liked?'text-red-500':'text-gray-600'}`;
      heart.classList.add('like-pop');
      heart.addEventListener('animationend', () => heart.classList.remove('like-pop'), {once:true});
    });
    // comment
    el.querySelector('.comment-btn').addEventListener('click', e => {
      e.stopPropagation();
      openCommentPanel(p.id);
    });
    // profile
    el.querySelectorAll('.profile-trig').forEach(t => {
      t.addEventListener('click', e => { e.stopPropagation(); openUserProfile(t.dataset.uid); });
    });
    list.appendChild(el);
  });
}

function startSession(durationSec, isChallenge = false) {
  if (S.activeSession) return;
  const sess = { startTime: Date.now(), totalDuration: durationSec, isChallenge };
  S.activeSession = { ...sess, timerId: null };
  localStorage.setItem('to_active_session', JSON.stringify(sess));
  renderSessionPage();
  goto('session');
  tickSession();
  S.activeSession.timerId = setInterval(tickSession, 1000);
  // update tuneout nav icon
  const tb = document.getElementById('tuneout-nav-btn');
  if (tb) { tb.classList.add('active-nav','text-white'); tb.classList.remove('text-gray-500'); }
}

function tickSession() {
  const sess = S.activeSession;
  if (!sess) return;
  const elapsed   = (Date.now() - sess.startTime) / 1000;
  const remaining = sess.totalDuration - elapsed;
  const timerEl   = document.getElementById('sess-timer');
  const ringEl    = document.getElementById('sess-ring');
  if (timerEl) timerEl.textContent = fmtCountdown(remaining);
  if (ringEl) {
    const pct    = Math.max(0, remaining / sess.totalDuration);
    ringEl.style.strokeDashoffset = RING_CIRC * (1 - pct);
  }
  if (remaining <= 0) endSession(true);
}

function endSession(completed) {
  const sess = S.activeSession;
  if (!sess) return;
  clearInterval(sess.timerId);
  localStorage.removeItem('to_active_session');
  const elapsed  = (Date.now() - sess.startTime) / 1000;
  const duration = completed ? sess.totalDuration : elapsed;
  if (elapsed > 10) {
    const h = getHistory();
    h.push({ duration, date: Date.now(), completed });
    saveHistory(h);
  }
  S.activeSession = null;
  const tb = document.getElementById('tuneout-nav-btn');
  if (tb) { tb.classList.remove('active-nav','text-white'); tb.classList.add('text-gray-500'); }
  renderPostSession(duration, completed);
}

// ================================================================
// SLIDER UTILITY
// ================================================================
function initSlider(trackId, thumbId, revealId, onComplete) {
  const track  = document.getElementById(trackId);
  const thumb  = document.getElementById(thumbId);
  const reveal = document.getElementById(revealId);
  if (!track || !thumb || !reveal) return;

  let dragging = false;

  function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

  function onStart(e) { e.preventDefault(); dragging = true; }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const rect   = track.getBoundingClientRect();
    const maxPos = rect.width - thumb.offsetWidth - 12;
    let pos = getX(e) - rect.left - thumb.offsetWidth / 2;
    pos = Math.max(0, Math.min(pos, maxPos));
    thumb.style.left = `${pos + 6}px`;
    reveal.style.width = `${pos + thumb.offsetWidth / 2}px`;
    const label = track.querySelector('.slider-label');
    if (label) label.style.opacity = Math.max(0, 1 - (pos / maxPos) * 2);
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    const rect   = track.getBoundingClientRect();
    const maxPos = rect.width - thumb.offsetWidth - 12;
    const pos    = parseFloat(thumb.style.left || '6') - 6;
    if (pos >= maxPos * 0.85) {
      onComplete();
    } else {
      resetSlider(trackId, thumbId, revealId);
    }
  }

  thumb.addEventListener('mousedown',  onStart);
  thumb.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove, { passive: false });
  document.addEventListener('mouseup',  onEnd);
  document.addEventListener('touchend', onEnd);
}

function resetSlider(trackId, thumbId, revealId) {
  const thumb  = document.getElementById(thumbId);
  const reveal = document.getElementById(revealId);
  const track  = document.getElementById(trackId);
  if (!thumb || !reveal) return;
  thumb.style.transition  = 'left 0.3s ease';
  reveal.style.transition = 'width 0.3s ease';
  thumb.style.left   = '6px';
  reveal.style.width = '0px';
  const label = track?.querySelector('.slider-label');
  if (label) label.style.opacity = '1';
  setTimeout(() => { thumb.style.transition = ''; reveal.style.transition = ''; }, 320);
}

    const card = document.createElement('div');
    card.className = 'card p-4 cursor-pointer hover:bg-[#2C2C2E] transition mb-3';

        </div>

          return `<div class="relative"><img src="${f.avatar}" class="w-7 h-7 rounded-full ${isOn?'':'opacity-40'}" alt="${f.name}">${isOn ? '<div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-green-500 rounded-full border border-[#1C1C1E]"></div>' : ''}</div>`;

      if (g) { delete g.pendingInvite; renderGroupsList(); }

  });
  list.querySelectorAll('.invite-decline-btn').forEach(btn => {

  addBtn.className = 'w-full card p-4 flex items-center justify-center gap-2 text-gray-600 font-semibold text-sm border-dashed border-gray-800 hover:bg-[#2C2C2E] transition';

    新しいグループを作成（招待制・最大5名）
  `;
  addBtn.addEventListener('click', () => renderCreateGroup());
  list.appendChild(addBtn);
}

function renderFriendsList(filter = '') {
  const list = document.getElementById('friends-list');
  if (!list) return;
  list.innerHTML = '';

  const friends = MOCK_FRIENDS.filter(f =>
    f.isFriend &&
    (!filter || f.name.toLowerCase().includes(filter.toLowerCase()) || f.handle.toLowerCase().includes(filter.toLowerCase()))
  );

  const active  = friends.filter(f => f.sessionStart);
  const offline = friends.filter(f => !f.sessionStart);

  // Active friends
  if (active.length) {
    active.forEach(f => list.appendChild(buildFriendCard(f, true)));
  }

  // Separator
  if (active.length && offline.length) {
    const sep = document.createElement('div');
    sep.className = 'text-center text-gray-800 text-xs font-bold uppercase tracking-widest py-2';
    sep.textContent = 'オフライン';
    list.appendChild(sep);
  }

  // Offline friends
  offline.forEach(f => list.appendChild(buildFriendCard(f, false)));

  if (friends.length === 0) {
    list.innerHTML = '<p class="text-gray-700 text-sm text-center mt-8">フレンドが見つかりません</p>';
  }
}

function buildFriendCard(f, isActive) {
  const el = document.createElement('div');
  el.className = 'card p-4 flex items-center justify-between cursor-pointer hover:bg-[#2C2C2E] transition';
  el.dataset.uid = f.id;

  const elapsed = isActive ? Math.floor((Date.now() - f.sessionStart) / 1000) : 0;
  const blockText = (isActive && f.isPublic && f.blockPublic)
    ? '<p class="text-xs text-gray-500 mt-0.5">YouTube, Instagram をブロック中</p>'
    : '';

  el.innerHTML = `
    <div class="flex items-center space-x-3">
      <div class="relative">
        <img src="${f.avatar}" class="w-12 h-12 rounded-full ${isActive?'':'opacity-50'}" alt="">
        ${isActive ? '<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[#1C1C1E]"></div>' : ''}
      </div>
      <div>
        <p class="font-bold text-white">${f.name}</p>
        <p class="text-xs text-gray-600">${f.handle}</p>
        ${blockText}
      </div>
    </div>
    <div class="text-right flex-shrink-0 ml-2">
      ${isActive
        ? `<p class="font-bold text-white text-sm friend-elapsed" data-start="${f.sessionStart}">${fmtCountdown(elapsed)}</p>
           <p class="text-xs text-gray-700">経過</p>`
        : `<svg class="w-5 h-5 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
             <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
           </svg>`
      }
    </div>
  `;
  el.addEventListener('click', () => openUserProfile(f.id));
  return el;
}

function updateFriendTimers() {
  document.querySelectorAll('.friend-elapsed').forEach(el => {
    const start   = parseInt(el.dataset.start);
    const elapsed = Math.floor((Date.now() - start) / 1000);
    el.textContent = fmtCountdown(elapsed);
  });
}

function renderDMMessages(userId) {
  const msgs = getDM(userId);
  const list = document.getElementById('dm-msg-list');
  if (!list) return;
  list.innerHTML = '';
  msgs.forEach(msg => {
    const isMe = msg.from === 'me';
    const el   = document.createElement('div');
    el.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
    el.innerHTML = `
      <div class="max-w-xs px-4 py-2.5 rounded-2xl text-sm
        ${isMe ? 'bg-white text-black rounded-br-sm' : 'bg-[#2C2C2E] text-white rounded-bl-sm'}">
        ${msg.text}
      </div>
    `;
    list.appendChild(el);
  });
  list.scrollTop = list.scrollHeight;
}

function sendDMMsg() {
  const input = document.getElementById('dm-input');
  const text  = input.value.trim();
  if (!text) return;
  const msgs = getDM(S.viewingUserId);
  msgs.push({ from: 'me', text, time: '今' });
  saveDM(S.viewingUserId, msgs);
  input.value = '';
  renderDMMessages(S.viewingUserId);
}

function getWeekData(history) {
  const days = [0,0,0,0,0,0,0]; // minutes per day (Sun=0)
  const now  = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0,0,0,0);
  history.forEach(h => {
    const d = new Date(h.date);
    if (d >= startOfWeek) days[d.getDay()] += Math.floor(h.duration / 60);
  });
  return days;
}

function buildWeeklyChart(chartId, labelsId, totalId, data) {
  const chartEl  = document.getElementById(chartId);
  const labelsEl = document.getElementById(labelsId);
  const totalEl  = document.getElementById(totalId);
  if (!chartEl || !labelsEl) return;

  const DAY_LABELS = ['日','月','火','水','木','金','土'];
  const today  = new Date().getDay();
  const maxVal = Math.max(...data, 1);
  const total  = data.reduce((a,b) => a+b, 0);

  chartEl.innerHTML  = '';
  labelsEl.innerHTML = '';
  if (totalEl) totalEl.textContent = `今週 ${Math.floor(total/60)}h ${total%60}m`;

  DAY_LABELS.forEach((day, i) => {
    const pct     = data[i] / maxVal * 100;
    const isToday = i === today;

    // Bar column
    const col = document.createElement('div');
    col.className = 'week-col';
    col.innerHTML = `
      <div class="week-bar-wrap" style="flex:1;">
        <div class="week-bar-fill ${isToday?'today':''}" style="height:${pct}%;"></div>
      </div>
    `;
    chartEl.appendChild(col);

    // Label
    const lbl = document.createElement('div');
    lbl.className = `flex-1 text-center text-xs ${isToday ? 'text-white font-bold' : 'text-gray-700'}`;
    lbl.textContent = day;
    labelsEl.appendChild(lbl);
  });
}

function buildHistoryList(history) {
  const el = document.getElementById('history-list');
  if (!el) return;
  const sorted = [...history].reverse().slice(0, 10);
  if (sorted.length === 0) {
    el.innerHTML = '<p class="text-gray-700 text-sm text-center mt-4">まだセッションがありません</p>';
    return;
  }
  sorted.forEach(h => {
    el.insertAdjacentHTML('beforeend', `
      <div class="card p-3 flex items-center space-x-3">
        <div class="w-10 h-10 rounded-xl bg-[#2C2C2E] flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 ${h.completed?'text-gray-300':'text-gray-600'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 2v6l4 4-4 4v6h12v-6l-4-4 4-4V2H6z"/>
          </svg>
        </div>
        <div class="flex-grow">
          <p class="font-bold text-white text-sm">${fmtDuration(h.duration)}</p>
          <p class="text-gray-600 text-xs">${fmtDate(h.date)}</p>
        </div>
        ${h.completed
          ? '<span class="text-xs text-gray-600 font-semibold border border-gray-800 px-2 py-0.5 rounded-full">完了</span>'
          : '<span class="text-xs text-gray-700 font-semibold border border-gray-800 px-2 py-0.5 rounded-full">中断</span>'}
      </div>
    `);
  });
}

let pickerInited = false;
function initTimePicker() {
  if (pickerInited) return;
  pickerInited = true;
  const hPicker = document.getElementById('picker-hours');
  const mPicker = document.getElementById('picker-minutes');

  function buildPicker(el, count, step) {
    const pad = document.createElement('div'); pad.className = 'picker-pad';
    el.appendChild(pad.cloneNode());
    for (let i = 0; i < count; i += step) {
      const item = document.createElement('div');
      item.className = 'picker-item';
      item.textContent = String(i).padStart(2,'0');
      el.appendChild(item);
    }
    el.appendChild(pad.cloneNode());
  }
  buildPicker(hPicker, 6,  1);  // 0-5 hours
  buildPicker(mPicker, 60, 5);  // 0,5,10...55 min

  [hPicker, mPicker].forEach(p => {
    p.addEventListener('scroll', () => highlightCenter(p));
    // scroll to 0 by default
    setTimeout(() => highlightCenter(p), 50);
  });
}

function highlightCenter(picker) {
  const center = picker.scrollTop + picker.clientHeight / 2;
  picker.querySelectorAll('.picker-item').forEach(item => {
    const itemCenter = item.offsetTop + item.offsetHeight / 2;
    item.style.opacity = Math.abs(center - itemCenter) < item.offsetHeight * 0.6 ? '1' : '0.2';
  });
}

function getPickerValue(pickerId) {
  const picker = document.getElementById(pickerId);
  const center = picker.scrollTop + picker.clientHeight / 2;
  let best = null, bestDist = Infinity;
  picker.querySelectorAll('.picker-item').forEach(item => {
    const dist = Math.abs(center - (item.offsetTop + item.offsetHeight / 2));
    if (dist < bestDist) { bestDist = dist; best = item; }
  });
  return best ? parseInt(best.textContent) : 0;
}

// ================================================================
// SESSION RESTORE: reconnect if page reloaded during a session
// ================================================================
function maybeRestoreSession() {
  const stored = JSON.parse(localStorage.getItem('to_active_session') || 'null');
  if (!stored) return false;
  const elapsed   = (Date.now() - stored.startTime) / 1000;
  const remaining = stored.totalDuration - elapsed;
  if (remaining > 5) {
    S.activeSession = { ...stored, timerId: null };
    renderSessionPage();
    goto('session');
    S.activeSession.timerId = setInterval(tickSession, 1000);
    tickSession();
    return true;
  }
  localStorage.removeItem('to_active_session');
  return false;
}

function renderInviteSheet(group) {
  const sheet = document.getElementById('invite-sheet');
  const drawer = document.getElementById('invite-drawer');
  const overlay = document.getElementById('invite-overlay');

  const remaining = (group.maxMembers || 5) - group.members.length;
  document.getElementById('invite-sheet-title').textContent = `${group.name}に招待`;
  document.getElementById('invite-sheet-subtitle').textContent = `あと${remaining}人招待できます（最大${group.maxMembers||5}名）`;

  const friendsList = document.getElementById('invite-friends-list');
  const invitableFriends = MOCK_FRIENDS.filter(f => f.isFriend && !group.members.includes(f.id));

  if (invitableFriends.length === 0) {
    friendsList.innerHTML = '<p class="text-gray-600 text-sm text-center py-4">招待できるフレンドがいません</p>';
  } else {
    friendsList.innerHTML = invitableFriends.map(f => `
      <div class="flex items-center justify-between py-2">
        <div class="flex items-center gap-3">
          <img src="${f.avatar}" class="w-10 h-10 rounded-full" alt="${f.name}">
          <div>
            <p class="font-semibold text-white text-sm">${f.name}</p>
            <p class="text-xs text-gray-600">${f.handle}</p>
          </div>
        </div>
        <button class="text-xs font-bold px-3 py-1.5 rounded-full invite-send-btn" data-uid="${f.id}"
          style="background:${group.color}22;color:${group.color};border:1px solid ${group.color}44;">招待する</button>
      </div>
    `).join('');
    friendsList.querySelectorAll('.invite-send-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.textContent = '招待済み';
        btn.disabled = true;
        btn.style.opacity = '0.5';
      });
    });
  }

  sheet.style.pointerEvents = 'auto';
  sheet.style.opacity = '1';
  requestAnimationFrame(() => {
    drawer.style.transform = 'translateX(-50%) translateY(0)';
  });

  function closeSheet() {
    sheet.style.opacity = '0';
    drawer.style.transform = 'translateX(-50%) translateY(100%)';
    setTimeout(() => { sheet.style.pointerEvents = 'none'; }, 350);
  }
  document.getElementById('invite-close-btn').onclick = closeSheet;
  overlay.onclick = closeSheet;
}
