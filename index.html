<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>(DIS)CONNECT</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ===== BASE ===== */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #000;
      color: #E2E2E2;
      overscroll-behavior: none;
    }
    input, textarea, select, button { font-family: 'Sora', sans-serif; }

    /* ===== SCROLLBAR ===== */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ===== PAGE SYSTEM ===== */
    .page {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      overflow: hidden;
    }
    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== CARD ===== */
    .card {
      background: #1C1C1E;
      border-radius: 1.25rem;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ===== INPUTS ===== */
    .input-field {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 0.875rem;
      padding: 0.9rem 1rem;
      width: 100%;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: rgba(255,255,255,0.35); }
    .input-field::placeholder { color: #6B7280; }

    /* ===== BOTTOM NAV ===== */
    .nav-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 2rem);
      max-width: 400px;
      background: rgba(22,22,24,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 9999px;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.25,1,0.5,1), opacity 0.3s ease;
    }
    .nav-bar.nav-hidden {
      transform: translate(-50%, 200%);
      opacity: 0;
    }
    .nav-btn { transition: color 0.18s ease; position: relative; }
    .nav-btn .icon-solid { display: none; }
    .nav-btn.active-nav .icon-outline { display: none; }
    .nav-btn.active-nav .icon-solid { display: block; }

    /* ===== NOTIFICATION DOT ===== */
    .notif-dot {
      position: absolute;
      top: 0.35rem;
      right: 0.35rem;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      border: 1.5px solid #000;
    }

    /* ===== SLIDER ===== */
    .slider-track {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      padding: 6px;
      position: relative;
      user-select: none;
      touch-action: none;
      overflow: hidden;
    }
    .slider-reveal {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 9999px;
      pointer-events: none;
    }
    .slider-thumb {
      background: white;
      border-radius: 9999px;
      position: absolute;
      top: 6px; left: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      cursor: grab;
      transition: box-shadow 0.2s;
    }
    .slider-thumb:active { cursor: grabbing; box-shadow: 0 0 0 6px rgba(255,255,255,0.1); }
    .slider-label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      color: #6B7280;
      pointer-events: none;
      font-weight: 600;
      font-size: 0.875rem;
      white-space: nowrap;
      z-index: 1;
      transition: opacity 0.15s;
    }

    /* ===== COUNTDOWN RING ===== */
    .countdown-ring { transform: rotate(-90deg); }
    .countdown-ring circle { transition: stroke-dashoffset 1s linear; }

    /* ===== ANIMATIONS ===== */
    @keyframes like-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .like-pop { animation: like-pop 0.28s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }

    @keyframes pulse-ring {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.55; }
    }
    .pulse-ring { animation: pulse-ring 2.2s ease infinite; }

    /* ===== COMMENT PANEL ===== */
    #comment-panel {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 300;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.25,1,0.5,1);
      display: flex;
      flex-direction: column;
    }
    #comment-panel.open { transform: translateX(0); }


    /* ===== BOTTOM SHEET MODAL ===== */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet-body {
      width: 100%;
      max-width: 400px;
      background: #111113;
      border-radius: 1.5rem 1.5rem 0 0;
      padding: 0 1.25rem 2rem;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.25,1,0.5,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .sheet-overlay.open .sheet-body { transform: translateY(0); }
    .sheet-handle {
      width: 2.5rem; height: 4px;
      background: #3a3a3c;
      border-radius: 2px;
      margin: 0.75rem auto 1.25rem;
    }

    /* ===== TIME PICKER ===== */
    .picker-col {
      width: 5rem;
      height: 15rem;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .picker-col::-webkit-scrollbar { display: none; }
    .picker-item {
      height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-size: 2rem;
      font-weight: 900;
      color: white;
      opacity: 0.25;
      transition: opacity 0.15s;
    }
    .picker-pad { height: 5.5rem; flex-shrink: 0; }

    /* ===== SCREEN TIME PERIOD TABS ===== */
    .active-period {
      background: #3a3a3c;
      color: white;
    }

    /* ===== WEEKLY CHART ===== */
    .week-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
    }
    .week-bar-wrap {
      flex: 1;
      width: 100%;
      max-width: 28px;
      background: #2C2C2E;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .week-bar-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #606060;
      border-radius: 4px;
      transition: height 0.6s cubic-bezier(0.25,1,0.5,1);
    }
    .week-bar-fill.today { background: white; }

    /* ===== TOGGLE SWITCH ===== */
    .toggle {
      position: relative;
      width: 2.75rem;
      height: 1.5rem;
      border-radius: 9999px;
      background: #3a3a3c;
      cursor: pointer;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle.on { background: white; }
    .toggle-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 1.25rem; height: 1.25rem;
      border-radius: 50%;
      background: #888;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle.on .toggle-knob {
      transform: translateX(1.25rem);
      background: #000;
    }

    /* ===== FEED TABS ===== */
    .feed-tab {
      position: relative;
      padding-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.9375rem;
      color: #6B7280;
      transition: color 0.2s;
    }
    .feed-tab.active-tab { color: white; }
    .feed-tab.active-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 1.5rem; height: 2px;
      background: white;
      border-radius: 1px;
    }

    /* ===== PADDING FOR NAV ===== */
    .pb-nav { padding-bottom: 7rem; }

    /* ===== ONBOARDING ANIMATIONS ===== */
    .ob-phone {
      width: 150px; height: 260px;
      background: #111; border-radius: 24px;
      border: 1.5px solid rgba(255,255,255,0.12);
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    @keyframes ob-swipe {
      0%   { transform: translateX(0); opacity:1; }
      60%  { transform: translateX(94px); opacity:1; }
      80%  { transform: translateX(94px); opacity:0; }
      81%  { transform: translateX(0); opacity:0; }
      100% { transform: translateX(0); opacity:1; }
    }
    @keyframes ob-pulse-ring {
      0%   { transform: scale(1); opacity:0.6; }
      100% { transform: scale(1.6); opacity:0; }
    }
    @keyframes ob-status-cycle {
      0%,40%  { opacity:1; }
      50%,90% { opacity:0; }
      100%    { opacity:1; }
    }
    @keyframes ob-checkin {
      0%,100% { opacity:0; transform:scale(0.5); }
      20%,80% { opacity:1; transform:scale(1); }
    }
    @keyframes ob-heart-pop {
      0%   { transform:scale(1); }
      30%  { transform:scale(1.5); }
      60%  { transform:scale(0.9); }
      100% { transform:scale(1); }
    }
    @keyframes ob-count-up {
      0%   { opacity:1; } 49% { opacity:1; }
      50%  { opacity:0; } 99% { opacity:0; }
      100% { opacity:1; }
    }
    @keyframes ob-fadein-up {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes ob-timer-tick {
      0%   { content:"03:00"; }
      100% { content:"02:47"; }
    }
  </style>
</head>
<body class="antialiased overflow-hidden h-screen w-screen">

<!-- ========================================================== -->
<!-- APP ROOT                                                    -->
<!-- ========================================================== -->
<div id="app" class="h-full w-full max-w-md mx-auto relative overflow-hidden bg-black">

  <!-- ===================== LANGUAGE SELECT ===================== -->
  <div id="page-lang" class="page flex flex-col items-center justify-center px-8"></div>

  <!-- ===================== LOGIN ===================== -->
  <div id="page-login" class="page flex flex-col justify-center px-8"></div>

  <!-- ===================== REGISTER ===================== -->
  <div id="page-register" class="page flex flex-col overflow-y-auto no-scrollbar px-6 pt-14 pb-10"></div>

  <!-- ===================== HOME (FEED) ===================== -->
  <div id="page-home" class="page flex flex-col"></div>

  <!-- ===================== CHALLENGE ===================== -->

  <!-- ===================== SESSION ACTIVE ===================== -->
  <div id="page-session" class="page flex flex-col items-center justify-between px-6 pt-10 pb-8"></div>

  <!-- ===================== INTERRUPT ===================== -->
  <div id="page-interrupt" class="page flex flex-col items-center justify-center px-6 text-center"></div>

  <!-- ===================== POST SESSION ===================== -->
  <div id="page-post-session" class="page flex flex-col overflow-y-auto no-scrollbar px-6 pt-8 pb-nav"></div>

  <!-- ===================== DETOX (TUNEOUT) ===================== -->
  <div id="page-tuneout" class="page flex flex-col"></div>

  <!-- ===================== FRIENDS ===================== -->
  <div id="page-friends" class="page flex flex-col"></div>
  <div id="page-group-detail" class="page flex flex-col"></div>

  <!-- ===================== MESSAGES ===================== -->
  <div id="page-messages" class="page flex flex-col"></div>

  <!-- ===================== DM ===================== -->
  <div id="page-dm" class="page flex flex-col"></div>

  <!-- ===================== APP PICKER MODAL ===================== -->
  <div id="app-picker-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:#1c1c1e;flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;">
      <button id="app-picker-cancel" style="width:36px;height:36px;border-radius:50%;background:#3a3a3c;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <span id="app-picker-title" style="color:white;font-weight:900;font-size:17px;">アプリを選択</span>
      <button id="app-picker-done" style="width:36px;height:36px;border-radius:50%;background:#3b82f6;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
      </button>
    </div>
    <div id="app-picker-list" style="flex:1;overflow-y:auto;padding:0 16px 80px;"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;padding:12px 16px 28px;background:#1c1c1e;border-top:1px solid #2c2c2e;">
      <div style="display:flex;align-items:center;background:#2c2c2e;border-radius:12px;padding:10px 14px;gap:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="app-picker-search" type="text" placeholder="Search" style="flex:1;background:none;border:none;outline:none;color:white;font-size:15px;" />
      </div>
    </div>
  </div>

  <!-- ===================== PROFILE ===================== -->
  <div id="page-profile" class="page flex flex-col overflow-y-auto no-scrollbar pb-nav"></div>

  <!-- ===================== SETTINGS ===================== -->
  <div id="page-settings" class="page flex flex-col overflow-y-auto no-scrollbar px-5 pt-5 pb-10"></div>

  <!-- ===================== EDIT PROFILE ===================== -->
  <div id="page-edit-profile" class="page flex flex-col overflow-y-auto no-scrollbar px-5 pt-5 pb-10"></div>
  <div id="page-avatar-builder" class="page flex flex-col" style="background:#111;"></div>
  <div id="page-survey" class="page flex flex-col overflow-y-auto no-scrollbar px-6 pt-10 pb-10"></div>

  <!-- ===================== USER PROFILE ===================== -->
  <div id="page-user-profile" class="page flex flex-col"></div>

  <!-- ===================== NOTIFICATIONS ===================== -->
  <div id="page-notifications" class="page flex flex-col"></div>

  <!-- ===================== NOTIFICATION SETTINGS ===================== -->
  <div id="page-notif-settings" class="page flex flex-col overflow-y-auto no-scrollbar px-5 pt-5 pb-10"></div>

  <!-- ===================== PREMIUM ===================== -->
  <div id="page-premium" class="page flex flex-col overflow-y-auto no-scrollbar"></div>

  <!-- ===================== CREATE GROUP ===================== -->
  <div id="page-create-group" class="page flex flex-col overflow-y-auto no-scrollbar px-5 pt-5 pb-10"></div>

  <!-- ===================== ONBOARDING ===================== -->
  <div id="page-onboarding" class="page flex flex-col items-center justify-between px-6 pt-12 pb-10"></div>

  <!-- ===================== TERMS ===================== -->
  <div id="page-terms" class="page flex flex-col overflow-y-auto no-scrollbar"></div>

  <!-- ===================== PRIVACY ===================== -->
  <div id="page-privacy" class="page flex flex-col overflow-y-auto no-scrollbar"></div>

  <!-- ===================== INVITE SHEET ===================== -->
  <div id="invite-sheet" style="position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity 0.25s;">
    <div id="invite-overlay" class="absolute inset-0 bg-black/60"></div>
    <div id="invite-drawer" class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-[#1C1C1E] rounded-t-3xl p-5" style="transform:translateX(-50%) translateY(100%);transition:transform 0.35s cubic-bezier(0.25,1,0.5,1);">
      <div class="w-10 h-1 bg-gray-700 rounded-full mx-auto mb-5"></div>
      <h2 class="text-lg font-black text-white mb-1" id="invite-sheet-title"></h2>
      <p class="text-xs text-gray-600 mb-4" id="invite-sheet-subtitle"></p>
      <div id="invite-friends-list" class="space-y-2 max-h-72 overflow-y-auto no-scrollbar"></div>
      <button id="invite-close-btn" class="mt-4 w-full py-3 rounded-2xl bg-[#2C2C2E] text-gray-400 font-semibold text-sm">Close</button>
    </div>
  </div>

  <!-- ===== COMMENT PANEL (slide from right) ===== -->
  <div id="comment-panel">
    <div class="flex-shrink-0 flex items-center px-4 py-3 border-b border-gray-900 relative">
      <button id="comment-close-btn" class="p-2 -ml-2 text-gray-400 z-10">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <h2 id="comment-panel-title" class="absolute left-1/2 -translate-x-1/2 font-bold text-white text-base">投稿</h2>
    </div>
    <div class="flex-grow overflow-y-auto no-scrollbar">
      <div id="comment-post-body" class="border-b border-gray-900 p-4"></div>
      <div id="comment-list" class="p-4 space-y-5"></div>
    </div>
    <div class="flex-shrink-0 flex items-center space-x-2 px-4 py-3 border-t border-gray-900">
      <input id="comment-input" class="input-field rounded-full py-3 flex-grow" placeholder="コメントを追加...">
      <button id="comment-send-btn" class="w-10 h-10 bg-[#2C2C2E] rounded-full flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" style="transform:rotate(45deg)" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
  </div>



  <!-- ===== MANUAL START SHEET ===== -->
  <div id="manual-sheet" class="sheet-overlay">
    <div class="sheet-body">
      <div class="sheet-handle"></div>
      <h3 id="manual-sheet-title" class="text-xl font-black text-white text-center mb-1">デトックス開始</h3>
      <p id="manual-sheet-sub" class="text-gray-600 text-sm text-center mb-5">制限するアプリと時間をセット</p>

      <!-- App Selection -->
      <div class="mb-5">
        <p id="manual-apps-label" class="text-xs text-gray-600 font-semibold mb-2">制限するアプリ</p>
        <button id="open-app-picker-btn" class="w-full flex items-center justify-between bg-[#1C1C1E] border border-gray-800 rounded-xl px-4 py-3">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            <span id="app-picker-summary" class="text-sm text-gray-400">アプリを選択...</span>
          </div>
          <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 h-px bg-gray-800"></div>
        <p id="manual-time-label" class="text-xs text-gray-600 font-semibold">時間</p>
        <div class="flex-1 h-px bg-gray-800"></div>
      </div>

      <!-- Picker -->
      <div class="flex justify-center items-center mb-6 relative" style="height:15rem;">
        <div class="absolute left-1/2 -translate-x-1/2 w-44 h-16 bg-[#2C2C2E] rounded-2xl pointer-events-none z-0"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-[#111113] via-transparent to-[#111113] pointer-events-none z-10"></div>
        <div class="z-20 flex items-center space-x-1">
          <div id="picker-hours" class="picker-col"></div>
          <span class="text-3xl font-black text-gray-600">:</span>
          <div id="picker-minutes" class="picker-col"></div>
        </div>
      </div>

      <!-- Slider -->
      <div class="slider-track h-16" id="manual-slider">
        <div class="slider-reveal" id="manual-reveal"></div>
        <div class="slider-thumb w-20 h-14" id="manual-thumb">
          <svg class="w-6 h-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
        <span id="manual-slider-label" class="slider-label">スワイプして(DIS)CONNECT</span>
      </div>

      <button id="manual-cancel-btn" class="w-full text-gray-600 font-semibold py-3 mt-1 text-sm">キャンセル</button>
    </div>
  </div>

  <!-- ===== CONFIRM MODAL ===== -->
  <div id="confirm-overlay" class="sheet-overlay" style="align-items:center;">
    <div style="width:100%;max-width:360px;margin:1rem;background:#1C1C1E;border-radius:1.25rem;padding:1.5rem;">

function _drawAvatarBuilder() {
  const cfg = _abCfg;
  const page = document.getElementById('page-avatar-builder');

  function swatch(key, val, label, isColor) {
    const active = JSON.stringify(cfg[key]) === JSON.stringify(val);
    // Use single quotes inside onclick to avoid conflict with HTML attribute double quotes
    const valJS = typeof val === 'string' ? `'${val}'` : JSON.stringify(val);
    const js = `window._abSet('${key}',${valJS})`;
    if (isColor) {
      return `<button onclick="${js}" style="width:36px;height:36px;border-radius:50%;background:${val};border:3px solid ${active?'white':'transparent'};flex-shrink:0;cursor:pointer;outline:${active?'2px solid #666':'none'};outline-offset:2px;"></button>`;
    }
    return `<button onclick="${js}" style="padding:8px 16px;border-radius:20px;background:${active?'white':'#2c2c2e'};color:${active?'black':'#9ca3af'};font-size:13px;font-weight:600;border:none;cursor:pointer;flex-shrink:0;font-family:inherit;">${label}</button>`;
  }

  function row(key, vals, labels, isColor) {
    return `<div style="display:flex;gap:8px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none;">${vals.map((v,i)=>swatch(key,v,labels?labels[i]:v,isColor)).join('')}</div>`;
  }

  const hLabels = [t('ショート','Short'),t('ロング','Long'),t('お団子','Bun'),t('バズ','Buzz'),t('なし','None')];
  const eLabels = [t('丸','Round'),t('細','Narrow'),t('大','Wide'),t('笑','Happy')];
  const bLabels = [t('普通','Normal'),t('上げ','Raised'),t('寄せ','Furrowed')];
  const mLabels = [t('微笑み','Smile'),t('ニヤ','Grin'),t('普通','Neutral'),t('驚き','Surprised')];
  const gLabels = [t('なし','None'),t('あり','On')];

  function sec(label, key, vals, labels, isColor) {
    return `<div style="margin-bottom:20px;"><p style="color:#6b7280;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px;letter-spacing:.05em;">${label}</p>${row(key,vals,labels,isColor)}</div>`;
  }

  page.innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #1f1f1f;flex-shrink:0;">
        <button id="ab-cancel" style="color:#9ca3af;font-size:15px;font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit;">${t('キャンセル','Cancel')}</button>
        <span style="color:white;font-weight:700;font-size:16px;">${t('アバター編集','Edit Avatar')}</span>
        <button id="ab-done" style="color:white;font-size:15px;font-weight:700;background:none;border:none;cursor:pointer;font-family:inherit;">${t('完了','Done')}</button>
      </div>
      <div style="flex-shrink:0;display:flex;justify-content:center;padding:24px 0 16px;">
        <div style="border-radius:9999px;overflow:hidden;">${renderAvatarSVG(cfg, 120)}</div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:0 20px 48px;-webkit-overflow-scrolling:touch;">
        ${sec(t('背景','Background'),       'bg',        AVATAR_OPTS.bg,        null,    true)}
        ${sec(t('肌の色','Skin Tone'),       'skin',      AVATAR_OPTS.skin,      null,    true)}
        ${sec(t('髪型','Hair Style'),        'hair',      AVATAR_OPTS.hair,      hLabels, false)}
        ${sec(t('髪の色','Hair Color'),      'hairColor', AVATAR_OPTS.hairColor, null,    true)}
        ${sec(t('目','Eyes'),                'eyes',      AVATAR_OPTS.eyes,      eLabels, false)}
        ${sec(t('眉毛','Eyebrows'),          'brows',     AVATAR_OPTS.brows,     bLabels, false)}
        ${sec(t('口','Mouth'),               'mouth',     AVATAR_OPTS.mouth,     mLabels, false)}
        ${sec(t('メガネ','Glasses'),          'glasses',   AVATAR_OPTS.glasses,   gLabels, false)}
      </div>
    </div>`;

  document.getElementById('ab-cancel').addEventListener('click', () => goto('edit-profile'));
  document.getElementById('ab-done').addEventListener('click', () => { _abOnSave(_abCfg); goto('edit-profile'); });
}

function getStreak(history) {
  const completed = history.filter(h => h.completed);
  if (!completed.length) return 0;
  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const dates = new Set(completed.map(h => dateKey(new Date(h.date))));
  const now = new Date();
  const todayKey = dateKey(now);
  const startOffset = dates.has(todayKey) ? 0 : 1;
  let streak = 0;
  for (let i = startOffset; i < 365; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    if (dates.has(dateKey(d))) streak++;
    else break;
  }
  return streak;
}

function fmtDuration(sec, alwaysHours = false) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  if (S.lang === 'en') {
    if (h > 0 || alwaysHours) return `${h}h${m > 0 ? ' ' + m + 'm' : ''}`;
    return `${m}m`;
  }
  if (h > 0 || alwaysHours) return `${h}時間${m > 0 ? m + '分' : ''}`;
  return `${m}分`;
}
function fmtCountdown(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDate(ts) {
  const locale = S.lang === 'en' ? 'en-US' : 'ja-JP';
  return new Date(ts).toLocaleDateString(locale, { month:'short', day:'numeric' });
}
function friendById(id) { return MOCK_FRIENDS.find(f => f.id === id); }

function goto(page) {
  // Stop friend timers when leaving friends page
  if (S.page === 'friends' && page !== 'friends' && S.friendsTimerId) {
    clearInterval(S.friendsTimerId);
    S.friendsTimerId = null;
  }
  // Close comment panel if open
  document.getElementById('comment-panel').classList.remove('open');

  // Deactivate all pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById(`page-${page}`);
  if (el) el.classList.add('active');
  S.page = page;

  // Nav bar visibility
  const nav = document.getElementById('nav-bar');
  if (NO_NAV.includes(page)) {
    nav.classList.add('nav-hidden');
  } else {
    nav.classList.remove('nav-hidden');
  }

  // Active nav button highlight
  document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
    const match = btn.dataset.page === page ||
                  (btn.dataset.page === 'home' && page === 'home') ||
                  (btn.dataset.page === 'friends' && page === 'group-detail');
    btn.classList.toggle('active-nav', match);
    btn.classList.toggle('text-white',  match);
    btn.classList.toggle('text-gray-500', !match);
  });

  // Page-specific render
  if (page === 'home')         renderHome();
  if (page === 'tuneout')      renderTuneout();
  if (page === 'friends')      renderFriends();
  if (page === 'messages')     renderMessages();
  if (page === 'profile')      renderProfile();
  if (page === 'notifications') renderNotifications();
  if (page === 'lang')          renderLangSelect();
}

function startSession(durationSec, isChallenge = false, sessionType = 'personal') {
  if (S.activeSession) return;
  const sess = { startTime: Date.now(), totalDuration: durationSec, isChallenge, sessionType };
  S.activeSession = { ...sess, timerId: null };
  localStorage.setItem('to_active_session', JSON.stringify(sess));
  renderSessionPage();
  goto('session');
  tickSession();
  S.activeSession.timerId = setInterval(tickSession, 1000);
  // update tuneout nav icon
  const tb = document.getElementById('tuneout-nav-btn');
  if (tb) { tb.classList.add('active-nav','text-white'); tb.classList.remove('text-gray-500'); }
}

function tickSession() {
  const sess = S.activeSession;
  if (!sess) return;
  const elapsed   = (Date.now() - sess.startTime) / 1000;
  const remaining = sess.totalDuration - elapsed;
  const timerEl   = document.getElementById('sess-timer');
  const ringEl    = document.getElementById('sess-ring');
  if (timerEl) timerEl.textContent = fmtCountdown(remaining);
  if (ringEl) {
    const pct    = Math.max(0, remaining / sess.totalDuration);
    ringEl.style.strokeDashoffset = RING_CIRC * (1 - pct);
  }
  if (remaining <= 0) endSession(true);
}

function endSession(completed) {
  const sess = S.activeSession;
  if (!sess) return;
  clearInterval(sess.timerId);
  localStorage.removeItem('to_active_session');
  const elapsed  = (Date.now() - sess.startTime) / 1000;
  const duration = completed ? sess.totalDuration : elapsed;
  if (elapsed > 10) {
    const h = getHistory();
    h.push({ duration, date: Date.now(), completed });
    saveHistory(h);
  }
  S.activeSession = null;
  const tb = document.getElementById('tuneout-nav-btn');
  if (tb) { tb.classList.remove('active-nav','text-white'); tb.classList.add('text-gray-500'); }

  // Group detox result
  const gd = S.groupDetox;
  if (gd) {
    const g = MOCK_GROUPS.find(x => x.id === gd.groupId);
    if (completed) {
      // Team success — increment streak
      if (g) g.streak = (g.streak || 0) + 1;
      renderPostSession(duration, true, { groupSuccess: true, group: g });
    } else {
      // Team failed
      if (g) g.streak = 0;
      const u = getUser();
      gd.failed = true;
      gd.failedBy = u ? u.name : t('あなた','You');
      renderPostSession(duration, false, { groupFailed: true, group: g, failedBy: gd.failedBy });
    }
    S.groupDetox = null;
  } else {
    renderPostSession(duration, completed);
  }
}

// ================================================================
// SLIDER UTILITY
// ================================================================
function initSlider(trackId, thumbId, revealId, onComplete) {
  const track  = document.getElementById(trackId);
  const thumb  = document.getElementById(thumbId);
  const reveal = document.getElementById(revealId);
  if (!track || !thumb || !reveal) return;

  let dragging = false;

  function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

  function onStart(e) { e.preventDefault(); dragging = true; }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const rect   = track.getBoundingClientRect();
    const maxPos = rect.width - thumb.offsetWidth - 12;
    let pos = getX(e) - rect.left - thumb.offsetWidth / 2;
    pos = Math.max(0, Math.min(pos, maxPos));
    thumb.style.left = `${pos + 6}px`;
    reveal.style.width = `${pos + thumb.offsetWidth / 2}px`;
    const label = track.querySelector('.slider-label');
    if (label) label.style.opacity = Math.max(0, 1 - (pos / maxPos) * 2);
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    const rect   = track.getBoundingClientRect();
    const maxPos = rect.width - thumb.offsetWidth - 12;
    const pos    = parseFloat(thumb.style.left || '6') - 6;
    if (pos >= maxPos * 0.85) {
      onComplete();
    } else {
      resetSlider(trackId, thumbId, revealId);
    }
  }

  thumb.addEventListener('mousedown',  onStart);
  thumb.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove, { passive: false });
  document.addEventListener('mouseup',  onEnd);
  document.addEventListener('touchend', onEnd);
}

function resetSlider(trackId, thumbId, revealId) {
  const thumb  = document.getElementById(thumbId);
  const reveal = document.getElementById(revealId);
  const track  = document.getElementById(trackId);
  if (!thumb || !reveal) return;
  thumb.style.transition  = 'left 0.3s ease';
  reveal.style.transition = 'width 0.3s ease';
  thumb.style.left   = '6px';
  reveal.style.width = '0px';
  const label = track?.querySelector('.slider-label');
  if (label) label.style.opacity = '1';
  setTimeout(() => { thumb.style.transition = ''; reveal.style.transition = ''; }, 320);
}

    const pendingInviteMsg = chatMsgsCheck.slice().reverse().find(m => m.type === 'detox_invite' && m.from !== 'me');
    if (pendingInviteMsg) {
      S.groupDetox = {
        groupId,
        duration: pendingInviteMsg.duration,
        readyMembers: [pendingInviteMsg.from],
        allMembers: ['me', ...g.members],
        startTime: null,
        failed: false,
        failedBy: null,
        initiatedBy: pendingInviteMsg.from,
        apps: [],
        declinedMembers: [],

  const gd = S.groupDetox;
  const isMyGroup = gd && gd.groupId === groupId;
  const inLobby = isMyGroup && !gd.startTime;
  const inOtherLobby = gd && gd.groupId !== groupId && !gd.startTime && (gd.readyMembers || []).includes('me');
  const isPending = !!g.pendingInvite;
  const isOwner = g.owner === 'me';

  if (isPending) S.groupDetailTab = 'detox';

  function memberReadyRows(readyList) {

              ? `<button class="gd-kick-btn ml-2 text-gray-700 hover:text-red-500 transition" data-uid="${id}" title="${t('退会させる','Remove')}">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </button>`
              : '';
            return `
              <div class="flex items-center justify-between py-2">
                <div class="flex items-center gap-3">
                  <img src="${avatar}" class="w-9 h-9 rounded-full" alt="${name}">
                  <p class="text-sm font-semibold text-white">${name}${isMe?` (${t('あなた','You')})`:''}</p>
                </div>
                <div class="flex items-center">${badge}${kickBtn}</div>
              </div>`;
          }).join('')}
        </div>
      </div>

      <div class="card p-4">
        <p class="text-xs text-gray-600 font-bold uppercase tracking-wider mb-2">${t('グループについて','About')}</p>
        <p class="text-sm text-gray-400">${g.description}</p>
        ${g.streak ? `<p class="text-xs text-orange-400 font-bold mt-2">🔥 ${t('グループストリーク','Group Streak')} ${g.streak}${t('日',' days')}</p>` : ''}
      </div>

      ${inOtherLobby
        ? `<div class="w-full py-4 rounded-2xl text-center text-sm font-semibold text-gray-600 border border-gray-800">${t('別のグループのデトックス待機中のため作成できません','Cannot create: waiting in another group\'s detox')}</div>`
        : `<button id="gd-ready-btn" class="w-full py-4 rounded-2xl font-bold text-base text-black" style="background:${g.color}">
            ${t('デトックスを作成する','Start Detox Session')}
          </button>
          <p class="text-center text-xs text-gray-700">${t('あなたが作成したら、メンバーに通知されます','Members will be notified when you start')}</p>`
      }
      `}
    </div>
  `;

  document.getElementById('gd-back').addEventListener('click', () => {
    S.groupDetailTab = 'detox';
    goto('friends');
    setTimeout(() => document.getElementById('tab-groups-btn')?.click(), 50);
  });
  document.getElementById('gd-invite-btn')?.addEventListener('click', () => renderInviteSheet(g));
  document.getElementById('gd-tab-detox')?.addEventListener('click', () => { S.groupDetailTab = 'detox'; renderGroupDetail(groupId); });
  document.getElementById('gd-tab-chat')?.addEventListener('click',  () => { S.groupDetailTab = 'chat';  renderGroupDetail(groupId); });

  // オーナー: グループ設定
  document.getElementById('gd-settings-btn')?.addEventListener('click', () => {
    S.groupEditing = (S.groupEditing === groupId) ? null : groupId;
    renderGroupDetail(groupId);
  });
  document.getElementById('gd-edit-save')?.addEventListener('click', () => {
    const newName = document.getElementById('gd-edit-name')?.value.trim();
    const newDesc = document.getElementById('gd-edit-desc')?.value.trim();
    if (newName) g.name = newName;
    if (newDesc !== undefined) g.description = newDesc;
    S.groupEditing = null;
    renderGroupDetail(groupId);
  });
  document.getElementById('gd-edit-cancel')?.addEventListener('click', () => {
    S.groupEditing = null;
    renderGroupDetail(groupId);
  });

  // オーナー: メンバーキック
  document.querySelectorAll('.gd-kick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const uid = btn.dataset.uid;
      const f = friendById(uid);
      const name = f ? f.name : uid;
      showConfirm(
        t('メンバーを退会させる','Remove Member'),
        `${name}${t('をグループから退会させますか？','— remove from this group?')}`,
        t('退会させる','Remove'),
        () => {
          g.members = g.members.filter(id => id !== uid);
          renderGroupDetail(groupId);
        }
      );
    });
  });

  if (isPending) {
    document.getElementById('gd-accept-btn')?.addEventListener('click', () => {
      g.pendingInvite = null;
      S.groupDetailTab = 'detox';
      renderGroupDetail(groupId);
    });
    document.getElementById('gd-decline-btn')?.addEventListener('click', () => {
      const idx = MOCK_GROUPS.findIndex(x => x.id === groupId);
      if (idx !== -1) MOCK_GROUPS.splice(idx, 1);
      goto('friends');
      setTimeout(() => document.getElementById('tab-groups-btn')?.click(), 50);
    });
  } else if (inLobby) {
    if (gd.initiatedBy === 'me') {
      // 作成者のみセッション全体をキャンセル可能
      document.getElementById('gd-cancel-lobby')?.addEventListener('click', () => {
        S.groupDetox = null;
        renderGroupDetail(groupId);
      });
    } else {
      // 非作成者：参加をキャンセル可能
      document.getElementById('gd-cancel-join')?.addEventListener('click', () => {
        S.groupDetox.readyMembers = S.groupDetox.readyMembers.filter(id => id !== 'me');
        renderGroupDetail(groupId);
      });
      // 非作成者：参加するか参加しないかを選択
      document.getElementById('gd-join-lobby')?.addEventListener('click', () => {
        if (!S.groupDetox.readyMembers.includes('me')) {
          S.groupDetox.readyMembers.push('me');
          renderGroupDetail(groupId);
          if (S.groupDetox.readyMembers.length >= S.groupDetox.allMembers.length) {
            S.groupDetox.startTime = Date.now();
            setTimeout(() => startSession(S.groupDetox.duration, false, 'group'), 600);
          }
        }
      });
      document.getElementById('gd-decline-lobby')?.addEventListener('click', () => {
        if (!S.groupDetox.declinedMembers) S.groupDetox.declinedMembers = [];
        if (!S.groupDetox.declinedMembers.includes('me')) {
          S.groupDetox.declinedMembers.push('me');
          renderGroupDetail(groupId);
        }
      });
    }
  } else {
    initGroupDetoxPicker();
    updateAppPickerSummary('gd-app-picker-summary', S.groupSelectedApps);
    document.getElementById('open-gd-app-picker-btn').onclick = () => openAppPicker('group');

    document.getElementById('gd-ready-btn')?.addEventListener('click', () => {
      const gdH = getPickerValue('gd-picker-hours');
      const gdM = getPickerValue('gd-picker-minutes');
      const gdSelectedDur = Math.max(300, gdH * 3600 + gdM * 60);
      S.groupDetox = {
        groupId,
        duration: gdSelectedDur,
        readyMembers: ['me'],
        allMembers: ['me', ...g.members],
        startTime: null,
        failed: false,
        failedBy: null,
        initiatedBy: 'me',
        apps: [...S.groupSelectedApps],
      };
      renderGroupDetail(groupId);
      const others = [...g.members];
      others.forEach((id, i) => {
        setTimeout(() => {
          if (!S.groupDetox || S.groupDetox.groupId !== groupId) return;
          S.groupDetox.readyMembers.push(id);
          const rows = document.getElementById('gd-member-rows');
          const cnt  = document.getElementById('gd-ready-count');
          if (rows) rows.innerHTML = memberReadyRows(S.groupDetox.readyMembers);
          if (cnt)  cnt.textContent = `${S.groupDetox.readyMembers.length}/${S.groupDetox.allMembers.length}${t('人 準備完了',' ready')}`;
          if (S.groupDetox.readyMembers.length >= S.groupDetox.allMembers.length) {
            S.groupDetox.startTime = Date.now();
            setTimeout(() => {
              startSession(S.groupDetox.duration, false, 'group');
            }, 600);
          }
        }, (i + 1) * 1500);
      });
    });
  }

  goto('group-detail');
}

function renderFriendsList(filter = '') {
  const list = document.getElementById('friends-list');
  if (!list) return;
  list.innerHTML = '';

  const friends = MOCK_FRIENDS.filter(f =>
    f.isFriend &&
    (!filter || f.name.toLowerCase().includes(filter.toLowerCase()) || f.handle.toLowerCase().includes(filter.toLowerCase()))
  );

  const active  = friends.filter(f => f.sessionStart);
  const offline = friends.filter(f => !f.sessionStart);

  // Active friends
  if (active.length) {
    active.forEach(f => list.appendChild(buildFriendCard(f, true)));
  }

  // Separator
  if (active.length && offline.length) {
    const sep = document.createElement('div');
    sep.className = 'text-center text-gray-800 text-xs font-bold uppercase tracking-widest py-2';
    sep.textContent = t('オフライン','Offline');
    list.appendChild(sep);
  }

  // Offline friends
  offline.forEach(f => list.appendChild(buildFriendCard(f, false)));

  if (friends.length === 0) {
    list.innerHTML = `<p class="text-gray-700 text-sm text-center mt-8">${t('フレンドが見つかりません','No friends found')}</p>`;
  }
}

function buildFriendCard(f, isActive) {
  const el = document.createElement('div');
  el.className = 'card p-4 flex items-center justify-between cursor-pointer hover:bg-[#2C2C2E] transition';
  el.dataset.uid = f.id;

  const elapsed   = isActive ? Math.floor((Date.now() - f.sessionStart) / 1000) : 0;
  const remaining = isActive ? Math.max(0, f.sessionDuration - elapsed) : 0;
  const blockText = (isActive && f.isPublic && f.blockPublic)
    ? `<p class="text-xs text-gray-500 mt-0.5">${t('YouTube, Instagram をブロック中','Blocking YouTube, Instagram')}</p>`
    : '';

  el.innerHTML = `
    <div class="flex items-center space-x-3">
      <div class="relative">
        <img src="${f.avatar}" class="w-12 h-12 rounded-full ${isActive?'':'opacity-50'}" alt="">
        ${isActive ? '<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[#1C1C1E]"></div>' : ''}
      </div>
      <div>
        <p class="font-bold text-white">${f.name}</p>
        <p class="text-xs text-gray-600">${f.handle}</p>
        ${blockText}
      </div>
    </div>
    <div class="text-right flex-shrink-0 ml-2">
      ${isActive
        ? `<p class="font-bold text-white text-sm friend-remaining" data-start="${f.sessionStart}" data-duration="${f.sessionDuration}">${fmtCountdown(remaining)}</p>
           <p class="text-xs text-gray-700">${t('残り','Remaining')}</p>`
        : `<svg class="w-5 h-5 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
             <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
           </svg>`
      }
    </div>
  `;
  el.addEventListener('click', () => openUserProfile(f.id));
  return el;
}

function updateFriendTimers() {
  document.querySelectorAll('.friend-remaining').forEach(el => {
    const start     = parseInt(el.dataset.start);
    const duration  = parseInt(el.dataset.duration);
    const elapsed   = Math.floor((Date.now() - start) / 1000);
    const remaining = Math.max(0, duration - elapsed);
    el.textContent  = fmtCountdown(remaining);
  });
}

function renderDMMessages(userId) {
  const msgs = getDM(userId);
  const list = document.getElementById('dm-msg-list');
  if (!list) return;
  list.innerHTML = '';
  msgs.forEach(msg => {
    const isMe = msg.from === 'me';
    const el   = document.createElement('div');
    el.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
    el.innerHTML = `
      <div class="max-w-xs px-4 py-2.5 rounded-2xl text-sm
        ${isMe ? 'bg-white text-black rounded-br-sm' : 'bg-[#2C2C2E] text-white rounded-bl-sm'}">
        ${msg.text}
      </div>
    `;
    list.appendChild(el);
  });
  list.scrollTop = list.scrollHeight;
}

function sendDMMsg() {
  const input = document.getElementById('dm-input');
  const text  = input.value.trim();
  if (!text) return;
  const msgs = getDM(S.viewingUserId);
  msgs.push({ from: 'me', text, time: '今' });
  saveDM(S.viewingUserId, msgs);
  input.value = '';
  renderDMMessages(S.viewingUserId);
}

function getWeekData(history) {
  const days = [0,0,0,0,0,0,0];
  const now  = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0,0,0,0);
  history.forEach(h => {
    const d = new Date(h.date);
    if (d >= startOfWeek) days[d.getDay()] += Math.floor(h.duration / 60);
  });
  return days;
}

// ── Screen Time chart ────────────────────────────────────────────
const DAILY_ESTIMATE_MIN = 360; // 推定使用時間: 6時間/日

function buildScreenTimeChart(history, period) {
  const completed = history.filter(h => h.completed);

  // 期間フィルタ & バーデータ生成
  const now = new Date();
  let bars = [], barLabels = [], prevTotal = 0;

  if (period === 'week') {
    const start = new Date(now);
    start.setDate(now.getDate() - now.getDay());
    start.setHours(0,0,0,0);
    const dayNames = S.lang === 'en'
      ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
      : ['日','月','火','水','木','金','土'];
    bars = [0,0,0,0,0,0,0];
    completed.forEach(h => {
      const d = new Date(h.date);
      if (d >= start) bars[d.getDay()] += Math.floor(h.duration / 60);
    });
    barLabels = dayNames;
    // 先週の合計（比較用）
    const prevStart = new Date(start); prevStart.setDate(prevStart.getDate()-7);
    completed.forEach(h => {
      const d = new Date(h.date);
      if (d >= prevStart && d < start) prevTotal += Math.floor(h.duration / 60);
    });

  } else if (period === 'month') {
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    bars = new Array(daysInMonth).fill(0);
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    completed.forEach(h => {
      const d = new Date(h.date);
      if (d >= start && d.getMonth() === now.getMonth()) {
        bars[d.getDate()-1] += Math.floor(h.duration / 60);
      }
    });
    // 週ごとに集約して表示
    const weeks = [0,0,0,0,0];
    bars.forEach((m, i) => { weeks[Math.floor(i/7)] += m; });
    bars = weeks.slice(0, Math.ceil(daysInMonth/7));
    barLabels = bars.map((_, i) => `W${i+1}`);
    // 先月比
    const prevMonthStart = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const prevMonthEnd   = new Date(now.getFullYear(), now.getMonth(), 1);
    completed.forEach(h => {
      const d = new Date(h.date);
      if (d >= prevMonthStart && d < prevMonthEnd) prevTotal += Math.floor(h.duration / 60);
    });

  } else { // all
    // 月ごとに集約（最大12ヶ月）
    const monthMap = {};
    completed.forEach(h => {
      const d = new Date(h.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      monthMap[key] = (monthMap[key]||0) + Math.floor(h.duration/60);
    });
    const keys = Object.keys(monthMap).sort().slice(-8);
    bars = keys.map(k => monthMap[k]);
    barLabels = keys.map(k => k.slice(5)); // "MM"
    if (bars.length === 0) { bars = [0]; barLabels = ['—']; }
  }

  // 集計値
  const detoxTotal  = bars.reduce((a,b) => a+b, 0);
  const sessions    = completed.filter(h => {
    if (period === 'all') return true;
    const d = new Date(h.date);
    if (period === 'week') {
      const s = new Date(now); s.setDate(now.getDate()-now.getDay()); s.setHours(0,0,0,0);
      return d >= s;
    }
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const longest     = sessions.length ? Math.max(...sessions.map(h => Math.floor(h.duration/60))) : 0;
  const estTotal    = DAILY_ESTIMATE_MIN * bars.length;
  const pct         = estTotal > 0 ? Math.min(100, Math.round(detoxTotal / estTotal * 100)) : 0;

  // メイン数値表示
  const fmtMin = m => m >= 60 ? `${Math.floor(m/60)}h ${m%60}m` : `${m}m`;
  document.getElementById('st-main-stat').textContent  = fmtMin(detoxTotal);
  document.getElementById('st-sessions').textContent   = sessions.length;
  document.getElementById('st-reduction-pct').textContent = pct + '%';
  document.getElementById('st-longest').textContent    = fmtMin(longest);

  // 比較ラベル（週・月のみ）
  const compareEl = document.getElementById('st-compare-label');
  if (period !== 'all' && prevTotal > 0) {
    const diff = detoxTotal - prevTotal;
    const sign = diff >= 0 ? '+' : '';
    compareEl.textContent = `${t('前期間比','vs prev')} ${sign}${fmtMin(Math.abs(diff))}`;
    compareEl.className = `text-xs mt-1 ${diff >= 0 ? 'text-emerald-500' : 'text-red-400'}`;
  } else {
    compareEl.textContent = '';
  }

  // バーチャート描画
  const chartEl  = document.getElementById('st-chart');
  const labelsEl = document.getElementById('st-labels');
  if (!chartEl || !labelsEl) return;
  chartEl.innerHTML = labelsEl.innerHTML = '';

  const maxBar  = Math.max(...bars, 1);
  const maxBase = Math.max(maxBar, DAILY_ESTIMATE_MIN);
  const today   = now.getDay();

  bars.forEach((detoxMin, i) => {
    const estMin    = DAILY_ESTIMATE_MIN;
    const savedPct  = Math.min(detoxMin, estMin) / maxBase * 100;
    const remainPct = Math.max(0, estMin - detoxMin) / maxBase * 100;
    const isToday   = period === 'week' && i === today;

    const col = document.createElement('div');
    col.className = 'flex flex-col items-center justify-end';
    col.style.flex = '1';
    col.innerHTML = `
      <div class="w-full flex flex-col justify-end rounded-lg overflow-hidden" style="height:100px;background:#1C1C1E;">
        <div style="height:${savedPct}%;background:${isToday?'#10b981':'#34d399'};transition:height .4s;min-height:${detoxMin>0?'2px':'0'};border-radius:0 0 6px 6px;"></div>
        <div style="height:${remainPct}%;background:#3b3b3d;"></div>
      </div>
    `;
    chartEl.appendChild(col);

    const lbl = document.createElement('div');
    lbl.style.flex = '1';
    lbl.className  = `text-center text-xs mt-1 ${isToday ? 'text-white font-bold' : 'text-gray-700'}`;
    lbl.textContent = barLabels[i] || '';
    labelsEl.appendChild(lbl);
  });
}

function buildWeeklyChart(chartId, labelsId, totalId, data) {
  const chartEl  = document.getElementById(chartId);
  const labelsEl = document.getElementById(labelsId);
  const totalEl  = document.getElementById(totalId);
  if (!chartEl || !labelsEl) return;

  const DAY_LABELS = S.lang === 'en' ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'] : ['日','月','火','水','木','金','土'];
  const today  = new Date().getDay();
  const maxVal = Math.max(...data, 1);
  const total  = data.reduce((a,b) => a+b, 0);

  chartEl.innerHTML  = '';
  labelsEl.innerHTML = '';
  if (totalEl) totalEl.textContent = `${t('今週','This week')} ${Math.floor(total/60)}h ${total%60}m`;

  DAY_LABELS.forEach((day, i) => {
    const pct     = data[i] / maxVal * 100;
    const isToday = i === today;

    // Bar column
    const col = document.createElement('div');
    col.className = 'week-col';
    col.innerHTML = `
      <div class="week-bar-wrap" style="flex:1;">
        <div class="week-bar-fill ${isToday?'today':''}" style="height:${pct}%;"></div>
      </div>
    `;
    chartEl.appendChild(col);

    // Label
    const lbl = document.createElement('div');
    lbl.className = `flex-1 text-center text-xs ${isToday ? 'text-white font-bold' : 'text-gray-700'}`;
    lbl.textContent = day;
    labelsEl.appendChild(lbl);
  });
}

        <p class="text-xs text-gray-700 font-bold uppercase mb-3">${t('フレンドのデトックス','Friend Detox')}</p>
        ${row('friendDetoxStart', t('デトックス開始通知','Friend Starts Detox'), 'friendDetoxStart', true)}
        ${row('friendDetoxEnd',   t('デトックス終了通知','Friend Ends Detox'),   'friendDetoxEnd',   true)}
        <div id="ns-friend-list" class="mt-3 pt-3 border-t border-gray-900">
          <p class="text-xs text-gray-600 font-semibold mb-2">${t('フレンドごとの設定','Per-friend settings')}</p>
          ${friendRows()}
        </div>
      </div>

      <!-- Social notifications -->
      <div class="card p-4">
        <p class="text-xs text-gray-700 font-bold uppercase mb-3">${t('ソーシャル','Social')}</p>
        ${row('likes',       t('いいね','Likes'),           'likes',       true)}
        ${row('comments',    t('コメント','Comments'),       'comments',    true)}
        ${row('groupInvite', t('グループ招待','Group Invite'), 'groupInvite', false)}
      </div>
    </div>
  `;

  goto('notif-settings');

  document.getElementById('ns-back').addEventListener('click', () => renderSettings());

  // グローバルトグル
  [
    ['enabled',          'enabled'],
    ['friendDetoxStart', 'friendDetoxStart'],
    ['friendDetoxEnd',   'friendDetoxEnd'],
    ['likes',            'likes'],
    ['comments',         'comments'],
    ['groupInvite',      'groupInvite'],
  ].forEach(([id, key]) => {
    document.getElementById(`nspref-${id}`)?.addEventListener('click', function() {
      S.notifPrefs[key] = !S.notifPrefs[key];
      this.classList.toggle('on', S.notifPrefs[key]);
      if (key === 'friendDetoxStart' || key === 'friendDetoxEnd') {
        renderNotifSettings();
      }
    });
  });

  // フレンド別トグル（開始/終了）
  friends.forEach(f => {
    ['start', 'end'].forEach(type => {
      document.getElementById(`nspref-friend-${f.id}-${type}`)?.addEventListener('click', function() {
        if (!p.friendFilter[f.id]) p.friendFilter[f.id] = { start: true, end: true };
        p.friendFilter[f.id][type] = !p.friendFilter[f.id][type];
        this.classList.toggle('on', p.friendFilter[f.id][type]);
      });
    });
  });

  // その他 expand/collapse
  const othersBtn  = document.getElementById('ns-others-btn');
  const othersWrap = document.getElementById('ns-others-wrap');
  const othersLbl  = document.getElementById('ns-others-label');
  const othersArr  = document.getElementById('ns-others-arrow');
  if (othersBtn) {
    let expanded = false;
    othersBtn.addEventListener('click', () => {
      expanded = !expanded;
      othersWrap.classList.toggle('hidden', !expanded);
      othersArr.style.transform = expanded ? 'rotate(180deg)' : '';
      const hidden = friends.length - SHOW_LIMIT;
      othersLbl.textContent = expanded
        ? t('折りたたむ', 'Show less')
        : t(`その他 ${hidden}人を表示`, `Show ${hidden} more`);
    });
  }
}

        ];
        const p = S.notifPrefs;

function renderAppChips(filter) {
  const container = document.getElementById('app-chip-list');
  if (!container) return;
  const q = (filter || '').toLowerCase();
  const apps = q ? ALL_APPS.filter(a => a.label.toLowerCase().includes(q)) : ALL_APPS;
  const cats = [...new Set(apps.map(a => a.cat))];
  container.innerHTML = cats.map(cat => {
    const catApps = apps.filter(a => a.cat === cat);
    return `<div class="w-full mb-3">
      <p class="text-xs text-gray-600 font-bold mb-2">${cat}</p>
      <div class="flex flex-wrap gap-2">
        ${catApps.map(a => {
          const sel = S.selectedApps.has(a.label);
          return `<button class="app-chip flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs font-semibold transition-all ${sel ? 'border-white/30 bg-white/10 text-white' : 'border-gray-800 text-gray-600'}" data-app="${a.label}">
            <span class="w-4 h-4 rounded flex items-center justify-center text-white font-bold" style="background:#${a.bg};font-size:9px">${a.label[0]}</span>
            ${a.label}
          </button>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  container.querySelectorAll('.app-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const app = btn.dataset.app;
      if (S.selectedApps.has(app)) {
        S.selectedApps.delete(app);
        btn.className = btn.className.replace('border-white/30 bg-white/10 text-white', 'border-gray-800 text-gray-600');
      } else {
        S.selectedApps.add(app);
        btn.className = btn.className.replace('border-gray-800 text-gray-600', 'border-white/30 bg-white/10 text-white');
      }
    });
  });
}

function updateAppPickerSummary(summaryId, selectedSet) {
  const el = document.getElementById(summaryId);
  if (!el) return;
  const arr = [...selectedSet];
  if (arr.length === 0) {
    el.textContent = t('アプリを選択...', 'Select apps...');
    el.style.color = '#6b7280';
  } else if (arr.length <= 3) {
    el.textContent = arr.join(', ');

function openAppPicker(mode) {
  // mode: 'individual' | 'group'
  const selectedSet = mode === 'group' ? S.groupSelectedApps : S.selectedApps;
  const tempSet = new Set(selectedSet); // 編集用コピー
  const modal = document.getElementById('app-picker-modal');
  const listEl = document.getElementById('app-picker-list');
  const searchEl = document.getElementById('app-picker-search');
  const titleEl = document.getElementById('app-picker-title');
  let expandedCats = new Set();

  modal.style.display = 'flex';
  titleEl.textContent = t('アプリを選択', 'Choose Activities');
  searchEl.value = '';

  const CAT_ICONS = {
    'SNS': '💬', 'メッセージ': '✉️', 'エンタメ': '🎬',
    '音楽': '🎵', 'ゲーム': '🎮', 'ショッピング': '🛍️',
    'ニュース': '📰', 'ブラウザ': '🌐',
    'Social': '💬', 'Messaging': '✉️', 'Entertainment': '🎬',
    'Music': '🎵', 'Games': '🎮', 'Shopping': '🛍️',
    'News': '📰', 'Browser': '🌐'
  };

  function renderList(q) {
    const query = (q || '').toLowerCase();
    listEl.innerHTML = '';

    // All Apps & Categories row
    const allSelected = ALL_APPS.every(a => tempSet.has(a.label));
    const allRow = document.createElement('div');
    allRow.style.cssText = 'background:#2c2c2e;border-radius:14px;overflow:hidden;margin-bottom:8px;';
    allRow.innerHTML = `
      <div class="app-picker-row" data-type="all" style="display:flex;align-items:center;padding:14px 16px;gap:14px;cursor:pointer;">
        <div class="picker-circle ${allSelected?'picker-circle-on':''}" style="width:24px;height:24px;border-radius:50%;border:2px solid ${allSelected?'#3b82f6':'#636366'};background:${allSelected?'#3b82f6':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          ${allSelected?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':''}
        </div>
        <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🗂️</div>
        <span style="color:white;font-weight:600;font-size:15px;">${t('すべてのアプリ','All Apps & Categories')}</span>
      </div>`;
    allRow.querySelector('.app-picker-row').addEventListener('click', () => {
      if (allSelected) { tempSet.clear(); } else { ALL_APPS.forEach(a => tempSet.add(a.label)); }
      renderList(searchEl.value);
    });
    listEl.appendChild(allRow);

    // カテゴリ別
    const cats = [...new Set(ALL_APPS.map(a => a.cat))];
    cats.forEach(cat => {
      const appsInCat = ALL_APPS.filter(a => a.cat === cat);
      const filtered  = query ? appsInCat.filter(a => a.label.toLowerCase().includes(query)) : appsInCat;
      if (filtered.length === 0) return;

      const selCount  = filtered.filter(a => tempSet.has(a.label)).length;
      const catSel    = selCount === filtered.length && filtered.length > 0;
      const expanded  = expandedCats.has(cat) || !!query;

      const card = document.createElement('div');
      card.style.cssText = 'background:#2c2c2e;border-radius:14px;overflow:hidden;margin-bottom:8px;';

      // Category header row
      const header = document.createElement('div');
      header.style.cssText = 'display:flex;align-items:center;padding:14px 16px;gap:14px;cursor:pointer;';
      header.innerHTML = `
        <div style="width:24px;height:24px;border-radius:50%;border:2px solid ${catSel?'#3b82f6':'#636366'};background:${catSel?'#3b82f6':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          ${catSel?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':''}
        </div>
        <div style="width:36px;height:36px;border-radius:10px;background:#3a3a3c;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${CAT_ICONS[cat]||'📱'}</div>
        <span style="color:white;font-weight:600;font-size:15px;flex:1;">${cat}</span>
        ${!query ? `<span style="color:#636366;font-size:14px;margin-right:4px;">${selCount>0?selCount:''}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#636366" stroke-width="2" style="transform:rotate(${expanded?90:0}deg);transition:.2s;"><path d="M9 5l7 7-7 7"/></svg>` : ''}
      `;

      // Category circle click → toggle all in cat
      header.querySelector('div').addEventListener('click', (e) => {
        e.stopPropagation();
        if (catSel) { filtered.forEach(a => tempSet.delete(a.label)); }
        else { filtered.forEach(a => tempSet.add(a.label)); }
        renderList(searchEl.value);
      });

      // Chevron / row click → expand
      if (!query) {
        header.addEventListener('click', () => {
          if (expandedCats.has(cat)) expandedCats.delete(cat);
          else expandedCats.add(cat);
          renderList(searchEl.value);
        });
      }

      card.appendChild(header);

      // Individual app rows (shown if expanded or searching)
      if (expanded) {
        filtered.forEach((a, idx) => {
          const sel = tempSet.has(a.label);
          const appRow = document.createElement('div');
          appRow.style.cssText = `display:flex;align-items:center;padding:12px 16px;gap:14px;cursor:pointer;border-top:1px solid #3a3a3c;`;
          appRow.innerHTML = `
            <div style="width:24px;height:24px;border-radius:50%;border:2px solid ${sel?'#3b82f6':'#636366'};background:${sel?'#3b82f6':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              ${sel?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':''}
            </div>
            <div style="width:36px;height:36px;border-radius:10px;background:#${a.bg};display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:14px;flex-shrink:0;">${a.label[0]}</div>
            <span style="color:white;font-size:15px;">${a.label}</span>
          `;
          appRow.addEventListener('click', () => {
            if (tempSet.has(a.label)) tempSet.delete(a.label);
            else tempSet.add(a.label);
            renderList(searchEl.value);
          });
          card.appendChild(appRow);
        });
      }

      listEl.appendChild(card);
    });
  }

  renderList('');
  searchEl.oninput = () => renderList(searchEl.value);

  document.getElementById('app-picker-cancel').onclick = () => {
    modal.style.display = 'none';
  };
  document.getElementById('app-picker-done').onclick = () => {
    if (mode === 'group') {
      S.groupSelectedApps = new Set(tempSet);
      updateAppPickerSummary('gd-app-picker-summary', S.groupSelectedApps);
    } else {
      S.selectedApps = new Set(tempSet);
      updateAppPickerSummary('app-picker-summary', S.selectedApps);
    }
    modal.style.display = 'none';
  };
}

let pickerInited = false;
function initGroupDetoxPicker() {
  const hPicker = document.getElementById('gd-picker-hours');
  const mPicker = document.getElementById('gd-picker-minutes');
  if (!hPicker || !mPicker || hPicker.children.length > 0) return;

  function buildCol(el, count, step) {
    const pad = document.createElement('div'); pad.className = 'picker-pad';
    el.appendChild(pad.cloneNode());
    for (let i = 0; i < count; i += step) {
      const item = document.createElement('div');
      item.className = 'picker-item';
      item.textContent = String(i).padStart(2,'0');
      el.appendChild(item);
    }
    el.appendChild(pad.cloneNode());
  }
  buildCol(hPicker, 6, 1);   // 0-5 hours
  buildCol(mPicker, 60, 5);  // 0,5,10...55 min

  // Scroll to default: 1 hour 0 min
  [hPicker, mPicker].forEach(p => {
    p.addEventListener('scroll', () => highlightCenter(p));
    setTimeout(() => {
      const items = p.querySelectorAll('.picker-item');
      if (p === hPicker && items[1]) p.scrollTop = items[1].offsetTop - p.clientHeight / 2 + items[1].offsetHeight / 2;
      highlightCenter(p);
    }, 50);
  });
}

function initTimePicker() {
  if (pickerInited) return;
  pickerInited = true;
  const hPicker = document.getElementById('picker-hours');
  const mPicker = document.getElementById('picker-minutes');

  function buildPicker(el, count, step) {
    const pad = document.createElement('div'); pad.className = 'picker-pad';
    el.appendChild(pad.cloneNode());
    for (let i = 0; i < count; i += step) {
      const item = document.createElement('div');
      item.className = 'picker-item';
      item.textContent = String(i).padStart(2,'0');
      el.appendChild(item);
    }
    el.appendChild(pad.cloneNode());
  }
  buildPicker(hPicker, 6,  1);  // 0-5 hours
  buildPicker(mPicker, 60, 5);  // 0,5,10...55 min

  [hPicker, mPicker].forEach(p => {
    p.addEventListener('scroll', () => highlightCenter(p));
    // scroll to 0 by default
    setTimeout(() => highlightCenter(p), 50);
  });
}

function highlightCenter(picker) {
  const center = picker.scrollTop + picker.clientHeight / 2;
  picker.querySelectorAll('.picker-item').forEach(item => {
    const itemCenter = item.offsetTop + item.offsetHeight / 2;
    item.style.opacity = Math.abs(center - itemCenter) < item.offsetHeight * 0.6 ? '1' : '0.2';
  });
}

function getPickerValue(pickerId) {
  const picker = document.getElementById(pickerId);
  const center = picker.scrollTop + picker.clientHeight / 2;
  let best = null, bestDist = Infinity;
  picker.querySelectorAll('.picker-item').forEach(item => {
    const dist = Math.abs(center - (item.offsetTop + item.offsetHeight / 2));
    if (dist < bestDist) { bestDist = dist; best = item; }
  });
  return best ? parseInt(best.textContent) : 0;
}

function maybeRestoreSession() {
  const stored = JSON.parse(localStorage.getItem('to_active_session') || 'null');
  if (!stored) return false;
  const elapsed   = (Date.now() - stored.startTime) / 1000;
  const remaining = stored.totalDuration - elapsed;
  if (remaining > 5) {
    S.activeSession = { ...stored, timerId: null };
    renderSessionPage();
    goto('session');
    S.activeSession.timerId = setInterval(tickSession, 1000);
    tickSession();
    return true;
  }
  localStorage.removeItem('to_active_session');
  return false;
}

  const friendsList = document.getElementById('invite-friends-list');

  if (invitableFriends.length === 0) {
    friendsList.innerHTML = `<p class="text-gray-600 text-sm text-center py-4">${t('招待できるフレンドがいません','No friends available to invite')}</p>`;
  } else {

          style="background:${group.color}22;color:${group.color};border:1px solid ${group.color}44;">${t('招待する','Invite')}</button>
      </div>
    `).join('');
    friendsList.querySelectorAll('.invite-send-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.textContent = t('招待済み','Invited');
        btn.disabled = true;
        btn.style.opacity = '0.5';
      });
    });
  }

  sheet.style.pointerEvents = 'auto';
  sheet.style.opacity = '1';
  requestAnimationFrame(() => {
    drawer.style.transform = 'translateX(-50%) translateY(0)';

  function closeSheet() {
    sheet.style.opacity = '0';
    drawer.style.transform = 'translateX(-50%) translateY(100%)';
    setTimeout(() => { sheet.style.pointerEvents = 'none'; }, 350);
  }
  document.getElementById('invite-close-btn').onclick = closeSheet;
  overlay.onclick = closeSheet;
}

        <label class="block text-xs text-gray-600 font-bold uppercase mb-1 ml-1">${t('説明（任意）','Description (optional)')}</label>

              <button class="cg-invite-toggle w-6 h-6 rounded-full border-2 border-gray-700 flex items-center justify-center transition" data-uid="${f.id}" data-selected="false">

  page.querySelectorAll('.cg-invite-toggle').forEach(btn => {

      const selected = btn.dataset.selected === 'true';
      if (selected) {
        selectedInvites.delete(uid);
        btn.dataset.selected = 'false';
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.innerHTML = '';
      } else {
        selectedInvites.add(uid);
        btn.dataset.selected = 'true';
        btn.style.background = 'white';
        btn.style.borderColor = 'white';
        btn.innerHTML = '<svg class="w-3.5 h-3.5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>';

    });
  });

    goto('friends');

  });

    setTimeout(() => document.getElementById('tab-groups-btn')?.click(), 50);
  });

    });
  });
  page.querySelectorAll('.cg-color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedColor = btn.dataset.color;
      page.querySelectorAll('.cg-color-btn').forEach(b => b.style.borderColor = 'transparent');

      const preview = document.getElementById('cg-icon-preview');
      preview.style.background = `${selectedColor}22`;
      preview.style.borderColor = `${selectedColor}55`;
    });
  });
}

function renderSurvey() {
  const page = document.getElementById('page-survey');

  const occupations = [
    { v: 'student',    ja: '学生',         en: 'Student' },
    { v: 'employee',   ja: '会社員',       en: 'Office Worker' },
    { v: 'freelance',  ja: 'フリーランス', en: 'Freelancer' },
    { v: 'homemaker',  ja: '主婦・主夫',   en: 'Homemaker' },
    { v: 'other',      ja: 'その他',       en: 'Other' },
  ];
  const goals = [
    { v: 'sns',        ja: 'SNS・動画依存を減らす',   en: 'Reduce SNS / video addiction' },
    { v: 'focus',      ja: '仕事・勉強の集中力アップ', en: 'Improve focus at work/study' },
    { v: 'exam',       ja: '受験・資格勉強',           en: 'Exam / certification study' },
    { v: 'sleep',      ja: '睡眠の質を上げる',         en: 'Better sleep' },
    { v: 'family',     ja: '家族・子どもへの影響',     en: 'Family / parenting concern' },
    { v: 'health',     ja: '心身の健康管理',           en: 'Mental & physical health' },
    { v: 'other',      ja: 'その他',                   en: 'Other' },
  ];
  const usages = [
    { v: 'lt2',  ja: '2時間未満',  en: 'Under 2h' },
    { v: '2to4', ja: '2〜4時間',   en: '2–4h' },
    { v: '4to6', ja: '4〜6時間',   en: '4–6h' },
    { v: 'gt6',  ja: '6時間以上',  en: '6h+' },
  ];

  let selOccupation = null, selGoals = new Set(), selUsage = null;

  function chip(label, active, onclick) {
    return `<button onclick="${onclick}" style="padding:10px 16px;border-radius:9999px;border:1.5px solid ${active?'white':'#3a3a3c'};background:${active?'white':'transparent'};color:${active?'black':'#9ca3af'};font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">${label}</button>`;
  }

  function render() {
    page.innerHTML = `
      <div class="mb-8">
        <p class="text-xs text-gray-600 font-bold uppercase tracking-widest mb-1">${t('ステップ 2 / 3','Step 2 of 3')}</p>
        <h2 class="text-2xl font-black text-white leading-tight">${t('あなたのことを\n教えてください','Tell us about\nyourself').replace(/\n/g,'<br>')}</h2>
        <p class="text-gray-600 text-sm mt-2">${t('アプリをより良くするために使います','Used to improve your experience')}</p>
      </div>

      <div class="mb-6">
        <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-3">${t('職業','Occupation')}</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${occupations.map(o => chip(t(o.ja,o.en), selOccupation===o.v, `window._surveyOcc('${o.v}')`)).join('')}
        </div>
      </div>

      <div class="mb-6">
        <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-3">${t('デトックスの目的','Detox Goal')} <span class="text-gray-700 normal-case">${t('（複数可）','(multiple ok)')}</span></p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${goals.map(g => chip(t(g.ja,g.en), selGoals.has(g.v), `window._surveyGoal('${g.v}')`)).join('')}
        </div>
      </div>

      <div class="mb-10">
        <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-3">${t('1日の平均スマホ使用時間','Avg. Daily Phone Use')}</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${usages.map(u => chip(t(u.ja,u.en), selUsage===u.v, `window._surveyUsage('${u.v}')`)).join('')}
        </div>
      </div>

      <button id="survey-next" class="w-full bg-white text-black font-bold py-4 rounded-full text-base active:bg-gray-200 transition">
        ${t('次へ','Next')}
      </button>
      <button id="survey-skip" class="w-full text-gray-700 font-semibold py-3 text-sm mt-1">
        ${t('スキップ','Skip')}
      </button>
    `;

    document.getElementById('survey-next').addEventListener('click', async () => {
      const u = getUser() || {};
      const segment = { occupation: selOccupation, goals: [...selGoals], dailyUsage: selUsage };
      u.segment = segment;
      saveUser(u);
      if (db && u.uid) {
        try { await db.collection('users').doc(u.uid).update({ segment }); } catch(e) {}
      }
      renderOnboarding();
    });
    document.getElementById('survey-skip').addEventListener('click', () => renderOnboarding());
  }

  window._surveyOcc   = v => { selOccupation = selOccupation === v ? null : v; render(); };
  window._surveyGoal  = v => { selGoals.has(v) ? selGoals.delete(v) : selGoals.add(v); render(); };
  window._surveyUsage = v => { selUsage = selUsage === v ? null : v; render(); };

  render();
  goto('survey');
}

// ================================================================
// BOOT
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  // Generate today's all-user detox time: random 15-min slot between 12:30–22:00 (max 3h duration)
  (() => {
    const slots = [];
    const startTotal = 12 * 60 + 30; // 12:30
    const endTotal   = 22 * 60;      // 22:00 (start must be ≤ 19:00 to allow up to 3h)
    const maxStart   = endTotal - 3 * 60; // latest start = 19:00
    for (let total = startTotal; total <= maxStart; total += 15) {
      slots.push({ h: Math.floor(total / 60), m: total % 60 });
    }
    S.globalDetoxTime = slots[Math.floor(Math.random() * slots.length)];
  })();

  // Restore saved language
  const savedLang = localStorage.getItem('to_lang');
  if (savedLang === 'en' || savedLang === 'ja') S.lang = savedLang;

  renderLogin();
  renderRegister();
  renderInterruptPage();
  renderStaticLabels();
  updateUnreadDots();

  // Firebase Auth state check
  if (!auth) {
    const u = getUser();
    if (u) { if (!maybeRestoreSession()) goto('home'); }
    else if (!savedLang) { renderLangSelect(); goto('lang'); }
    else goto('login');
    return;
  }
  auth.onAuthStateChanged(async (firebaseUser) => {
    if (firebaseUser) {
      let u = getUser();
      if (!u || u.uid !== firebaseUser.uid) {
        if (db) {
          const snap = await db.collection('users').doc(firebaseUser.uid).get();
          if (snap.exists) {
            u = { ...snap.data(), uid: firebaseUser.uid };
            saveUser(u);
          }
        }
      }
      if (u) {
        if (S._justRegistered) {
          S._justRegistered = false;
          return; // onboarding is already showing for new user
        }
        if (!maybeRestoreSession()) {
          goto('home');
        }
      } else {
        if (!savedLang) { renderLangSelect(); goto('lang'); } else goto('login');
      }
    } else {
      if (!savedLang) { renderLangSelect(); goto('lang'); } else goto('login');
    }
  });
});
