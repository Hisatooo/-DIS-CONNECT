<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TuneOut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ===== BASE ===== */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #000;
      color: #E2E2E2;
      overscroll-behavior: none;
    }
    input, textarea, select, button { font-family: 'Sora', sans-serif; }

    /* ===== SCROLLBAR ===== */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ===== PAGE SYSTEM ===== */
    .page {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      overflow: hidden;
    }
    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== CARD ===== */
    .card {
      background: #1C1C1E;
      border-radius: 1.25rem;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ===== INPUTS ===== */
    .input-field {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 0.875rem;
      padding: 0.9rem 1rem;
      width: 100%;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: rgba(255,255,255,0.35); }
    .input-field::placeholder { color: #6B7280; }

    /* ===== BOTTOM NAV ===== */
    .nav-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 2rem);
      max-width: 400px;
      background: rgba(22,22,24,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 9999px;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.25,1,0.5,1), opacity 0.3s ease;
    }
    .nav-bar.nav-hidden {
      transform: translate(-50%, 200%);
      opacity: 0;
    }
    .nav-btn { transition: color 0.18s ease; position: relative; }
    .nav-btn .icon-solid { display: none; }
    .nav-btn.active-nav .icon-outline { display: none; }
    .nav-btn.active-nav .icon-solid { display: block; }

    /* ===== NOTIFICATION DOT ===== */
    .notif-dot {
      position: absolute;
      top: 0.35rem;
      right: 0.35rem;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      border: 1.5px solid #000;
    }

    /* ===== SLIDER ===== */
    .slider-track {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      padding: 6px;
      position: relative;
      user-select: none;
      touch-action: none;
      overflow: hidden;
    }
    .slider-reveal {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 9999px;
      pointer-events: none;
    }
    .slider-thumb {
      background: white;
      border-radius: 9999px;
      position: absolute;
      top: 6px; left: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      cursor: grab;
      transition: box-shadow 0.2s;
    }
    .slider-thumb:active { cursor: grabbing; box-shadow: 0 0 0 6px rgba(255,255,255,0.1); }
    .slider-label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      color: #6B7280;
      pointer-events: none;
      font-weight: 600;
      font-size: 0.875rem;
      white-space: nowrap;
      z-index: 1;
      transition: opacity 0.15s;
    }

    /* ===== COUNTDOWN RING ===== */
    .countdown-ring { transform: rotate(-90deg); }
    .countdown-ring circle { transition: stroke-dashoffset 1s linear; }

    /* ===== ANIMATIONS ===== */
    @keyframes like-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .like-pop { animation: like-pop 0.28s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }

    @keyframes pulse-ring {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.55; }
    }
    .pulse-ring { animation: pulse-ring 2.2s ease infinite; }

    /* ===== COMMENT PANEL ===== */
    #comment-panel {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 300;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.25,1,0.5,1);
      display: flex;
      flex-direction: column;
    }
    #comment-panel.open { transform: translateX(0); }

    /* ===== CHALLENGE BANNER ===== */
    #challenge-banner {
      position: fixed;
      top: 1rem; left: 1rem; right: 1rem;
      max-width: 400px;
      margin: 0 auto;
      background: rgba(25,25,27,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1.1rem;
      padding: 0.9rem 1rem;
      z-index: 9999;
      transform: translateY(-160%);
      transition: transform 0.5s cubic-bezier(0.19,1,0.22,1);
      box-shadow: 0 12px 32px rgba(0,0,0,0.7);
    }
    #challenge-banner.visible { transform: translateY(0); }

    /* ===== BOTTOM SHEET MODAL ===== */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet-body {
      width: 100%;
      max-width: 400px;
      background: #111113;
      border-radius: 1.5rem 1.5rem 0 0;
      padding: 0 1.25rem 2rem;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.25,1,0.5,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .sheet-overlay.open .sheet-body { transform: translateY(0); }
    .sheet-handle {
      width: 2.5rem; height: 4px;
      background: #3a3a3c;
      border-radius: 2px;
      margin: 0.75rem auto 1.25rem;
    }

    /* ===== TIME PICKER ===== */
    .picker-col {
      width: 5rem;
      height: 15rem;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .picker-col::-webkit-scrollbar { display: none; }
    .picker-item {
      height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-size: 2rem;
      font-weight: 900;
      color: white;
      opacity: 0.25;
      transition: opacity 0.15s;
    }
    .picker-pad { height: 5.5rem; flex-shrink: 0; }

    /* ===== WEEKLY CHART ===== */
    .week-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
    }
    .week-bar-wrap {
      flex: 1;
      width: 100%;
      max-width: 28px;
      background: #2C2C2E;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .week-bar-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #606060;
      border-radius: 4px;
      transition: height 0.6s cubic-bezier(0.25,1,0.5,1);
    }
    .week-bar-fill.today { background: white; }

    /* ===== TOGGLE SWITCH ===== */
    .toggle {
      position: relative;
      width: 2.75rem;
      height: 1.5rem;
      border-radius: 9999px;
      background: #3a3a3c;
      cursor: pointer;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle.on { background: white; }
    .toggle-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 1.25rem; height: 1.25rem;
      border-radius: 50%;
      background: #888;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle.on .toggle-knob {
      transform: translateX(1.25rem);
      background: #000;
    }

    /* ===== FEED TABS ===== */
    .feed-tab {
      position: relative;
      padding-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.9375rem;
      color: #6B7280;
      transition: color 0.2s;
    }
    .feed-tab.active-tab { color: white; }
    .feed-tab.active-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 1.5rem; height: 2px;
      background: white;
      border-radius: 1px;
    }

    /* ===== PADDING FOR NAV ===== */
    .pb-nav { padding-bottom: 7rem; }
  </style>
</head>

// ================================================================

function fmtDuration(sec, alwaysHours = false) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  if (h > 0 || alwaysHours) return `${h}時間${m > 0 ? m + '分' : ''}`;
  return `${m}分`;
}
function fmtCountdown(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('ja-JP', { month:'short', day:'numeric' });
}
function friendById(id) { return MOCK_FRIENDS.find(f => f.id === id); }

function goto(page) {
  // Close comment panel if open
  document.getElementById('comment-panel').classList.remove('open');

  // Deactivate all pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById(`page-${page}`);
  if (el) el.classList.add('active');
  S.page = page;

  // Nav bar visibility
  const nav = document.getElementById('nav-bar');
  if (NO_NAV.includes(page)) {
    nav.classList.add('nav-hidden');
  } else {
    nav.classList.remove('nav-hidden');
  }

  // Active nav button highlight
  document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
    const match = btn.dataset.page === page ||
                  (btn.dataset.page === 'home' && page === 'home');
    btn.classList.toggle('active-nav', match);
    btn.classList.toggle('text-white',  match);
    btn.classList.toggle('text-gray-500', !match);
  });

  // Page-specific render
  if (page === 'home')         renderHome();
  if (page === 'friends')      renderFriends();
  if (page === 'messages')     renderMessages();
  if (page === 'profile')      renderProfile();
  if (page === 'notifications') renderNotifications();
}
